  const bom="\uFEFF";
  let csv=`স্বপ্নঘুড়ি — ${m.name} — সদস্য স্টেটমেন্ট\n\n`;
  csv+="চাঁদার ইতিহাস\nমাস,নির্ধারিত,পরিশোধ,অবস্থা\n";
  allMonths.forEach(mon=>{
    const sp=specialMonths.find(s=>s.month===mon);
    const cr=sp?sp.amount:rate;
    const paid=payments.find(p=>p.month===mon);
    csv+=`${mon},${cr},${paid?paid.amount:0},${paid?"পরিশোধ":"বকেয়া"}\n`;
  });
  const totExp=allMonths.reduce((s,mon)=>{const sp=specialMonths.find(x=>x.month===mon);return s+(sp?sp.amount:rate);},0);
  const totPaid=payments.reduce((s,p)=>s+p.amount,0);
  csv+=`\nসর্বমোট,${totExp},${totPaid},${totExp-totPaid>0?"বকেয়া "+(totExp-totPaid):"পরিশোধিত"}\n`;
  if(loans.length){
    csv+="\nঋণের ইতিহাস\nতারিখ,মূল ঋণ,বকেয়া,পরিশোধ,উদ্দেশ্য\n";
    loans.forEach(l=>{csv+=`${l.date},${l.principal},${l.remaining},${l.principal-l.remaining},"${l.note||""}"\n`;});
  }
  const blob=new Blob([bom+csv],{type:"text/csv;charset=utf-8;"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;a.download=`${m.name}_statement.csv`;a.click();URL.revokeObjectURL(url);
  toast("✅ Excel ডাউনলোড শুরু হয়েছে");
}

function addVote(){

  sv();toast("✅ ভোট তৈরি হয়েছে");goTab("voting");
}

function castVote(vid,val){
  const uid=window._uid||"admin";
  var memId=((D.members||[]).find(function(m){return m.id==uid;})||{}).id||uid;
  D.votes=(D.votes||[]).map(function(v){return v.id==vid?{...v,votes:{...(v.votes||{}),[memId]:val}}:v;});
  sv();toast("✅ ভোট দেওয়া হয়েছে");goTab("voting");
}

function delVote(id){
  if(!confirm("এই ভোট মুছবেন?"))return;
  D.votes=(D.votes||[]).filter(v=>v.id!==id);
  sv();toast("🗑 মুছে গেছে","#dc2626");goTab("voting");
}

        <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center">
          <div style="font-size:40px;font-weight:900;color:${scoreColor}">${score}</div>
          <div style="font-size:11px;color:#64748b">/ ১০০</div>
        </div>
      </div>
      <div style="font-size:18px;font-weight:700;margin:10px 0 2px">${scoreLabel}</div>
      <div style="font-size:13px;color:#64748b">স্বপ্নঘুড়ি সমিতির সামগ্রিক স্বাস্থ্য স্কোর</div>
    </div>

    <!-- সূচকসমূহ — ৪টি কার্ড ২×২ গ্রিডে -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
      ${indicators.map(ind=>`
        <div class="card" style="padding:16px;text-align:center">
          <div style="font-weight:800;font-size:22px;color:${ind.color}">${ind.value}</div>
          <div style="font-size:12px;color:#64748b;margin:4px 0">${ind.label}</div>
          <div style="background:#e2e8f0;border-radius:99px;height:7px;overflow:hidden">
            <div style="background:${ind.color};height:100%;width:${ind.score}%;border-radius:99px"></div>
          </div>
        </div>`).join("")}
    </div>

    <!-- বিস্তারিত টেবিল -->
    <div class="card">
      ${ch("📊","সদস্যভিত্তিক স্বাস্থ্য সূচক")}
      <div style="overflow-x:auto">
        <table class="tbl">
          <thead><tr style="background:#006400">
            <th style="color:#fff;white-space:nowrap">সদস্য</th>
            <th style="color:#fff;text-align:right;white-space:nowrap">চাঁদা দিয়েছেন</th>
            <th style="color:#fff;text-align:right;white-space:nowrap">চাঁদা বকেয়া</th>
            <th style="color:#fff;text-align:right;white-space:nowrap">ঋণ বকেয়া</th>
            <th style="color:#fff;text-align:center;white-space:nowrap">স্কোর</th>
          </thead></tr>
          <tbody>
            ${members.map(m=>{
              const mPaid=payments.filter(p=>p.mid==m.id).reduce((s,p)=>s+p.amount,0);
              const allMonths2=[];let d2=new Date(2021,10,1);const now3=new Date();
              while(d2<=now3){allMonths2.push(`${d2.getFullYear()}-${String(d2.getMonth()+1).padStart(2,"0")}`);d2=new Date(d2.getFullYear(),d2.getMonth()+1,1);}
              const mExp=allMonths2.length*(m.monthlyRate||2000);
              const mDue=mExp-mPaid;
              const mLoan=loans.filter(l=>l.mid==m.id).reduce((s,l)=>s+l.remaining,0);
              const mScore=Math.max(0,Math.round(100-(mDue/mExp*50)-(mLoan>0?20:0)));
              const sc=mScore>=80?"#16a34a":mScore>=60?"#d97706":"#dc2626";
              return `<tr>
                <td style="font-weight:600;white-space:nowrap">${m.name}</td>
                <td style="text-align:right;color:#16a34a;white-space:nowrap">${fmt(mPaid)}</td>
                <td style="text-align:right;color:${mDue>0?"#dc2626":"#16a34a"};white-space:nowrap">${mDue>0?fmt(mDue):"✅"}</td>
                <td style="text-align:right;color:${mLoan>0?"#dc2626":"#16a34a"};white-space:nowrap">${mLoan>0?fmt(mLoan):"✅"}</td>
                <td style="text-align:center;white-space:nowrap">
                  <span style="background:${sc};color:#fff;border-radius:6px;padding:3px 10px;font-weight:800;font-size:12px">${mScore}</span>
                </td>
              </tr>`;
            }).join("")}
          </tbody>
        </table>
      </div>
    </div>`;
}
