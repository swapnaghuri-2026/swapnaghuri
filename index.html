<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#006400">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="স্বপ্নঘুড়ি">
<title>🪁 স্বপ্নঘুড়ি</title>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--g1:#006400;--g2:#1a8a00;--g3:#86efac;--gl:#f0fdf4;--rd:#dc2626;--rl:#fff1f2;--gd:#d97706;--yl:#fffbeb;--bl:#1a8a00;--ink:#071a07;--muted:#64748b;--bg:#f1f5f9;--white:#fff;--border:#e2e8f0}
html[data-theme="dark"]{--ink:#e8f5e8;--muted:#94a3b8;--bg:#0c1410;--white:#16201a;--border:#243024;--gl:#142a18;--rl:#2a1418;--yl:#2a2414}
html[data-theme="dark"] body{background:var(--bg);color:var(--ink)}
html[data-theme="dark"] .tbl th{background:#1a241c}
html[data-theme="dark"] .tbl tr:hover td{background:#1a241c}
html[data-theme="dark"] .stat-box,html[data-theme="dark"] .row{background:#1a241c}
html[data-theme="dark"] .field input,html[data-theme="dark"] .field select,html[data-theme="dark"] .field textarea{background:var(--white);color:var(--ink)}
html[data-theme="dark"] .chip{background:var(--white);color:var(--ink)}
html[data-theme="dark"] .topbar{background:var(--white)}
html[data-theme="dark"] .mobile-nav{background:var(--white)}
body{font-family:'Hind Siliguri',sans-serif;background:var(--bg);color:var(--ink)}
button,input,select,textarea{font-family:'Hind Siliguri',sans-serif}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:2px}

.app{display:flex;min-height:100vh}
.sidebar{width:235px;background:linear-gradient(180deg,#071a07 0%,#006400 50%,#006400 100%);position:fixed;top:0;left:0;bottom:0;display:flex;flex-direction:column;z-index:200;overflow-y:auto;transition:transform .3s}
.main{margin-left:235px;flex:1;min-height:100vh;display:flex;flex-direction:column}
.topbar{background:var(--white);border-bottom:1px solid var(--border);padding:13px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 1px 6px rgba(0,0,0,.06)}
.content{padding:22px;flex:1;max-width:1100px;width:100%}

.sb-logo{padding:22px 18px 14px;border-bottom:1px solid rgba(255,255,255,.08)}
.sb-nav{flex:1;padding:10px 8px}
.sb-section{font-size:9px;font-weight:700;color:rgba(255,255,255,.3);letter-spacing:1.5px;padding:10px 12px 4px;text-transform:uppercase}
.sb-btn{width:100%;display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:9px;border:none;cursor:pointer;font-family:inherit;margin-bottom:1px;background:transparent;color:rgba(255,255,255,.5);font-size:13px;font-weight:400;border-left:3px solid transparent;transition:all .15s;text-align:left}
.sb-btn:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.85)}
.sb-btn.active{background:rgba(255,255,255,.13);color:#fff;font-weight:600;border-left-color:#86efac}
.sb-btn .sbi{font-size:16px;width:20px;text-align:center}
.sb-footer{padding:12px 14px;border-top:1px solid rgba(255,255,255,.08)}

.hamburger{display:none;background:none;border:none;font-size:22px;cursor:pointer;color:var(--muted)}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:150}
.overlay.show{display:block}

.card{background:var(--white);border-radius:14px;box-shadow:0 2px 10px rgba(0,0,0,.06);overflow:hidden;margin-bottom:14px}
.ch{display:flex;align-items:center;gap:9px;padding:12px 16px}
.ch .ci{font-size:16px}.ch .ct{color:#fff;font-weight:700;font-size:14px}.ch .cs{color:rgba(255,255,255,.6);font-size:11px;margin-top:1px}
.cb{padding:16px}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;align-items:stretch}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;align-items:stretch}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;align-items:stretch}
.gauto{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px;align-items:stretch}
.grid2>.card,.grid3>.card,.grid4>.card,.gauto>.card,.grid2>.kpi,.grid3>.kpi,.grid4>.kpi{height:100%}

.kpi{background:var(--white);border-radius:13px;padding:16px;box-shadow:0 2px 10px rgba(0,0,0,.06)}
.kpi .ki{font-size:24px;margin-bottom:6px}
.kpi .kv{font-size:20px;font-weight:800;margin-bottom:2px}
.kpi .kl{font-size:11px;color:var(--muted)}
.kpi .ksub{font-size:10px;margin-top:3px;font-weight:600}

.row{display:flex;justify-content:space-between;align-items:center;padding:9px 16px;border-bottom:1px solid #f1f5f9}
.row:last-child{border-bottom:none}
.rl{font-size:13px;color:var(--muted)}.rv{font-size:13px;font-weight:700}
.hi{background:#f0fdf4}.hi .rv{color:var(--g2)}
.rd-row{background:#fff5f5}.rd-row .rv{color:var(--rd)}

.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}

.field{margin-bottom:11px}
.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px;font-weight:600}
.field input,.field select,.field textarea{width:100%;padding:10px 13px;border-radius:9px;border:1.5px solid var(--border);font-size:14px;font-family:inherit;outline:none;background:var(--white);transition:border-color .2s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--g2)}
.field textarea{resize:vertical;min-height:75px}

.btn{border:none;border-radius:9px;padding:10px 18px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .15s,transform .1s;display:inline-flex;align-items:center;gap:6px}
.btn:active{transform:scale(.97)}.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-g{background:linear-gradient(135deg,var(--g1),var(--g2));color:#fff;box-shadow:0 2px 8px rgba(20,83,45,.25)}
.btn-r{background:linear-gradient(135deg,#991b1b,var(--rd));color:#fff}
.btn-b{background:linear-gradient(135deg,#006400,var(--bl));color:#fff}
.btn-gold{background:linear-gradient(135deg,#92400e,var(--gd));color:#fff}
.btn-outline{background:transparent;border:2px solid var(--border);color:var(--muted)}
.btn-sm{padding:6px 13px;font-size:12px;border-radius:8px}
.btn-full{width:100%;justify-content:center}

.prog{background:#e2e8f0;border-radius:10px;overflow:hidden}
.prog-bar{height:100%;border-radius:10px;transition:width .6s ease}

.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;flex-shrink:0}

.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{padding:5px 13px;border-radius:20px;border:1.5px solid var(--border);background:var(--white);font-size:12px;cursor:pointer;font-family:inherit;transition:all .15s}
.chip.on{background:#dcfce7;border-color:var(--g2);color:var(--g2);font-weight:700}

.tab-bar{display:flex;gap:6px;margin-bottom:14px;background:var(--white);border-radius:11px;padding:4px;box-shadow:0 1px 6px rgba(0,0,0,.05)}
.tab-btn{flex:1;padding:8px;border-radius:8px;border:none;cursor:pointer;font-family:inherit;font-size:12px;font-weight:500;color:var(--muted);background:transparent;transition:all .2s}
.tab-btn.on{background:linear-gradient(135deg,var(--g1),var(--g2));color:#fff;font-weight:700}

.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{background:#f8fafc;padding:9px 12px;text-align:left;font-size:11px;font-weight:700;color:var(--muted);border-bottom:2px solid var(--border)}
.tbl thead tr[style] th{background:transparent !important;color:inherit !important}
.tbl td{padding:9px 12px;border-bottom:1px solid #f1f5f9;vertical-align:middle}
.tbl tr:hover td{background:#fafafa}
.tbl tr:last-child td{border-bottom:none}

.section-title{font-size:18px;font-weight:800;color:var(--ink);margin-bottom:4px}
.section-sub{font-size:12px;color:var(--muted);margin-bottom:16px}

#toast{position:fixed;top:78px;left:50%;transform:translateX(-50%);padding:10px 24px;border-radius:30px;color:#fff;font-size:13px;font-weight:700;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.2);white-space:nowrap;display:none}

@keyframes fadeUp{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes sli{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.pa{animation:sli .3s ease}

.login-wrap{min-height:100vh;background:linear-gradient(135deg,#050d14,#006400,#006400);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;font-family:'Hind Siliguri',sans-serif}
.login-box{background:rgba(255,255,255,.07);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:28px;width:100%;max-width:360px}

.hero{background:linear-gradient(135deg,#050d14,#006400,#006400);border-radius:16px;padding:24px 20px;color:#fff;margin-bottom:16px;position:relative;overflow:hidden}
.hero::after{content:'🪁';position:absolute;right:-10px;top:-10px;font-size:100px;opacity:.05;transform:rotate(-20deg)}

.notice-card{border-radius:13px;padding:14px 16px;margin-bottom:11px;border:2px solid;display:flex;gap:12px;align-items:flex-start}

.mobile-nav{position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--border);z-index:180;padding:4px 0 7px;box-shadow:0 -3px 14px rgba(0,0,0,.07);display:none}
.mn{flex:1;background:none;border:none;padding:6px 2px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;font-family:inherit}
.mn .mi{font-size:19px}.mn .ml{font-size:9px;color:#94a3b8}
.mn.on .ml{color:var(--g2);font-weight:700}
.mn .md{width:14px;height:3px;background:var(--g2);border-radius:2px;display:none}
.mn.on .md{display:block}

.viewer-bar{background:var(--yl);border-bottom:2px solid var(--gd);padding:7px 22px;font-size:12px;color:var(--gd);font-weight:600}

/* ── Global Search ── */
.gsearch-wrap{padding:10px 10px 6px;position:relative}
.gsearch-input{width:100%;padding:9px 36px 9px 14px;border-radius:10px;border:1.5px solid rgba(255,255,255,.18);background:rgba(255,255,255,.1);color:#fff;font-size:13px;font-family:inherit;outline:none;transition:border-color .2s}
.gsearch-input::placeholder{color:rgba(255,255,255,.35)}
.gsearch-input:focus{border-color:rgba(134,239,172,.6);background:rgba(255,255,255,.15)}
.gsearch-icon{position:absolute;right:22px;top:50%;transform:translateY(-50%);font-size:14px;opacity:.5;pointer-events:none}
.gsearch-results{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:9990;display:none;align-items:flex-start;justify-content:center;padding-top:70px}
.gsearch-results.show{display:flex}
.gsearch-box{background:var(--white);border-radius:16px;width:min(560px,96vw);max-height:75vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.35)}
.gsearch-top{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;position:sticky;top:0;background:var(--white);z-index:1}
.gsearch-top input{flex:1;border:none;outline:none;font-size:15px;font-family:inherit;background:transparent;color:var(--ink)}
.gsearch-item{padding:11px 16px;border-bottom:1px solid #f1f5f9;cursor:pointer;display:flex;gap:12px;align-items:center;transition:background .15s}
.gsearch-item:hover{background:#f0fdf4}
.gsearch-item:last-child{border-bottom:none}
.gsearch-cat{padding:7px 16px 4px;font-size:10px;font-weight:700;color:var(--muted);letter-spacing:1px;background:#f8fafc;text-transform:uppercase}
.gsearch-empty{padding:40px;text-align:center;color:var(--muted);font-size:13px}

/* ── Collapsible Sidebar Sections ── */
.sb-sec-btn{width:100%;background:rgba(255,255,255,.07);border:none;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:space-between;padding:7px 10px;text-align:left;border-radius:8px;margin:3px 0}
.sb-sec-btn:hover{background:rgba(255,255,255,.13)}
.sb-sec-label{font-size:11px;font-weight:700;color:rgba(255,255,255,.75);letter-spacing:.5px;display:flex;align-items:center;gap:6px}
.sb-sec-arrow{font-size:12px;color:rgba(255,255,255,.45);transition:transform .2s;font-weight:700}
.sb-sec-arrow.open{transform:rotate(90deg)}
.sb-sec-items{overflow:hidden;transition:max-height .25s ease}
.sb-sec-divider{border:none;border-top:1px solid rgba(255,255,255,.06);margin:2px 0}

/* ── Dark mode visibility fixes ── */
html[data-theme="dark"] .gsearch-box{background:var(--white)}
html[data-theme="dark"] .gsearch-top{background:var(--white);border-bottom-color:var(--border)}
html[data-theme="dark"] .gsearch-top input{color:var(--ink)}
html[data-theme="dark"] .gsearch-item:hover{background:#1a241c}
html[data-theme="dark"] .gsearch-cat{background:#0f1a10;color:var(--muted)}
html[data-theme="dark"] .section-title{color:var(--ink)}
html[data-theme="dark"] .section-sub{color:var(--muted)}
html[data-theme="dark"] .kpi{background:var(--white)}
html[data-theme="dark"] .kpi .kl{color:var(--muted)}
html[data-theme="dark"] .row{border-bottom-color:var(--border)}
html[data-theme="dark"] .rl{color:var(--muted)}
html[data-theme="dark"] .tab-bar{background:var(--white)}
html[data-theme="dark"] .tab-btn{color:var(--muted)}
html[data-theme="dark"] .notice-card{background:var(--white)}
html[data-theme="dark"] .notif-pop{background:var(--white)}
html[data-theme="dark"] #notif-pop div[style*="background:#fff"]{background:var(--white)!important}
html[data-theme="dark"] .prog{background:#1e2e20}
html[data-theme="dark"] .tbl th{color:var(--muted)}
html[data-theme="dark"] .tbl td{color:var(--ink)}
html[data-theme="dark"] .hi{background:#142a18}
html[data-theme="dark"] .rd-row{background:#2a1418}
html[data-theme="dark"] .login-wrap{background:linear-gradient(135deg,#020708,#003300,#003300)}
html[data-theme="dark"] .hero{background:linear-gradient(135deg,#020708,#003300,#003300)}
html[data-theme="dark"] .btn-outline{border-color:var(--border);color:var(--muted)}
html[data-theme="dark"] .fab-menu button{background:var(--white);color:var(--ink);border-color:var(--border)}
html[data-theme="dark"] .stat-box{background:var(--white)}
html[data-theme="dark"] .stat-box .sl{color:var(--muted)}

/* AI Report modal */
.ai-modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9990;display:none;align-items:center;justify-content:center}
.ai-modal-bg.show{display:flex}
.ai-modal{background:var(--white);border-radius:16px;width:min(620px,95vw);max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
html[data-theme="dark"] .ai-modal{background:var(--white)}
.ai-typing{display:inline-block;width:6px;height:14px;background:var(--g2);border-radius:2px;animation:blink .7s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

.stat-box{text-align:center;background:#f8fafc;border-radius:9px;padding:9px 6px}
.stat-box .sv{font-size:12px;font-weight:700}.stat-box .sl{font-size:10px;color:#94a3b8;margin-top:2px}

.fab{display:none;position:fixed;bottom:80px;right:20px;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--g1),var(--g2));color:#fff;font-size:26px;border:none;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.3);z-index:300;align-items:center;justify-content:center;transition:transform .2s}
.fab.show{display:flex}
.fab.open{transform:rotate(45deg)}
@media(min-width:769px){.fab{bottom:24px}}
.fab-menu{position:fixed;bottom:144px;right:20px;display:none;flex-direction:column;gap:8px;z-index:300}
.fab-menu.show{display:flex}
.fab-menu button{display:flex;align-items:center;gap:8px;background:var(--white);color:var(--ink);border:1px solid var(--border);border-radius:30px;padding:9px 16px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;box-shadow:0 2px 10px rgba(0,0,0,.12);white-space:nowrap}
@media(min-width:769px){.fab-menu{bottom:88px}}

.bell-wrap{position:relative;cursor:pointer}
.bell-dot{position:absolute;top:-3px;right:-3px;background:var(--rd);color:#fff;font-size:9px;font-weight:800;border-radius:10px;min-width:16px;height:16px;display:flex;align-items:center;justify-content:center;padding:0 3px}
.notif-pop{position:fixed;top:64px;right:8px;background:var(--white);border:1px solid var(--border);border-radius:13px;box-shadow:0 8px 28px rgba(0,0,0,.25);width:min(340px,calc(100vw - 16px));max-height:70vh;overflow-y:auto;z-index:9998;display:none}
.notif-pop.show{display:block}
.notif-item{padding:11px 14px;border-bottom:1px solid #f1f5f9;font-size:12px;cursor:pointer}
.notif-item:hover{background:#fafafa}
.notif-item.unread{background:#f0fdf4}

@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}
  .main{margin-left:0}.hamburger{display:block}
  .content{padding:12px;padding-bottom:75px}
  .grid4{grid-template-columns:1fr 1fr}.grid3{grid-template-columns:1fr 1fr}
  .mobile-nav{display:flex!important}
}
@media(min-width:769px){.mobile-nav{display:none!important}}
</style>

<!-- APP -->
<div id="app" style="display:none" class="app">
  <aside class="sidebar" id="sb">
    <div class="sb-logo">
      <div style="font-size:28px;margin-bottom:5px">🪁</div>
      <div style="color:#fff;font-weight:800;font-size:18px">স্বপ্নঘুড়ি</div>
      <div style="color:rgba(255,255,255,.4);font-size:11px;margin-top:2px"></div>
      <div id="sb-badge" style="margin-top:8px"></div>
    </div>
    <div class="gsearch-wrap">

const SEED = {

// ══════════════════

let role=sessionStorage.getItem("sg_role")||null, curTab="home", D=null;

const fmt=n=>"৳"+Number(n||0).toLocaleString("bn-BD");

const ds=d=>{try{const x=new Date(d);return `${x.getDate()} ${BNM[x.getMonth()]} ${x.getFullYear()}`;}catch(e){return d;}};
const gn=id=>((D.members||[]).find(m=>m.id==id)||{}).name||"অজানা";
const isA=()=>role==="admin";

  LS.set(SK,D);

    if(typeof firebase!=='undefined'&&firebase.apps&&firebase.apps.length){

};

function toast(m,c="#1a8a00"){const t=document.getElementById("toast");t.textContent=m;t.style.background=c;t.style.display="block";t.style.animation="fadeUp .3s ease";setTimeout(()=>t.style.display="none",2800);}
const bdg=(t,c,bg,s=11)=>`<span class="badge" style="color:${c};background:${bg};font-size:${s}px">${t}</span>`;
const av=(n,sz=40,g="linear-gradient(135deg,#006400,#1a8a00)",mid=null)=>{
  if(mid){const mem=(D.members||[]).find(m=>m.id==mid);if(mem&&mem.photo)return `<img src="${mem.photo}" style="width:${sz}px;height:${sz}px;border-radius:50%;object-fit:cover;flex-shrink:0">`;}
  // name দিয়েও member খুঁজব
  const byName=(D.members||[]).find(m=>m.name===n);
  if(byName&&byName.photo)return `<img src="${byName.photo}" style="width:${sz}px;height:${sz}px;border-radius:50%;object-fit:cover;flex-shrink:0">`;
  return `<div class="avatar" style="width:${sz}px;height:${sz}px;font-size:${sz*.38}px;background:${g}">${(n||"?").charAt(0)}</div>`;
};
const pb=(p,c="#1a8a00",h=8)=>`<div class="prog" style="height:${h}px"><div class="prog-bar" style="width:${Math.min(100,p)}%;height:${h}px;background:${c}"></div></div>`;
const GR={g:"linear-gradient(135deg,#006400,#1a8a00)",r:"linear-gradient(135deg,#991b1b,#dc2626)",b:"linear-gradient(135deg,#006400,#1a8a00)",gold:"linear-gradient(135deg,#92400e,#d97706)",p:"linear-gradient(135deg,#5b21b6,#7c3aed)",teal:"linear-gradient(135deg,#134e4a,#0d9488)"};
const ch=(ic,ti,su="",g="g")=>`<div class="ch" style="background:${GR[g]}"><span class="ci">${ic}</span><div><div class="ct">${ti}</div>${su?`<div class="cs">${su}</div>`:""}</div></div>`;

// ══════════════════════════════════════════
// কার্যক্রম লগ (Activity / Audit Log)
// ══════════════════════════════════════════
function logActivity(type, text){
  D.activityLog = [...(D.activityLog||[]), {
    id: Date.now()+"_"+Math.random().toString(36).slice(2,7),
    type: type,
    text: text,
    by: isA() ? "অ্যাডমিন" : "ভিউয়ার",
    at: new Date().toISOString()
  }];
}
function delActivity(id){
  D.activityLog=(D.activityLog||[]).filter(a=>String(a.id)!==String(id));
  sv();
  toast("🗑 মুছে গেছে","#dc2626");

  const el=document.querySelector(`[onclick="delActivity(${id})"]`);

}

// ══════════════════════════════════════════
// চাঁদার হার ব্যবস্থাপনা (Rate History System)
// সবসময় একটা current active rate থাকবে; নতুন হার effective date
// থেকে কার্যকর হয়, আগের হিসাব পুরাতন হারেই থাকে।
// সদস্য-নির্দিষ্ট হার থাকলে তা গ্লোবাল হারের চেয়ে অগ্রাধিকার পায়।
// ══════════════════════════════════════════
function getApplicableRate(mid, monthKey){
  const hist = (D.rateHistory||[]).filter(r => r.effectiveFrom <= monthKey);
  const memberEntries = hist.filter(r => r.mid != null && r.mid == mid).sort((a,b)=>a.effectiveFrom.localeCompare(b.effectiveFrom));
  if(memberEntries.length) return memberEntries[memberEntries.length-1].rate;
  const globalEntries = hist.filter(r => r.mid == null).sort((a,b)=>a.effectiveFrom.localeCompare(b.effectiveFrom));
  if(globalEntries.length) return globalEntries[globalEntries.length-1].rate;
  const m = (D.members||[]).find(x=>x.id==mid);
  return m ? (m.monthlyRate||2000) : 2000;
}

function login(r){
  try{
    if(r==="admin"){
      var p=document.getElementById("pw").value;
      if(p!==PW){
        document.getElementById("pwerr").style.display="block";
        return;
      }
    }
    role=r;
    localStorage.setItem("sg_role",r);
    try{ D=LS.get(SK)||JSON.parse(JSON.stringify(SEED)); }catch(e){ D=JSON.parse(JSON.stringify(SEED)); }
    if(!D.rateHistory) D.rateHistory=[];if(!D.liabilities) D.liabilities=[];
    if(!D.activityLog) D.activityLog=[];
    if(!D.paymentInfo) D.paymentInfo={bank:[],mobile:[]};
    document.getElementById("ls").style.display="none";
    document.getElementById("app").style.display="flex";
    document.getElementById("fab-btn").classList.add("show");
    if(r!=="admin") document.getElementById("vbar").style.display="block";
    // back button trap — history stack-এ entry যোগ করো
    history.pushState({tab:"home",role:r},"","");
    buildNav();
    trackVisitor();
    goTab("home");
    setTimeout(function(){
      try{
        if(typeof firebase!=="undefined"&&firebase.apps&&firebase.apps.length){
          firebase.database().ref('sg_data').once('value').then(function(snap){
            try{
              if(snap.exists()){
                var fd=JSON.parse(snap.val());
                if(fd&&fd.members){D=fd;if(!D.rateHistory)D.rateHistory=[];if(!D.activityLog)D.activityLog=[];if(!D.liabilities)D.liabilities=[];if(!D.paymentInfo)D.paymentInfo={bank:[],mobile:[]};LS.set(SK,D);if(curTab)goTab(curTab);}
              }
            }catch(e){}
          });
          firebase.database().ref('sg_data').on('value',function(snap){
            try{
              if(snap.exists()&&role){
                var fd=JSON.parse(snap.val());
                if(fd&&fd.members){D=fd;if(!D.rateHistory)D.rateHistory=[];if(!D.activityLog)D.activityLog=[];if(!D.liabilities)D.liabilities=[];if(!D.paymentInfo)D.paymentInfo={bank:[],mobile:[]};LS.set(SK,D);if(curTab)goTab(curTab);}
              }
            }catch(e){}
          });
        }
      }catch(e){}
    },3000);
  }catch(err){
    alert("Error: "+err.message);
  }
}
function logout(){role=null;localStorage.removeItem("sg_role");document.getElementById("ls").style.display="flex";document.getElementById("app").style.display="none";document.getElementById("vbar").style.display="none";document.getElementById("pw").value="";document.getElementById("pwerr").style.display="none";document.getElementById("fab-btn").classList.remove("show");closeFab();}

window.addEventListener("popstate",function(e){

});

    a.href=url;a.download="swapnaghuri_backup_"+date+".json";

    toast("✅ ব্যাকআপ ডাউনলোড হয়েছে");

function restoreData(event){
  const file=event.target.files[0];
  if(!file)return;
  if(!confirm("সতর্কতা! এটা করলে বর্তমান সব ডেটা মুছে যাবে। নিশ্চিত?"))return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const data=JSON.parse(e.target.result);

function updHdr(){
  const fund=calcFund();
  const due=(D.loans||[]).reduce((s,l)=>s+l.remaining,0);
  document.getElementById("sb-fund").textContent=fmt(fund);
  document.getElementById("sb-due").textContent=fmt(due);
  document.getElementById("tb-fund").textContent=fmt(fund);
}
function calcFund(){
  const inc=(D.income||[]).reduce((s,i)=>s+i.amount,0)+(D.payments||[]).reduce((s,p)=>s+p.amount,0);
  const exp=(D.expenses||[]).reduce((s,e)=>s+e.amount,0);
  return inc-exp;
}
function calcHealthScore(){
  const members=D.members||[], payments=D.payments||[], loans=D.loans||[], goals=D.goals||[];
  const allMonthsH=[];let dh=new Date(2021,10,1);const nowH=new Date();
  while(dh<=nowH){allMonthsH.push(`${dh.getFullYear()}-${String(dh.getMonth()+1).padStart(2,"0")}`);dh=new Date(dh.getFullYear(),dh.getMonth()+1,1);}
  const totalExp2=members.reduce((s,m)=>{
    const spM=(D.specialMonths||[]).filter(x=>x.mid==m.id);
    return s+allMonthsH.reduce((s2,mon)=>{
      const sp=spM.find(x=>x.month===mon);
      return s2+getApplicableRate(m.id,mon)+(sp?sp.amount:0);
    },0);
  },0);
  const totalPaid2=payments.reduce((s,p)=>s+p.amount,0);
  const collectionRate=totalExp2?Math.round(totalPaid2/totalExp2*100):0;
  const loanDueTotal=loans.reduce((s,l)=>s+l.remaining,0);
  const loanTotal=loans.reduce((s,l)=>s+l.principal,0);
  const loanRecovery=loanTotal?Math.round((loanTotal-loanDueTotal)/loanTotal*100):100;
  const fund=calcFund();
  const mainGoal=goals[0];
  const goalProgress=mainGoal?Math.round(fund/mainGoal.target*100):0;
  const score=Math.round((collectionRate*0.4)+(loanRecovery*0.3)+(Math.min(goalProgress,100)*0.3));
  const scoreColor=score>=80?"#16a34a":score>=60?"#d97706":"#dc2626";
  const scoreLabel=score>=80?"🟢 চমৎকার":score>=60?"🟡 মোটামুটি":"🔴 উদ্বেগজনক";
  return {score,scoreColor,scoreLabel,collectionRate,loanRecovery,goalProgress};
}

// ══════════════════
function applyTheme(mode){
  let real=mode;
  if(mode==="system"){
    real=(window.matchMedia&&window.matchMedia("(prefers-color-scheme: dark)").matches)?"dark":"light";
  }
  document.documentElement.setAttribute("data-theme",real);
  ["th-light","th-dark","th-system"].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.style.background = id===("th-"+mode) ? "rgba(255,255,255,.35)" : "rgba(255,255,255,.1)";
  });
}
function setTheme(mode){
  localStorage.setItem("sg_theme",mode);
  applyTheme(mode);
}
(function(){
  const saved=localStorage.getItem("sg_theme")||"system";
  applyTheme(saved);
})();

function getNotifications(){
  const list=[];
  // নোটিশ
  (D.notices||[]).slice().reverse().forEach(n=>{
    list.push({id:"notice-"+n.id,icon:"📢",text:"নতুন নোটিশ: "+n.title,date:n.date||"",type:"notice"});
  });
  // মিটিং
  (D.meetings||[]).filter(m=>m.date>=new Date().toISOString().slice(0,10)).slice(0,3).forEach(m=>{
    list.push({id:"meet-"+m.id,icon:"📅",text:"আসন্ন মিটিং: "+m.title+" ("+ds(m.date)+")",date:m.date,type:"meeting"});
  });
  // বকেয়া চাঁদা — প্রতি সদস্যের জন্য একটি করে
  const duesList=(typeof getDuesList==="function")?getDuesList():[];
  duesList.filter(m=>m.totalDue>0).forEach(m=>{
    list.push({id:"due-"+m.id,icon:"⚠️",text:m.name+" — বকেয়া চাঁদা "+fmt(m.totalDue),date:"",type:"due"});
  });
  // বকেয়া ঋণ
  (D.loans||[]).filter(l=>l.remaining>0).forEach(l=>{
    list.push({id:"loan-"+l.id,icon:"🤝",text:gn(l.mid)+" — বকেয়া ঋণ "+fmt(l.remaining),date:"",type:"loan"});
  });
  // ডুপ্লিকেট বাদ
  const seen=new Set();
  return list.filter(n=>{if(seen.has(n.id))return false;seen.add(n.id);return true;});
}

  pop.innerHTML=
    `<div style="padding:10px 14px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #f1f5f9;position:sticky;top:0;background:#fff;z-index:1">

      return `<div onclick="markNotifRead('${n.id}')" style="padding:10px 14px;border-bottom:1px solid #f8fafc;cursor:pointer;background:${isRead?"#fff":"#f0fdf4"};transition:background .2s;display:flex;gap:10px;align-items:flex-start">

        ${!isRead?`<span style="width:8px;height:8px;border-radius:50%;background:${typeColor};flex-shrink:0;margin-top:4px"></span>`:""}

    }).join("");

  // ── মাসভিত্তিক বার চার্ট (গত ৬ মাস: চাঁদা আদায়, আয়, ব্যয়, লাভ) ──

      ${monthData.map(m=>`
        <div style="display:flex;flex-direction:column;align-items:center;gap:3px;flex-shrink:0">

          </div>
          <div style="font-size:10px;color:#64748b">${m.label}</div>
        </div>`).join("")}
    </div>`;

  // ── Recent Activities (activityLog থেকে + পুরনো) ──
  const activities=[];
  (D.activityLog||[]).forEach(a=>activities.push({t:new Date(a.at||0).getTime()||a.id||0,icon:"🕐",text:a.text,logId:a.id}));
  if(!activities.length){
    payments.forEach(p=>activities.push({t:p.id,icon:"💰",text:`${gn(p.mid)} ${fmt(p.amount)} টাকা চাঁদা জমা দিয়েছেন`}));
    loans.forEach(l=>activities.push({t:l.id,icon:"🤝",text:`${gn(l.mid)} ${fmt(l.principal)} টাকা ঋণ নিয়েছেন`}));
  }
  const recentHtml=activities.sort((a,b)=>b.t-a.t).slice(0,20).map(a=>
    `<div style="display:flex;gap:10px;align-items:center;padding:9px 16px;border-bottom:1px solid #f1f5f9">

      <span style="font-size:12.5px;line-height:1.5;flex:1">${a.text}</span>
      ${isA()&&a.logId?`<button onclick="delActivity(${a.logId})" style="background:none;border:none;color:#94a3b8;cursor:pointer;font-size:13px;flex-shrink:0;padding:2px 4px" title="মুছুন">🗑</button>`:""}
    </div>`
  ).join("")||`<div style="padding:16px;text-align:center;color:#94a3b8">কোনো কার্যক্রম নেই</div>`;

  // ── Mini Health Score ──
  const hs=calcHealthScore();

  return `
    <div class="hero">
      <div style="font-size:11px;opacity:.5;margin-bottom:3px">${BNM[now.getMonth()]} ${now.getFullYear()}</div>
      <div style="font-size:22px;font-weight:800;line-height:1.3;margin-bottom:3px">স্বাগতম, স্বপ্নঘুড়ি 🪁</div>
      <div style="font-size:12px;opacity:.6;margin-bottom:6px">আজকের তারিখ: ${ds(now.toISOString().slice(0,10))}</div>
      <div style="font-size:12px;opacity:.7;margin-bottom:16px">📢 নতুন নোটিশ: ${(D.notices||[]).length} টি &nbsp;•&nbsp; ⚠️ বকেয়া সদস্য: ${duesList.filter(m=>m.totalDue>0).length} জন</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center">
        ${[["মোট সম্পদ",fmt(totalNetAsset)],["তহবিল",fmt(fund)],["বকেয়া ঋণ",fmt(totalDue)],["বকেয়া চাঁদা",fmt(totalDueChada)],["মোট দায়",fmt(totalLiability)]].map(([l,v],i)=>`<div style="background:${i===4?"rgba(220,38,38,.25)":"rgba(255,255,255,.1)"};border-radius:9px;padding:9px 13px;border:1px solid ${i===4?"rgba(220,38,38,.4)":"rgba(255,255,255,.1)"}"><div style="color:rgba(255,255,255,.55);font-size:10px">${l}</div><div style="color:${i===4?"#fca5a5":"#fff"};font-weight:800;font-size:15px">${v}</div></div>`).join("")}
        <div style="background:#fff;border-radius:9px;padding:9px 13px;border:1px solid rgba(255,255,255,.1);cursor:pointer" onclick="goTab('health')">
          <div style="color:#64748b;font-size:10px">স্বাস্থ্য স্কোর</div>
          <div style="color:${hs.scoreColor};font-weight:800;font-size:15px">${hs.score}/১০০ ${hs.scoreLabel}</div>
        </div>
      </div>
    </div>
    ${hs.score<60?`<div style="background:#fff7ed;border:2px solid #fb923c;border-radius:13px;padding:13px 16px;margin-bottom:14px;display:flex;gap:11px;align-items:center"><span style="font-size:20px;flex-shrink:0">⚠️</span><div style="font-size:12.5px;color:#9a3412;font-weight:600">সংগঠনের স্বাস্থ্য স্কোর কম (${hs.score}/১০০) — বকেয়া চাঁদা/ঋণ আদায়ে গুরুত্ব দিন</div></div>`:""}
    ${pinned?`<div style="background:#fffbeb;border:2px solid #fbbf24;border-radius:13px;padding:13px 16px;margin-bottom:14px;display:flex;gap:11px;align-items:flex-start"><span style="font-size:20px;flex-shrink:0">📌</span><div><div style="font-weight:700;font-size:14px;color:#92400e;margin-bottom:3px">${pinned.title}</div><div style="font-size:12px;color:#a16207;line-height:1.6">${pinned.body}</div></div></div>`:""}
    <div class="grid4" style="margin-bottom:14px">
      ${kpis.map(([i,v,l,c,bg])=>`<div class="kpi" style="background:${bg}"><div class="ki">${i}</div><div class="kv" style="color:${c}">${v}</div><div class="kl">${l}</div></div>`).join("")}
    </div>

    <div class="grid2" style="margin-bottom:14px">
      <div class="card">${ch("🏦","সম্পদ ও বকেয়ার বিস্তারিত ভাগ","সর্বমোট হিসাব")}<div class="cb">${pieChart}</div></div>
      <div class="card">${ch("📊","মাসভিত্তিক ট্রেন্ড (৬ মাস)","চাঁদা · আয় · ব্যয় · লাভ","teal")}<div class="cb">${barChart}</div></div>
    </div>

    <div class="card" style="margin-bottom:14px">${ch("🕐","সাম্প্রতিক কার্যক্রম","Recent Activities","p")}${recentHtml}</div>

    <div class="card" style="margin-bottom:14px">${ch("📅",`${BNM[now.getMonth()]} ${now.getFullYear()} — চাঁদার অবস্থা`,`${paidIds.size} জন দিয়েছেন`)}<div style="padding:12px 16px;display:flex;flex-wrap:wrap;gap:7px">${memberStatus}</div></div>
    <div class="grid2">
      <div class="card">${ch("🔴","বকেয়া ঋণ তালিকা","সদস্যভিত্তিক বকেয়া ঋণ","r")}${loanRows}</div>
      <div class="card">${ch("🟠","বকেয়া চাঁদা তালিকা","সদস্যভিত্তিক বকেয়া চাঁদা","gold")}${chadaDueRows}</div>
    </div>
    <div class="card" style="margin-top:14px">${ch("📊","আর্থিক সংক্ষেপ")}
      ${rw("মোট আয়",fmt(totalInc),"hi")}
      ${rw("মোট ব্যয়",fmt(totalExp))}
      ${rw("তহবিল ব্যালেন্স (ব্যাংক স্থিতি)",fmt(fund),"hi")}
      ${rw("মোট সম্পদ (দায় বাদ)",fmt(totalNetAsset))}
      ${rw("মোট বিনিয়োগ",fmt(totalInvest))}

}

function pgSavings(){
  const members=D.members||[], payments=D.payments||[];

  const filtered=payments.filter(p=>p.month===filt);
  const total=filtered.reduce((s,p)=>s+p.amount,0);
  const paidIds=new Set(filtered.map(p=>p.mid));

  const form=isA()?`<div class="card">${ch("💰","চাঁদা যোগ করুন")}<div class="cb">
    <div class="field"><label>সদস্য</label><select id="pMem"><option value="">-- সদস্য --</option>${members.map(m=>`<option value="${m.id}">${m.name}</option>`).join("")}</select></div>

  const mRows=members.map(m=>{

    return `<tr><td><b>${m.name}</b></td><td>${p?bdg(fmt(p.amount)+" ✓","#1a8a00","#dcfce7"):bdg("বাকি ✗","#dc2626","#fee2e2")}</td>
      <td style="color:#1a8a00;font-weight:700">${fmt(allPaid)}</td>
      <td>${isA()&&p?`<button class="btn btn-sm btn-r" style="padding:3px 8px" onclick="delPay(${p.id})">🗑</button>`:""}</td></tr>`;}).join("");

  const hist=payments.slice().reverse().slice(0,10).map(p=>`<tr><td>${gn(p.mid)}</td><td>${p.month}</td><td style="color:#1a8a00;font-weight:700">${fmt(p.amount)}</td><td style="color:#94a3b8;font-size:12px">${p.note||"-"}</td></tr>`).join("");

  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">
      <div><div class="section-title">💰 সঞ্চয় / চাঁদা</div></div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <button class="btn btn-sm" style="background:#1a8a00;color:#fff" onclick="xlDownload('savings')">📊 Excel</button>
        <button class="btn btn-sm" style="background:#dc2626;color:#fff" onclick="pdfDownload('savings')">📄 PDF</button>

    <div class="grid3" style="margin-bottom:14px">
      ${[["💰","মোট সঞ্চয়",fmt(allTotal),"#1a8a00","#f0fdf4"],["📅","এই মাসে",fmt(total),"#006400","#f0fdf4"],["👥","নিয়মিত",`${paidIds.size}/${members.length} জন`,"#1a8a00","#f0fdf4"]].map(([i,l,v,c,bg])=>`<div class="kpi" style="background:${bg};text-align:center"><div class="ki">${i}</div><div class="kv" style="color:${c};font-size:18px">${v}</div><div class="kl">${l}</div></div>`).join("")}
    </div>

      <div style="padding:12px 16px 0"><div class="field"><input type="month" id="sfilt" value="${filt}" onchange="window._sfilt=this.value;goTab('savings')"></div></div>
      ${rw("সংগৃহীত",fmt(total),"hi")}${rw("দিয়েছেন",`${paidIds.size} জন`)}${rw("বাকি",`${members.length-paidIds.size} জন`,"rd-row")}
      <div style="overflow-x:auto;padding:0 16px 14px"><table class="tbl"><thead><tr><th>সদস্য</th><th>এই মাস</th><th>মোট চাঁদা</th><th></th></tr></thead><tbody>${mRows}</tbody></table></div>

    <div class="card">${ch("🕒","সাম্প্রতিক চাঁদা")}

    </div>`;
}
function addPayment(){
  const mid=document.getElementById("pMem").value,amt=Number(document.getElementById("pAmt").value);
  if(!mid||!amt)return;
  const mon=document.getElementById("pMon").value;
  D.payments=[...(D.payments||[]),{id:Date.now(),mid:Number(mid),amount:amt,month:mon,note:document.getElementById("pNote").value}];
  logActivity("payment",`${gn(mid)} — ${mon} মাসের চাঁদা ${fmt(amt)} জমা দিয়েছেন`);
  sv();toast("✅ চাঁদা সেভ হয়েছে");goTab("savings");
}
function delPay(id){
  const p=(D.payments||[]).find(x=>x.id===id);
  D.payments=(D.payments||[]).filter(p=>p.id!==id);
  if(p) logActivity("payment",`${gn(p.mid)} — ${p.month} মাসের চাঁদা ${fmt(p.amount)} মুছে ফেলা হয়েছে`);
  sv();toast("🗑","#dc2626");goTab("savings");
}

function addLoan(){
  const mid=document.getElementById("lMem").value,amt=Number(document.getElementById("lAmt").value);
  if(!mid||!amt)return;
  D.loans=[...(D.loans||[]),{id:Date.now(),mid:Number(mid),principal:amt,remaining:amt,rate:Number(document.getElementById("lRate").value),installment:Number(document.getElementById("lInst").value||0),date:document.getElementById("lDate").value,note:document.getElementById("lNote").value}];
  logActivity("loan",`${gn(mid)} — নতুন ঋণ ${fmt(amt)} টাকা বিতরণ করা হয়েছে`);
  sv();toast("✅ ঋণ যোগ হয়েছে");goTab("loans");
}
function delLoan(id){
  if(!confirm("এই ঋণ মুছবেন?"))return;
  const l=(D.loans||[]).find(x=>x.id===id);
  D.loans=(D.loans||[]).filter(l=>l.id!==id);
  if(l) logActivity("loan",`${gn(l.mid)} — ${fmt(l.principal)} টাকার ঋণ রেকর্ড মুছে ফেলা হয়েছে`);
  sv();toast("🗑 ঋণ মুছে গেছে","#dc2626");goTab("loans");
}
function repay(id){
  const amt=Number(document.getElementById("rp"+id).value);if(!amt)return;
  const l=(D.loans||[]).find(x=>x.id===id);
  D.loans=(D.loans||[]).map(l=>l.id===id?{...l,remaining:Math.max(0,l.remaining-amt)}:l);
  if(l) logActivity("loan",`${gn(l.mid)} — ঋণের কিস্তি ${fmt(amt)} পরিশোধ করেছেন`);
  sv();toast("✅ কিস্তি পরিশোধ হয়েছে");goTab("loans");
}
function editLoan(id){
  const l=(D.loans||[]).find(x=>x.id===id);if(!l)return;
  document.getElementById("el-id").value=l.id;
  document.getElementById("el-mid").value=l.mid;
  document.getElementById("el-principal").value=l.principal;
  document.getElementById("el-remaining").value=l.remaining;
  document.getElementById("el-rate").value=l.rate;
  document.getElementById("el-inst").value=l.installment||0;
  document.getElementById("el-date").value=l.date;
  document.getElementById("el-note").value=l.note||"";
  document.getElementById("loan-edit-modal").style.display="flex";
}
function saveLoanEdit(){
  const id=Number(document.getElementById("el-id").value);
  const principal=Number(document.getElementById("el-principal").value);
  const remaining=Number(document.getElementById("el-remaining").value);
  if(!principal||remaining<0){toast("⚠️ সঠিক তথ্য দিন","#d97706");return;}
  D.loans=(D.loans||[]).map(l=>l.id===id?{
    ...l,
    mid:Number(document.getElementById("el-mid").value),
    principal,remaining,
    rate:Number(document.getElementById("el-rate").value),
    installment:Number(document.getElementById("el-inst").value||0),
    date:document.getElementById("el-date").value,
    note:document.getElementById("el-note").value
  }:l);
  logActivity("loan",`ঋণ আইডি ${id} সম্পাদনা করা হয়েছে`);
  sv();toast("✅ ঋণ আপডেট হয়েছে");closeLoanEdit();goTab("loans");
}
function closeLoanEdit(){
  document.getElementById("loan-edit-modal").style.display="none";
}

function pgAssets(){
  const assets=D.assets||[];
  const cats=["স্থাবর সম্পদ","চলতি সম্পদ","বিনিয়োগ সম্পদ","অস্থাবর সম্পদ","অন্যান্য"];
  const catColors={"স্থাবর সম্পদ":"#1a8a00","চলতি সম্পদ":"#1a8a00","বিনিয়োগ সম্পদ":"#d97706","অস্থাবর সম্পদ":"#7c3aed","অন্যান্য":"#64748b"};
  const total=assets.reduce((s,a)=>s+a.value,0);

  // ── সকল সম্পদের সমষ্টি: তালিকাভুক্ত সম্পদ + তহবিল নগদ + বিনিয়োগ + আদায়যোগ্য (ঋণ+চাঁদা বকেয়া) ──
  const fund=calcFund();
  const totalInvestAll=(D.investments||[]).reduce((s,i)=>s+i.amount,0);
  const totalLoanReceivable=(D.loans||[]).reduce((s,l)=>s+l.remaining,0);
  const duesListAll=getDuesList();
  const totalDueReceivable=duesListAll.reduce((s,m)=>s+Math.max(0,m.totalDue||0),0);
  const grandTotalAssets=total+Math.max(0,fund)+totalInvestAll+totalLoanReceivable+totalDueReceivable;

  // Group by category
  const grouped={};
  cats.forEach(c=>grouped[c]=[]);
  assets.forEach(a=>{if(grouped[a.category])grouped[a.category].push(a);else grouped["অন্যান্য"].push(a);});

  const form=isA()?`<div class="card">${ch("🏛️","নতুন সম্পদ যোগ করুন","","b")}<div class="cb">

      <div class="field"><label>সম্পদের নাম</label><input id="aName" placeholder="যেমন: ব্যাংক জমা"></div>
      <div class="field"><label>ক্যাটাগরি</label><select id="aCat">${cats.map(c=>`<option>${c}</option>`).join("")}</select></div>
    </div>
    <div class="grid2">
      <div class="field"><label>মূল্য (৳)</label><input type="number" id="aVal" placeholder="0"></div>
      <div class="field"><label>তারিখ</label><input type="date" id="aDate" value="${new Date().toISOString().slice(0,10)}"></div>
    </div>
    <div class="field"><label>বিবরণ / দলিল নং</label><input id="aNote" placeholder="বিস্তারিত তথ্য"></div>
    <button class="btn btn-b" onclick="addAsset()">✅ সেভ করুন</button>
  </div></div>`:"";

  const catSummary=cats.map(c=>{
    const items=grouped[c]||[];
    const subtotal=items.reduce((s,a)=>s+a.value,0);
    if(!items.length)return "";
    return `<div class="card"><div style="padding:13px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #f1f5f9">
      <div style="font-weight:700;font-size:14px;color:${catColors[c]||"#64748b"}">${c}</div>
      <div style="font-weight:800;font-size:15px;color:${catColors[c]||"#64748b"}">${fmt(subtotal)}</div>
    </div>
    <div style="overflow-x:auto"><table class="tbl"><thead><tr><th>সম্পদ</th><th>মূল্য (৳)</th><th>তারিখ</th><th>বিবরণ</th>${isA()?"<th></th>":""}</tr></thead><tbody>
      ${items.map(a=>`<tr><td><b>${a.name}</b></td><td style="font-weight:700;color:${catColors[c]||"#64748b"}">${fmt(a.value)}</td><td style="color:#94a3b8;font-size:12px">${ds(a.date)}</td><td style="color:#94a3b8;font-size:12px">${a.note||"-"}</td>${isA()?`<td><button class="btn btn-sm btn-r" style="padding:3px 8px" onclick="delAsset(${a.id})">🗑</button></td>`:""}</tr>`).join("")}
    </tbody></table></div></div>`;}).join("");

  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">
      <div><div class="section-title">🏛️ সম্পদের হিসাব</div></div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <button class="btn btn-sm" style="background:#1a8a00;color:#fff" onclick="xlDownload('assets')">📊 Excel</button>
        <button class="btn btn-sm" style="background:#dc2626;color:#fff" onclick="pdfDownload('assets')">📄 PDF</button>

function pgBalance(){
  const assets=D.assets||[], loans=D.loans||[], payments=D.payments||[], expenses=D.expenses||[], income=D.income||[], investments=D.investments||[];
  const liabilities=D.liabilities||[];
  const totalAsset=assets.reduce((s,a)=>s+a.value,0);
  const totalLoanOut=loans.reduce((s,l)=>s+l.remaining,0);
  const totalInc=income.reduce((s,i)=>s+i.amount,0)+payments.reduce((s,p)=>s+p.amount,0);
  const totalExp=expenses.reduce((s,e)=>s+e.amount,0);
  const fund=totalInc-totalExp;
  const totalInvest=investments.reduce((s,i)=>s+i.amount,0);
  const totalLiability=liabilities.reduce((s,l)=>s+l.amount,0);
  const members=D.members||[];
  const perMember=members.length?fund/members.length:0;
  const duesListB=getDuesList();
  const totalDueChadaB=duesListB.reduce((s,m)=>s+Math.max(0,m.totalDue||0),0);
  // মোট সম্পদ = সম্পদ + বিনিয়োগ + বিতরণকৃত ঋণ + বকেয়া চাঁদা
  const totalNetAsset=totalAsset+totalLoanOut+totalInvest+totalDueChadaB;

  const liabForm=isA()?`
    <div class="card" style="margin-bottom:12px">${ch("➕","নতুন দায় যোগ করুন","বাহ্যিক দেনা — ব্যক্তি বা প্রতিষ্ঠান","r")}
    <div class="cb">
      <div class="grid2">
        <div class="field"><label>পাওনাদারের নাম</label><input id="lb-name" placeholder="ব্যক্তি / প্রতিষ্ঠানের নাম"></div>
        <div class="field"><label>পরিমাণ (৳)</label><input type="number" id="lb-amt" placeholder="0"></div>
      </div>
      <div class="grid2">
        <div class="field"><label>ধরন</label>
          <select id="lb-type" style="width:100%;padding:9px;border-radius:9px;border:1.5px solid var(--border);font-size:13px;font-family:inherit">
            <option>ধার/ঋণ</option><option>পাওনা মজুরি</option><option>সার্ভিস বিল</option><option>অন্যান্য</option>
          </select>
        </div>
        <div class="field"><label>তারিখ</label><input type="date" id="lb-date" value="${new Date().toISOString().slice(0,10)}"></div>
      </div>
      <div class="field"><label>বিবরণ</label><input id="lb-note" placeholder="বিস্তারিত (ঐচ্ছিক)"></div>
      <button class="btn btn-r" onclick="addLiability()">✅ দায় যোগ করুন</button>
    </div></div>`:"";

  const liabRows=liabilities.length?liabilities.slice().reverse().map(l=>`
    <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 16px;border-bottom:1px solid #f1f5f9">
      <div>
        <div style="font-weight:600;font-size:13px;color:#dc2626">${l.name}</div>
        <div style="font-size:11px;color:#94a3b8">${l.type||""} ${l.date?("— "+ds(l.date)):""}${l.note?(" | "+l.note):""}</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-weight:800;color:#dc2626;font-size:14px">${fmt(l.amount)}</span>
        ${isA()?`<button class="btn btn-sm btn-r" style="padding:3px 8px" onclick="delLiability(${l.id})">🗑</button>`:""}
      </div>
    </div>`).join(""):`<div style="padding:16px;text-align:center;color:#94a3b8">কোনো বাহ্যিক দায় নেই ✅</div>`;

  // ── হিসাব ──
  // মোট আয় (চাঁদা + অন্যান্য আয়)
  const totalChada=payments.reduce((s,p)=>s+p.amount,0);
  const totalOtherInc=income.reduce((s,i)=>s+i.amount,0);
  // সম্পদের উপমোট
  const fixedAssetTotal=assets.filter(a=>a.category==="স্থাবর সম্পদ").reduce((s,a)=>s+a.value,0);
  const currentAssetTotal=assets.filter(a=>a.category==="চলতি সম্পদ").reduce((s,a)=>s+a.value,0);
  const otherAssetTotal=assets.filter(a=>a.category!=="স্থাবর সম্পদ"&&a.category!=="চলতি সম্পদ").reduce((s,a)=>s+a.value,0);
  // মোট সম্পদ = স্থাবর + চলতি + অন্যান্য সম্পদ + বিনিয়োগ + বিতরণকৃত ঋণ + বকেয়া চাঁদা + সকল আয়
  // কিন্তু আয় ইতিমধ্যে fund-এ আছে, তাই:
  // মোট সম্পদ = সম্পদ (সব ক্যাটাগরি) + বিনিয়োগ + বিতরণকৃত ঋণ + বকেয়া চাঁদা + নিট তহবিল (fund)
  const totalGrossAsset = totalAsset + totalInvest + totalLoanOut + totalDueChadaB + Math.max(0,fund);
  // নিট সম্পদ = মোট সম্পদ − বাহ্যিক দায়
  const netAsset = totalGrossAsset - totalLiability;
  // প্রতি সদস্যের অংশীদারিত্ব
  const perMemberShare = members.length ? netAsset/members.length : 0;

  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">
      <div><div class="section-title">⚖️ ব্যালেন্স শিট</div></div>
      <div style="display:flex;gap:6px">
        <button class="btn btn-sm" style="background:#1a8a00;color:#fff" onclick="xlDownload('balance')">📊 Excel</button>
        <button class="btn btn-sm" style="background:#dc2626;color:#fff" onclick="pdfDownload('balance')">📄 PDF</button>
      </div>
    </div>

    ${liabForm}

    <div class="card" style="margin-bottom:14px">
      ${ch("⚖️","ব্যালেন্স শিট","স্বপ্নঘুড়ি — "+new Date().getFullYear(),"b")}
      <div class="cb">

        <!-- ১. সম্পদ -->
        <div style="font-weight:800;font-size:14px;color:#1a8a00;margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid #dcfce7">📋 সম্পদ (Assets)</div>

        <div style="margin-bottom:10px">
          <div style="font-weight:700;font-size:11px;color:#64748b;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px">স্থাবর সম্পদ</div>
          ${assets.filter(a=>a.category==="স্থাবর সম্পদ").map(a=>rw(a.name,fmt(a.value))).join("")||rw("কোনো স্থাবর সম্পদ নেই","৳ ০")}
          ${rw("উপমোট",fmt(fixedAssetTotal),"hi")}
        </div>

        <div style="margin-bottom:10px">
          <div style="font-weight:700;font-size:11px;color:#64748b;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px">চলতি সম্পদ</div>
          ${assets.filter(a=>a.category==="চলতি সম্পদ").map(a=>rw(a.name,fmt(a.value))).join("")||rw("কোনো চলতি সম্পদ নেই","৳ ০")}
          ${rw("বিতরণকৃত ঋণ (আদায়যোগ্য)",fmt(totalLoanOut))}
          ${rw("বকেয়া চাঁদা (আদায়যোগ্য)",fmt(totalDueChadaB))}
          ${rw("উপমোট",fmt(currentAssetTotal+totalLoanOut+totalDueChadaB),"hi")}
        </div>

        <div style="margin-bottom:10px">
          <div style="font-weight:700;font-size:11px;color:#64748b;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px">বিনিয়োগ সম্পদ</div>
          ${investments.map(i=>rw(i.title,fmt(i.amount))).join("")||rw("কোনো বিনিয়োগ নেই","৳ ০")}
          ${rw("উপমোট",fmt(totalInvest),"hi")}
        </div>

        <div style="margin-bottom:10px">
          <div style="font-weight:700;font-size:11px;color:#64748b;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px">মূলধন ও আয়</div>

          </div>
          <div style="background:#fff1f2;border-radius:8px;padding:8px;text-align:center">
            <div style="font-weight:800;color:#dc2626">${fmt(tl)}</div>
            <div style="font-size:11px;color:#64748b">বকেয়া ঋণ</div>

        <div class="grid2">

        ${m.join?`<div style="font-size:11px;color:#94a3b8;margin-top:3px">যোগদান: ${m.join}</div>`:""}
        <div style="font-size:11px;color:#94a3b8;margin-top:3px">💼 তহবিলে অংশ: ${fmt(fundShare)}</div>
        <div style="font-size:11px;color:#1a8a00;margin-top:3px;font-weight:700">📌 বর্তমান চাঁদার হার: ${fmt(getApplicableRate(m.id,curMon))}</div>
        <div style="margin-top:10px;display:flex;gap:6px;flex-wrap:wrap">
          <button onclick="openMemberProfile(${m.id})" style="font-size:11px;background:#f0fdf4;border:1px solid #86efac;border-radius:6px;padding:5px 10px;cursor:pointer;color:#006400;font-weight:600">👤 প্রোফাইল</button>
          <button onclick="memberStatPDF(${m.id})" style="font-size:11px;background:#fee2e2;border:none;border-radius:6px;padding:5px 10px;cursor:pointer;color:#dc2626">📄 স্টেটমেন্ট PDF</button>
          <button onclick="memberStatXL(${m.id})" style="font-size:11px;background:#dcfce7;border:none;border-radius:6px;padding:5px 10px;cursor:pointer;color:#16a34a">📊 Excel</button>
          <button onclick="goTab('memberstat');window._statMid=${m.id}" style="font-size:11px;background:#eff6ff;border:none;border-radius:6px;padding:5px 10px;cursor:pointer;color:#2563eb">📋 লেনদেন</button>
        </div>
      </div>
    </div>`;
  }).join("");

  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">
      <div><div class="section-title">👥 সদস্যবৃন্দ</div>

    </div>
    ${form}
    <div class="field" style="margin-bottom:10px"><input type="text" placeholder="🔎 সদস্য খুঁজুন..." oninput="filterCardsByName(this.value,'members-grid')"></div>
    <div class="gauto" id="members-grid">${cards||`<div style="text-align:center;padding:40px;color:#94a3b8">👥 কোনো সদস্য নেই</div>`}</div>

    <!-- সদস্য সম্পাদনা Modal -->

        <div class="field"><label>যোগদানের মাস</label><input type="month" id="em-join"></div>
        <div class="field"><label>মাসিক চাঁদার হার (৳)</label><input type="number" id="em-rate" placeholder="2000"></div>

        </div>
      </div>

}

function openMemberProfile(mid){
  const m=(D.members||[]).find(x=>x.id==mid);
  if(!m) return;
  const payments=(D.payments||[]).filter(p=>p.mid==mid);
  const loans=(D.loans||[]).filter(l=>l.mid==mid);
  const duesList=getDuesList();
  const dueRec=duesList.find(x=>x.id==mid)||{};
  const meetings=D.meetings||[];
  const attCount=meetings.filter(mt=>(mt.attendance||{})[mid]).length;
  const attPct=meetings.length?Math.round(attCount/meetings.length*100):0;
  const totalPaid=payments.reduce((s,p)=>s+p.amount,0);
  const totalDueChada=Math.max(0,dueRec.totalDue||0);
  const totalLoan=loans.reduce((s,l)=>s+l.principal,0);
  const totalLoanDue=loans.reduce((s,l)=>s+l.remaining,0);
  const fundShare=calcFund()/Math.max(1,(D.members||[]).length);
  const curRate=getApplicableRate(mid,curMon);
  const lastPay=payments.sort((a,b)=>b.id-a.id)[0];
  const lastLoan=loans.sort((a,b)=>b.id-a.id)[0];
  const bloodGroups=["A+","A-","B+","B-","AB+","AB-","O+","O-"];

  const tabBtn=(id,label,active)=>`<button onclick="switchProfileTab('${id}')" id="ptab-${id}" style="padding:8px 14px;border:none;border-radius:8px;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;background:${active?"#006400":"#f1f5f9"};color:${active?"#fff":"#64748b"};transition:all .2s">${label}</button>`;

  const sel=(id,opts,val)=>`<select id="ep-${id}" style="width:100%;padding:8px;border-radius:8px;border:1.5px solid #e2e8f0;font-size:12px;font-family:inherit">${opts.map(o=>`<option${o===val?" selected":""}>${o}</option>`).join("")}</select>`;
  const inp=(id,val,ph,type="text")=>`<input id="ep-${id}" type="${type}" value="${val||""}" placeholder="${ph}" style="width:100%;padding:8px;border-radius:8px;border:1.5px solid #e2e8f0;font-size:12px;font-family:inherit;box-sizing:border-box">`;
  const fld=(label,content)=>`<div style="margin-bottom:10px"><div style="font-size:11px;color:#64748b;margin-bottom:3px;font-weight:600">${label}</div>${content}</div>`;
  const row=(label,value,color="#071a07")=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f1f5f9"><span style="font-size:12px;color:#64748b">${label}</span><span style="font-size:13px;font-weight:700;color:${color}">${value}</span></div>`;

  const html=`<div id="member-profile-modal" style="position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9999;display:flex;align-items:flex-start;justify-content:center;padding:10px;overflow-y:auto" onclick="if(event.target===this)closeMemberProfile()">
  <div style="background:#fff;border-radius:16px;width:100%;max-width:480px;overflow:hidden;margin:auto">

    <!-- Header -->
    <div style="background:linear-gradient(135deg,#006400,#1a8a00);padding:20px;position:relative">
      <button onclick="closeMemberProfile()" style="position:absolute;top:12px;right:12px;background:rgba(255,255,255,.2);border:none;border-radius:8px;padding:4px 10px;cursor:pointer;color:#fff;font-size:16px">✕</button>
      <button onclick="memberProfilePDF(${mid})" style="position:absolute;top:12px;right:54px;background:rgba(255,255,255,.2);border:none;border-radius:8px;padding:4px 10px;cursor:pointer;color:#fff;font-size:12px;font-weight:600">📄 PDF</button>
      <div style="display:flex;align-items:center;gap:14px">
        ${m.photo?`<img src="${m.photo}" style="width:64px;height:64px;border-radius:50%;object-fit:cover;border:3px solid rgba(255,255,255,.5)">`:`<div style="width:64px;height:64px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:800;color:#fff;border:3px solid rgba(255,255,255,.3)">${m.name?m.name[0]:""}</div>`}
        <div>
          <div style="font-size:18px;font-weight:800;color:#fff">${m.name}</div>
          <div style="font-size:12px;color:rgba(255,255,255,.8);margin-top:2px">${m.role||"সদস্য"} | আইডি: #${String(mid).slice(-4)}</div>
          <div style="font-size:11px;color:rgba(255,255,255,.7);margin-top:2px">যোগদান: ${m.join||"—"}</div>
        </div>
      </div>
    </div>

    <!-- Tabs -->
    <div style="display:flex;gap:6px;padding:12px;overflow-x:auto;background:#f8fafc;flex-wrap:wrap">
      ${tabBtn("personal","👤 ব্যক্তিগত",true)}
      ${tabBtn("contact","📞 যোগাযোগ",false)}
      ${tabBtn("org","🏛️ সংগঠন",false)}
      ${tabBtn("finance","💰 আর্থিক",false)}
      ${tabBtn("banking","🏦 ব্যাংকিং",false)}
      ${tabBtn("emergency","☎️ জরুরি",false)}

    <div style="padding:16px;max-height:60vh;overflow-y:auto">

      <!-- ১. ব্যক্তিগত -->
      <div id="ptab-personal-content">
        <div style="text-align:center;margin-bottom:14px">
          ${m.photo?`<img src="${m.photo}" style="width:80px;height:80px;border-radius:50%;object-fit:cover;border:3px solid #006400;margin-bottom:8px">`:`<div style="width:80px;height:80px;border-radius:50%;background:#dcfce7;display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:800;color:#006400;margin:0 auto 8px">${m.name?m.name[0]:""}</div>`}
          <label style="background:#f0fdf4;border:1px solid #86efac;border-radius:8px;padding:6px 12px;cursor:pointer;font-size:12px;color:#006400;font-weight:600">📷 ছবি পরিবর্তন<input type="file" accept="image/*" onchange="changeMemberPhoto(${mid},this)" style="display:none"></label>
        </div>
        <div class="grid2">
          ${fld("বাংলা নাম",inp("bname",m.name,"বাংলা নাম"))}
          ${fld("ইংরেজি নাম",inp("ename",m.ename,"English Name"))}
        </div>
        <div class="grid2">
          ${fld("পিতার নাম",inp("father",m.father,"পিতার নাম"))}

        </div>
        <div class="grid2">

          ${fld("রক্তের গ্রুপ",sel("blood",bloodGroups,m.blood||""))}
        </div>
        <div class="grid2">
          ${fld("পেশা",inp("occupation",m.occupation,"পেশা"))}
          ${fld("বৈবাহিক অবস্থা",sel("marital",["অবিবাহিত","বিবাহিত","বিধবা/বিধুর","তালাকপ্রাপ্ত"],m.marital||""))}
        </div>
        ${fld("NID নম্বর",inp("nid",m.nid,"জাতীয় পরিচয়পত্র নম্বর"))}
        <button onclick="saveMemberProfile(${mid})" class="btn btn-g" style="width:100%;margin-top:6px">✅ সেভ করুন</button>
      </div>

      <!-- ২. যোগাযোগ -->
      <div id="ptab-contact-content" style="display:none">
        ${fld("মোবাইল নম্বর",inp("phone",m.phone,"01XXXXXXXXX","tel"))}
        ${fld("বিকল্প নম্বর",inp("altphone",m.altphone,"01XXXXXXXXX","tel"))}
        ${fld("ই-মেইল",inp("email",m.email,"email@example.com","email"))}
        ${fld("বর্তমান ঠিকানা",`<textarea id="ep-address" style="width:100%;padding:8px;border-radius:8px;border:1.5px solid #e2e8f0;font-size:12px;font-family:inherit;box-sizing:border-box;height:60px">${m.address||""}</textarea>`)}
        ${fld("স্থায়ী ঠিকানা",`<textarea id="ep-permaddress" style="width:100%;padding:8px;border-radius:8px;border:1.5px solid #e2e8f0;font-size:12px;font-family:inherit;box-sizing:border-box;height:60px">${m.permaddress||""}</textarea>`)}
        <button onclick="saveMemberProfile(${mid})" class="btn btn-g" style="width:100%;margin-top:6px">✅ সেভ করুন</button>

      <!-- ৩. সংগঠন -->
      <div id="ptab-org-content" style="display:none">
        ${row("সদস্য আইডি","#"+String(mid).slice(-4))}

        ${row("মোট বকেয়া চাঁদা",fmt(totalDueChada),"#dc2626")}
        ${row("মোট ঋণ গ্রহণ",fmt(totalLoan),"#d97706")}
        ${row("অবশিষ্ট ঋণ",fmt(totalLoanDue),"#dc2626")}
        ${row("তহবিলে অংশ",fmt(fundShare),"#7c3aed")}
        ${row("মোট উপস্থিতি",`${attCount}/${meetings.length}`)}
        <div style="background:#fff1f2;border-radius:10px;padding:10px;margin-top:12px;text-align:center">

        ${fld("বিকাশ",inp("bkash",m.bkash,"01XXXXXXXXX","tel"))}
        ${fld("নগদ",inp("nagad",m.nagad,"01XXXXXXXXX","tel"))}
        ${fld("রকেট",inp("rocket",m.rocket,"01XXXXXXXXX","tel"))}

      </div>

        ${fld("নমিনির নাম",inp("nomname",m.nomname,"নমিনির নাম"))}
        ${fld("সম্পর্ক",inp("nomrel",m.nomrel,"সম্পর্ক"))}

function switchProfileTab(id){
  document.querySelectorAll('[id^="ptab-"][id$="-content"]').forEach(el=>el.style.display="none");
  document.querySelectorAll('[id^="ptab-"]:not([id$="-content"])').forEach(btn=>{btn.style.background="#f1f5f9";btn.style.color="#64748b";});
  const content=document.getElementById("ptab-"+id+"-content");
  const btn=document.getElementById("ptab-"+id);
  if(content) content.style.display="block";
  if(btn){btn.style.background="#006400";btn.style.color="#fff";}
}

function saveMemberProfile(mid){
  const m=(D.members||[]).find(x=>x.id==mid);
  if(!m) return;
  const g=id=>document.getElementById("ep-"+id);
  const gv=id=>{const el=g(id);return el?el.value.trim():undefined;};
  const fields=["bname","ename","father","mother","dob","blood","occupation","marital","nid",
    "phone","altphone","email","address","permaddress",
    "role","status","join",
    "bankname","banknum","bkash","nagad","rocket",
    "emname","emrel","emphone","emaddress",
    "nomname","nomrel","nomphone","nomaddress","adminnote"];
  const fieldMap={bname:"name",phone:"phone",role:"role",join:"join"};
  fields.forEach(fid=>{
    const val=gv(fid);
    if(val!==undefined){
      const key=fieldMap[fid]||fid;
      m[key]=val;
    }
  });
  sv();toast("✅ প্রোফাইল সেভ হয়েছে");
}

function changeMemberPhoto(mid,input){
  const f=input.files[0];if(!f)return;
  if(f.size>2097152){toast("⚠️ ছবি ২ MB-র কম হতে হবে","#d97706");return;}
  const r=new FileReader();
  r.onload=e=>{
    const m=(D.members||[]).find(x=>x.id==mid);
    if(m){m.photo=e.target.result;sv();toast("✅ ছবি আপডেট হয়েছে");closeMemberProfile();openMemberProfile(mid);}
  };
  r.readAsDataURL(f);
}

function uploadMemberDoc(mid,field,input){
  const f=input.files[0];if(!f)return;
  if(f.size>5242880){toast("⚠️ ফাইল ৫ MB-র কম হতে হবে","#d97706");return;}
  const r=new FileReader();
  r.onload=e=>{
    const m=(D.members||[]).find(x=>x.id==mid);
    if(m){m[field]=e.target.result;sv();toast("✅ ফাইল আপলোড হয়েছে");closeMemberProfile();openMemberProfile(mid);}
  };
  r.readAsDataURL(f);
}

  D.members=[...(D.members||[]),{
    id:Date.now(),name:n,
    phone:document.getElementById("mPh").value,
    role:document.getElementById("mRl").value,
    join:document.getElementById("mJn").value,
    monthlyRate:Number(document.getElementById("mRt").value||2000),

    status:"সক্রিয়"
  }];
  logActivity("member",`নতুন সদস্য যোগ হয়েছে: ${n} (${document.getElementById("mRl").value})`);

function saveMemberEdit(){
  const id=Number(document.getElementById("em-id").value);

    role:document.getElementById("em-role").value,

function delMember(id){
  if(!confirm("এই সদস্য মুছবেন?"))return;
  const m=(D.members||[]).find(x=>x.id===id);
  D.members=(D.members||[]).filter(m=>m.id!==id);
  if(m) logActivity("member",`সদস্য মুছে ফেলা হয়েছে: ${m.name}`);
  sv();toast("🗑","#dc2626");goTab("members");
}

function pgGallery(){
  const gal=D.gallery||[];
  const fileIcon=type=>{
    if(!type) return "📄";
    if(type.startsWith("image")) return "🖼️";
    if(type.startsWith("video")) return "🎬";
    if(type.startsWith("audio")) return "🎵";
    if(type.includes("pdf")) return "📕";
    if(type.includes("word")||type.includes("doc")) return "📝";
    if(type.includes("sheet")||type.includes("excel")||type.includes("csv")) return "📊";
    return "📄";
  };
  const renderItem=g=>{
    const isImg=g.type&&g.type.startsWith("image")||(!g.type&&g.src&&g.src.startsWith("data:image"));
    const isVid=g.type&&g.type.startsWith("video");
    const isAud=g.type&&g.type.startsWith("audio");
    let media="";
    if(isImg) media=`<img src="${g.src}" style="width:100%;height:130px;object-fit:cover;display:block;cursor:pointer" onclick="openGalleryItem(${g.id})">`;
    else if(isVid) media=`<video src="${g.src}" controls style="width:100%;height:130px;object-fit:cover;display:block"></video>`;
    else if(isAud) media=`<div style="background:#f0fdf4;padding:14px;text-align:center"><div style="font-size:32px">🎵</div><audio src="${g.src}" controls style="width:100%;margin-top:6px"></audio></div>`;
    else media=`<div style="background:#f8fafc;height:130px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:6px;cursor:pointer" onclick="openGalleryItem(${g.id})"><div style="font-size:40px">${fileIcon(g.type)}</div><div style="font-size:11px;color:#64748b">${g.name||"ফাইল"}</div><a href="${g.src}" download="${g.name||"file"}" style="font-size:11px;background:#006400;color:#fff;padding:4px 10px;border-radius:6px;text-decoration:none">⬇️ ডাউনলোড</a></div>`;
    return `<div style="border-radius:11px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.07);background:var(--white);position:relative">
      ${media}
      <div style="padding:7px 9px">
        <div style="font-size:11px;font-weight:600;color:var(--ink)">${g.caption||g.name||""}</div>
        <div style="font-size:10px;color:#94a3b8;margin-top:2px">${ds(g.date)}</div>
      </div>

function prevFile(i){

  window._gtype=f.type;window._gname=f.name;
  const r=new FileReader();
  r.onload=e=>{
    window._gid=e.target.result;
    const isImg=f.type.startsWith("image");
    const isVid=f.type.startsWith("video");
    const isAud=f.type.startsWith("audio");
    let prev="";
    if(isImg) prev=`<img src="${e.target.result}" style="max-height:120px;border-radius:7px;object-fit:cover">`;
    else if(isVid) prev=`<video src="${e.target.result}" style="max-height:120px;border-radius:7px" controls></video>`;
    else if(isAud) prev=`<div style="font-size:28px">🎵</div><audio src="${e.target.result}" controls style="width:100%"></audio>`;
    else prev=`<div style="font-size:36px">📄</div><div style="font-size:12px;color:#64748b">${f.name}</div>`;
    document.getElementById("ipv").innerHTML=`<div style="display:flex;flex-direction:column;align-items:center;gap:8px">${prev}<div style="font-size:11px;color:#1a8a00;font-weight:600">✅ প্রস্তুত: ${f.name}</div></div>`;
  };
  r.readAsDataURL(f);
}

function fmtText(type) {
  const ta = document.getElementById("ntB");
  if(!ta) return;
  const start = ta.selectionStart, end = ta.selectionEnd;
  const sel = ta.value.substring(start, end);
  let ins = "";
  if(type==="bold") ins = `**${sel||"গাঢ় লেখা"}**`;
  else if(type==="italic") ins = `_${sel||"বাঁকা লেখা"}_`;
  else if(type==="ul") ins = `\n• ${sel||"আইটেম"}`;
  else if(type==="ol") ins = `\n১. ${sel||"আইটেম"}`;
  else if(type==="hr") ins = `\n────────────────\n`;
  ta.value = ta.value.substring(0,start) + ins + ta.value.substring(end);
  ta.focus();
}

function renderNoticeBody(text) {
  if(!text) return "";
  let t = text
    .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
    .replace(/_(.+?)_/g, "<em>$1</em>")
    .replace(/^• (.+)/gm, "<li style='margin-left:16px;margin-bottom:4px'>$1</li>")
    .replace(/^\d+\. (.+)/gm, "<li style='margin-left:16px;margin-bottom:4px'>$1</li>")
    .replace(/────+/g, "<hr style='border:none;border-top:1px solid #e2e8f0;margin:8px 0'>")
    .replace(/\n/g, "<br>");
  return t;
}

function xlDownload(type){
  const bom="\uFEFF";
  let csv="", fn="";
  const members=D.members||[], payments=D.payments||[], loans=D.loans||[];
  const income=D.income||[], expenses=D.expenses||[], investments=D.investments||[], assets=D.assets||[];

  if(type==="savings"){
    fn="চাঁদা_রিপোর্ট";
    csv="সদস্য,মাস,পরিমাণ,নোট\n";
    payments.forEach(p=>{ csv+=`${(members.find(m=>m.id==p.mid)||{}).name||""},${p.month},${p.amount},"${p.note||""}"\n`; });
    csv+=`\nমোট,,${payments.reduce((s,p)=>s+p.amount,0)},\n`;

  } else if(type==="loans"){
    fn="ঋণ_রিপোর্ট";
    csv="সদস্য,তারিখ,মূল ঋণ,বকেয়া,পরিশোধিত,সুদের হার,মাসিক কিস্তি,উদ্দেশ্য,অবস্থা\n";
    loans.forEach(l=>{
      const name=(members.find(m=>m.id==l.mid)||{}).name||"";
      const status=l.remaining===0?"পরিশোধিত":l.remaining<l.principal?"আংশিক":"বাকি";
      csv+=`${name},${l.date},${l.principal},${l.remaining},${l.principal-l.remaining},${l.rate}%,${l.installment||0},"${l.note||""}",${status}\n`;
    });
    csv+=`\nমোট,,${loans.reduce((s,l)=>s+l.principal,0)},${loans.reduce((s,l)=>s+l.remaining,0)},${loans.reduce((s,l)=>s+(l.principal-l.remaining),0)},,,\n`;

  } else if(type==="invest"){
    fn="বিনিয়োগ_রিপোর্ট";
    csv="বিনিয়োগ,ধরন,পরিমাণ,প্রত্যাশিত আয়,তারিখ,অবস্থা,বিবরণ\n";
    investments.forEach(i=>{ csv+=`"${i.title}","${i.type}",${i.amount},${Math.round(i.amount*i.returnRate/100)},${i.date},"${i.status||"সক্রিয়"}","${i.note||""}"\n`; });
    csv+=`\nমোট,,,${investments.reduce((s,i)=>s+i.amount,0)},,,\n`;

  } else if(type==="assets"){
    fn="সম্পদ_রিপোর্ট";
    csv="সম্পদের নাম,ক্যাটাগরি,মূল্য,তারিখ,বিবরণ\n";
    assets.forEach(a=>{ csv+=`"${a.name}","${a.category}",${a.value},${a.date},"${a.note||""}"\n`; });
    csv+=`\nমোট,,${assets.reduce((s,a)=>s+a.value,0)},,\n`;

  } else if(type==="expenses"){
    fn="আয়_ব্যয়_রিপোর্ট";
    csv="তারিখ,বিবরণ,ক্যাটাগরি,আয়,ব্যয়\n";
    [...income].forEach(i=>{ csv+=`${i.date},"${i.title}","${i.category||""}",${i.amount},\n`; });
    payments.forEach(p=>{ csv+=`${p.month}-01,"${(members.find(m=>m.id==p.mid)||{}).name||""} — চাঁদা","সদস্য চাঁদা",${p.amount},\n`; });
    expenses.forEach(e=>{ csv+=`${e.date},"${e.title}","${e.category||""}","",${e.amount}\n`; });
    const totI=income.reduce((s,i)=>s+i.amount,0)+payments.reduce((s,p)=>s+p.amount,0);
    const totE=expenses.reduce((s,e)=>s+e.amount,0);
    csv+=`\nমোট আয়,,,${totI},\nমোট ব্যয়,,,,${totE}\nনিট উদ্বৃত্ত,,,${totI-totE},\n`;

  } else if(type==="balance"){
    fn="ব্যালেন্স_শিট";
    const totI=income.reduce((s,i)=>s+i.amount,0)+payments.reduce((s,p)=>s+p.amount,0);
    const totE=expenses.reduce((s,e)=>s+e.amount,0);
    csv="বিবরণ,পরিমাণ\n";
    csv+="=== সম্পদ ===,\n";
    assets.forEach(a=>{ csv+=`"${a.name} (${a.category})",${a.value}\n`; });
    csv+=`বিতরণকৃত ঋণ,${loans.reduce((s,l)=>s+l.remaining,0)}\n`;
    investments.forEach(i=>{ csv+=`"${i.title} (বিনিয়োগ)",${i.amount}\n`; });
    csv+="\n=== দায় ও মূলধন ===,\n";
    csv+=`মোট আয়,${totI}\nমোট ব্যয়,-${totE}\nনিট তহবিল,${totI-totE}\n`;
  }

  const blob=new Blob([bom+csv],{type:"text/csv;charset=utf-8;"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url; a.download=fn+".csv"; a.click();
  URL.revokeObjectURL(url);
  toast("✅ Excel/CSV ডাউনলোড শুরু হয়েছে");
}

function fullExcelDownload(){
  const bom="\uFEFF";
  const members=D.members||[], payments=D.payments||[], loans=D.loans||[];
  const income=D.income||[], expenses=D.expenses||[], investments=D.investments||[];
  const assets=D.assets||[], liabilities=D.liabilities||[], specialMonths=D.specialMonths||[];
  const duesList=getDuesList();

  // ── সব শিট একটা CSV-এ বিভাগ দিয়ে ──
  let csv="";

  // ১. সারসংক্ষেপ
  const totChada=payments.reduce((s,p)=>s+p.amount,0);
  const totOtherInc=income.reduce((s,i)=>s+i.amount,0);
  const totInc=totChada+totOtherInc;
  const totExp=expenses.reduce((s,e)=>s+e.amount,0);
  const fund=totInc-totExp;
  const totInvest=investments.reduce((s,i)=>s+i.amount,0);
  const totAsset=assets.reduce((s,a)=>s+a.value,0);
  const totLoanOut=loans.reduce((s,l)=>s+l.remaining,0);
  const totDueChada=duesList.reduce((s,m)=>s+Math.max(0,m.totalDue||0),0);
  const totLiability=liabilities.reduce((s,l)=>s+l.amount,0);
  const totNetAsset=totAsset+totInvest+totLoanOut+totDueChada+Math.max(0,fund);

  csv+="স্বপ্নঘুড়ি — সম্পূর্ণ আর্থিক প্রতিবেদন\n";
  csv+=`তারিখ:,${new Date().toLocaleDateString("bn-BD")}\n\n`;

  csv+="=== ১. সারসংক্ষেপ ===\n";
  csv+="বিবরণ,পরিমাণ\n";
  csv+=`মোট সদস্য,${members.length}\n`;
  csv+=`সদস্যদের মোট চাঁদা,${totChada}\n`;
  csv+=`অন্যান্য আয়,${totOtherInc}\n`;
  csv+=`সর্বমোট আয়,${totInc}\n`;
  csv+=`সর্বমোট ব্যয়,${totExp}\n`;
  csv+=`নিট তহবিল (ব্যাংক),${fund}\n`;
  csv+=`মোট বিনিয়োগ,${totInvest}\n`;
  csv+=`মোট স্থাবর/চলতি সম্পদ,${totAsset}\n`;
  csv+=`বিতরণকৃত ঋণ (আদায়যোগ্য),${totLoanOut}\n`;
  csv+=`বকেয়া চাঁদা (আদায়যোগ্য),${totDueChada}\n`;
  csv+=`সর্বমোট সম্পদ,${totNetAsset}\n`;
  csv+=`মোট বাহ্যিক দায়,${totLiability}\n`;
  csv+=`নিট সম্পদ (সম্পদ − দায়),${totNetAsset-totLiability}\n\n`;

  // ২. সদস্য তালিকা
  csv+="=== ২. সদস্য তালিকা ===\n";
  csv+="নাম,পদ,যোগদানের তারিখ,মোট চাঁদা,বকেয়া চাঁদা,মোট ঋণ,ঋণ বকেয়া\n";
  members.forEach(m=>{
    const mPay=payments.filter(p=>p.mid==m.id).reduce((s,p)=>s+p.amount,0);
    const mDue=(duesList.find(d=>d.id==m.id)||{}).totalDue||0;
    const mLoans=loans.filter(l=>l.mid==m.id);
    const mLoan=mLoans.reduce((s,l)=>s+l.principal,0);
    const mLoanDue=mLoans.reduce((s,l)=>s+l.remaining,0);
    csv+=`"${m.name}","${m.role||"সদস্য"}",${m.joinDate||""},${mPay},${mDue},${mLoan},${mLoanDue}\n`;
  });
  csv+="\n";

  // ৩. চাঁদার ইতিহাস
  csv+="=== ৩. চাঁদার ইতিহাস ===\n";
  csv+="সদস্য,মাস,নিয়মিত চাঁদা,বিশেষ চাঁদা,মোট নির্ধারিত,পরিশোধ,বকেয়া,অবস্থা\n";
  const allMonths=[];
  let d=new Date(2021,10,1);
  while(d<=new Date()){allMonths.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`);d=new Date(d.getFullYear(),d.getMonth()+1,1);}
  members.forEach(m=>{

      const sp=specialMonths.find(s=>s.mid==m.id&&s.month===mon);
      const reg=getApplicableRate(m.id,mon);
      const total=reg+(sp?sp.amount:0);

  loans.forEach(l=>{

    csv+=`"${name}",${l.date},${l.principal},${l.remaining},${l.principal-l.remaining},${l.rate}%,${l.installment||0},"${l.note||""}",${status}\n`;
  });
  csv+=`\nমোট,,${loans.reduce((s,l)=>s+l.principal,0)},${loans.reduce((s,l)=>s+l.remaining,0)},${loans.reduce((s,l)=>s+(l.principal-l.remaining),0)},,,\n\n`;

  // ৫. বিনিয়োগ
  csv+="=== ৫. বিনিয়োগ ===\n";
  csv+="বিনিয়োগ,ধরন,পরিমাণ,প্রত্যাশিত আয়,তারিখ,অবস্থা,বিবরণ\n";
  investments.forEach(i=>{ csv+=`"${i.title}","${i.type}",${i.amount},${Math.round(i.amount*(i.returnRate||0)/100)},${i.date},"${i.status||"সক্রিয়"}","${i.note||""}"\n`; });
  csv+=`\nমোট,,${totInvest},,,,\n\n`;

  // ৬. সম্পদ
  csv+="=== ৬. সম্পদ ===\n";
  csv+="সম্পদের নাম,ক্যাটাগরি,মূল্য,তারিখ,বিবরণ\n";
  assets.forEach(a=>{ csv+=`"${a.name}","${a.category}",${a.value},${a.date},"${a.note||""}"\n`; });
  csv+=`\nমোট,,${totAsset},,\n\n`;

  // ৭. আয়
  csv+="=== ৭. অন্যান্য আয় ===\n";
  csv+="তারিখ,বিবরণ,ক্যাটাগরি,পরিমাণ\n";
  income.forEach(i=>{ csv+=`${i.date},"${i.title}","${i.category||""}",${i.amount}\n`; });
  csv+=`\nমোট,,,${totOtherInc}\n\n`;

  // ৮. ব্যয়
  csv+="=== ৮. ব্যয়ের ইতিহাস ===\n";
  csv+="তারিখ,বিবরণ,ক্যাটাগরি,পরিমাণ\n";
  expenses.forEach(e=>{ csv+=`${e.date},"${e.title}","${e.category||""}",${e.amount}\n`; });
  csv+=`\nমোট,,,${totExp}\n\n`;

  // ৯. বাহ্যিক দায়
  csv+="=== ৯. বাহ্যিক দায় ===\n";
  csv+="পাওনাদার,ধরন,পরিমাণ,তারিখ,বিবরণ\n";
  liabilities.forEach(l=>{ csv+=`"${l.name}","${l.type||""}",${l.amount},${l.date||""},"${l.note||""}"\n`; });
  csv+=`\nমোট,,${totLiability},,\n\n`;

  // ১০. ব্যালেন্স শিট
  csv+="=== ১০. ব্যালেন্স শিট ===\n";
  csv+="বিবরণ,পরিমাণ\n";
  csv+="--- সম্পদ ---,\n";
  assets.forEach(a=>{ csv+=`"${a.name} (${a.category})",${a.value}\n`; });
  csv+=`বিতরণকৃত ঋণ,${totLoanOut}\n`;
  csv+=`বকেয়া চাঁদা,${totDueChada}\n`;
  investments.forEach(i=>{ csv+=`"${i.title} (বিনিয়োগ)",${i.amount}\n`; });
  csv+=`নিট তহবিল,${Math.max(0,fund)}\n`;
  csv+=`সর্বমোট সম্পদ,${totNetAsset}\n`;
  csv+="--- বাহ্যিক দায় ---,\n";
  liabilities.forEach(l=>{ csv+=`"${l.name}",${l.amount}\n`; });
  csv+=`মোট দায়,${totLiability}\n`;
  csv+=`নিট সম্পদ (সম্পদ − দায়),${totNetAsset-totLiability}\n`;

  const blob=new Blob([bom+csv],{type:"text/csv;charset=utf-8;"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;
  a.download=`স্বপ্নঘুড়ি_সম্পূর্ণ_হিসাব_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  toast("✅ সম্পূর্ণ হিসাব ডাউনলোড শুরু হয়েছে");
}

function pdfDownload(type){
  const members=D.members||[], payments=D.payments||[], loans=D.loans||[];

  if(type==="savings"){
