    </tbody></table>`;
  } else if(type==="loans"){
    title="ঋণ ব্যবস্থাপনা রিপোর্ট";
    tableHTML=`<table><thead><tr><th style="text-align:left">সদস্য</th><th>মূল ঋণ</th><th>বকেয়া</th><th>পরিশোধ</th><th>অবস্থা</th></tr></thead><tbody>
      ${loans.map(l=>{const n=(members.find(m=>m.id==l.mid)||{}).name||"";const s=l.remaining===0?"পরিশোধিত":l.remaining<l.principal?"আংশিক":"বাকি";return `<tr><td style="text-align:left">${n}</td><td>${fmtBn(l.principal)}</td><td style="color:#dc2626;font-weight:600">${fmtBn(l.remaining)}</td><td>${fmtBn(l.principal-l.remaining)}</td><td>${s}</td></tr>`;}).join("")}
      <tr style="background:#f0fdf4;font-weight:800"><td style="text-align:left">সর্বমোট</td><td>${fmtBn(loans.reduce((s,l)=>s+l.principal,0))}</td><td style="color:#dc2626">${fmtBn(loans.reduce((s,l)=>s+l.remaining,0))}</td><td>${fmtBn(loans.reduce((s,l)=>s+(l.principal-l.remaining),0))}</td><td></td></tr>
    </tbody></table>`;
  } else if(type==="invest"){
    title="বিনিয়োগ রিপোর্ট";
    tableHTML=`<table><thead><tr><th style="text-align:left">বিনিয়োগ</th><th>ধরন</th><th>পরিমাণ</th><th>প্রত্যাশিত আয়</th><th>অবস্থা</th></tr></thead><tbody>
      ${investments.map(i=>`<tr><td style="text-align:left">${i.title}</td><td>${i.type}</td><td>${fmtBn(i.amount)}</td><td>${fmtBn(Math.round(i.amount*(i.returnRate||0)/100))}</td><td>${i.status||"সক্রিয়"}</td></tr>`).join("")}
      <tr style="background:#f0fdf4;font-weight:800"><td colspan="2" style="text-align:left">সর্বমোট</td><td>${fmtBn(investments.reduce((s,i)=>s+i.amount,0))}</td><td></td><td></td></tr>
    </tbody></table>`;
  } else if(type==="assets"){
    title="সম্পদের হিসাব";
    tableHTML=`<table><thead><tr><th style="text-align:left">সম্পদ</th><th>ক্যাটাগরি</th><th>মূল্য</th><th>তারিখ</th></tr></thead><tbody>
      ${assets.map(a=>`<tr><td style="text-align:left">${a.name}</td><td>${a.category}</td><td>${fmtBn(a.value)}</td><td>${a.date}</td></tr>`).join("")}
      <tr style="background:#f0fdf4;font-weight:800"><td colspan="2" style="text-align:left">সর্বমোট</td><td>${fmtBn(assets.reduce((s,a)=>s+a.value,0))}</td><td></td></tr>
    </tbody></table>`;
  } else if(type==="expenses"){
    title="আয়-ব্যয় বিবরণী";
    const totI=income.reduce((s,i)=>s+i.amount,0)+payments.reduce((s,p)=>s+p.amount,0);
    const totE=expenses.reduce((s,e)=>s+e.amount,0);
    tableHTML=`<table><thead><tr><th style="text-align:left">বিবরণ</th><th>ক্যাটাগরি</th><th>আয়</th><th>ব্যয়</th></tr></thead><tbody>
      ${income.map(i=>`<tr><td style="text-align:left">${i.title}</td><td>${i.category||""}</td><td style="color:#16a34a;font-weight:600">${fmtBn(i.amount)}</td><td>—</td></tr>`).join("")}
      <tr><td style="text-align:left">সদস্য চাঁদা (মোট)</td><td>সদস্য চাঁদা</td><td style="color:#16a34a;font-weight:600">${fmtBn(payments.reduce((s,p)=>s+p.amount,0))}</td><td>—</td></tr>
      ${expenses.map(e=>`<tr><td style="text-align:left">${e.title}</td><td>${e.category||""}</td><td>—</td><td style="color:#dc2626;font-weight:600">${fmtBn(e.amount)}</td></tr>`).join("")}
      <tr style="background:#f0fdf4;font-weight:800"><td colspan="2" style="text-align:left">সর্বমোট</td><td style="color:#16a34a">${fmtBn(totI)}</td><td style="color:#dc2626">${fmtBn(totE)}</td></tr>
      <tr style="background:#dcfce7;font-weight:800"><td colspan="2" style="text-align:left">নিট উদ্বৃত্ত</td><td colspan="2">${fmtBn(totI-totE)}</td></tr>
    </tbody></table>`;
  } else if(type==="balance"){
    title="ব্যালেন্স শিট";
    const totI=income.reduce((s,i)=>s+i.amount,0)+payments.reduce((s,p)=>s+p.amount,0);
    const totE=expenses.reduce((s,e)=>s+e.amount,0);
    const totA=assets.reduce((s,a)=>s+a.value,0);
    const totL=loans.reduce((s,l)=>s+l.remaining,0);
    const totInv=investments.reduce((s,i)=>s+i.amount,0);
    tableHTML=`<table><thead><tr><th style="text-align:left">বিবরণ</th><th>পরিমাণ</th></tr></thead><tbody>
      <tr style="background:#f0fdf4"><td colspan="2" style="text-align:left;font-weight:800;color:#006400">📋 সম্পদ</td></tr>
      ${assets.map(a=>`<tr><td style="text-align:left;padding-left:16px">${a.name} (${a.category})</td><td>${fmtBn(a.value)}</td></tr>`).join("")}
      <tr><td style="text-align:left;padding-left:16px">বিতরণকৃত ঋণ</td><td>${fmtBn(totL)}</td></tr>
      ${investments.map(i=>`<tr><td style="text-align:left;padding-left:16px">${i.title}</td><td>${fmtBn(i.amount)}</td></tr>`).join("")}
      <tr style="font-weight:800;background:#dcfce7"><td style="text-align:left">সর্বমোট সম্পদ</td><td>${fmtBn(totA+totL+totInv)}</td></tr>
      <tr style="background:#fff1f2"><td colspan="2" style="text-align:left;font-weight:800;color:#dc2626">📋 দায় ও মূলধন</td></tr>
      <tr><td style="text-align:left;padding-left:16px">মোট আয়</td><td>${fmtBn(totI)}</td></tr>
      <tr><td style="text-align:left;padding-left:16px">মোট ব্যয়</td><td style="color:#dc2626">-${fmtBn(totE)}</td></tr>
      <tr style="font-weight:800;background:#dcfce7"><td style="text-align:left">নিট তহবিল</td><td>${fmtBn(totI-totE)}</td></tr>
    </tbody></table>`;
  }

  const html=`<!DOCTYPE html><html><head><meta charset="UTF-8">
  <style>${pdfStyle}</style></head><body>
  ${pdfWM()}${pdfBtn()}
  <h1>🪁 স্বপ্নঘুড়ি — ${title}</h1>
  <div class="meta">তারিখ: ${now2}</div>
  ${tableHTML}
  </body></html>`;

  const w=window.open("","_blank");
  w.document.write(html);
  w.document.close();
  setTimeout(()=>w.print(),500);
  toast("✅ PDF প্রিন্ট ডায়ালগ খুলছে...");
}

function trackVisitor(){
  try{
    const visitors=JSON.parse(localStorage.getItem("sg_visitors")||"[]");
    const now=new Date();
    const entry={
      id:Date.now(),
      time:now.toISOString(),
      role:role||"অজ্ঞাত",
      ua:navigator.userAgent.slice(0,80),
      page:window.location.href.split("?")[0]
    };
    visitors.unshift(entry);
    // সর্বোচ্চ ২০০টা রাখব
    if(visitors.length>200) visitors.splice(200);
    localStorage.setItem("sg_visitors",JSON.stringify(visitors));
  }catch(e){}
}

function pgVisitors(){
  if(!isA()) return `<div style="padding:40px;text-align:center;color:#94a3b8">⛔ শুধুমাত্র অ্যাডমিনের জন্য</div>`;
  const visitors=JSON.parse(localStorage.getItem("sg_visitors")||"[]");
  const byDate={};
  visitors.forEach(v=>{
    const d=v.time.slice(0,10);
    if(!byDate[d]) byDate[d]=[];
    byDate[d].push(v);
  });
  const rows=visitors.slice(0,100).map((v,i)=>{
    const dt=new Date(v.time);
    const timeStr=dt.toLocaleString("bn-BD");
    const device=v.ua.includes("Mobile")?"📱 মোবাইল":"💻 কম্পিউটার";
    return `<tr>
      <td style="text-align:center">${Number(i+1).toLocaleString("bn-BD")}</td>
      <td style="text-align:center">${timeStr}</td>
      <td style="text-align:center">${v.role==="admin"?"👑 অ্যাডমিন":"👁️ ভিউয়ার"}</td>
      <td style="text-align:center">${device}</td>
    </tr>`;
  }).join("");

  const today=new Date().toISOString().slice(0,10);

  return `
    <div class="section-title">👥 ভিজিটর ইতিহাস</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
      <div class="card" style="text-align:center;padding:16px">
        <div style="font-size:28px;font-weight:800;color:#006400">${Number(todayCount).toLocaleString("bn-BD")}</div>
        <div style="font-size:12px;color:#64748b">আজকের ভিজিট</div>
      </div>
      <div class="card" style="text-align:center;padding:16px">
        <div style="font-size:28px;font-weight:800;color:#1a8a00">${Number(totalCount).toLocaleString("bn-BD")}</div>
        <div style="font-size:12px;color:#64748b">মোট ভিজিট</div>
      </div>
    </div>
    <div class="card">
      <div style="overflow-x:auto">
        <table class="tbl">
          <thead><tr style="background:#006400">
            <th style="color:#fff;text-align:center">#</th>
            <th style="color:#fff;text-align:center">সময়</th>
            <th style="color:#fff;text-align:center">ভূমিকা</th>
            <th style="color:#fff;text-align:center">ডিভাইস</th>
          </tr></thead>
          <tbody>${rows||`<tr><td colspan="4" style="text-align:center;color:#94a3b8;padding:20px">কোনো ভিজিট রেকর্ড নেই</td></tr>`}</tbody>
        </table>
      </div>
      ${visitors.length>100?`<div style="padding:10px;text-align:center;color:#94a3b8;font-size:12px">সর্বশেষ ১০০টি দেখানো হচ্ছে</div>`:""}
      <div style="padding:12px;text-align:right">
        <button onclick="localStorage.removeItem('sg_visitors');goTab('visitors')" style="background:#fee2e2;color:#dc2626;border:none;border-radius:8px;padding:8px 14px;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600">🗑 সব মুছুন</button>
      </div>
    </div>`;
}

        <div><div style="font-weight:800;font-size:15px;color:#0369a1">🏦 ${b.name}</div>
        <div style="font-size:12px;color:#64748b;margin-top:2px">${b.branch?b.branch+" শাখা":""}</div></div>
        ${isA()?`<button onclick="delBankInfo(${b.id})" style="background:#fee2e2;border:none;border-radius:7px;padding:4px 9px;cursor:pointer;color:#dc2626;font-size:12px">🗑</button>`:""}
      </div>
      <div style="margin-top:10px;display:grid;gap:6px">
        <div style="display:flex;justify-content:space-between;background:#fff;border-radius:8px;padding:8px 12px">
          <span style="font-size:12px;color:#64748b">অ্যাকাউন্ট নম্বর</span>
          <span style="font-weight:700;font-size:13px;color:#0369a1">${b.number}</span>
        </div>
        <div style="display:flex;justify-content:space-between;background:#fff;border-radius:8px;padding:8px 12px">
          <span style="font-size:12px;color:#64748b">অ্যাকাউন্টের নাম</span>
          <span style="font-weight:700;font-size:13px">${b.owner}</span>
        </div>
        ${b.routing?`<div style="display:flex;justify-content:space-between;background:#fff;border-radius:8px;padding:8px 12px"><span style="font-size:12px;color:#64748b">রাউটিং নম্বর</span><span style="font-weight:700;font-size:13px">${b.routing}</span></div>`:""}
      </div>
    </div>`).join(""):`<div style="text-align:center;padding:20px;color:#94a3b8">কোনো ব্যাংক অ্যাকাউন্ট যোগ হয়নি</div>`;

  const mobileCards=mobile.length?mobile.map(m=>`
    <div style="background:#f0fdf4;border:1px solid #86efac;border-radius:12px;padding:14px 16px;margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div style="font-weight:800;font-size:15px;color:#006400">${mobileIcons[m.type]||"📱"} ${m.type}</div>
        ${isA()?`<button onclick="delMobileInfo(${m.id})" style="background:#fee2e2;border:none;border-radius:7px;padding:4px 9px;cursor:pointer;color:#dc2626;font-size:12px">🗑</button>`:""}
      </div>
      <div style="margin-top:10px;display:grid;gap:6px">
        <div style="display:flex;justify-content:space-between;background:#fff;border-radius:8px;padding:8px 12px">
          <span style="font-size:12px;color:#64748b">নম্বর (${m.actype||"Send Money"})</span>
          <span style="font-weight:800;font-size:15px;color:#006400">${m.number}</span>
        </div>
        <div style="display:flex;justify-content:space-between;background:#fff;border-radius:8px;padding:8px 12px">
          <span style="font-size:12px;color:#64748b">নাম</span>
          <span style="font-weight:700;font-size:13px">${m.owner}</span>
        </div>
      </div>
    </div>`).join(""):`<div style="text-align:center;padding:20px;color:#94a3b8">কোনো মোবাইল ব্যাংকিং যোগ হয়নি</div>`;

  return `
    <div class="section-title">💳 পেমেন্ট তথ্য</div>
    ${adminForm}
    <div class="card" style="margin-bottom:14px">
      ${ch("🏦","ব্যাংক অ্যাকাউন্ট","")}
      <div style="padding:12px 16px">${bankCards}</div>
    </div>
    <div class="card">
      ${ch("📱","মোবাইল ব্যাংকিং","")}
      <div style="padding:12px 16px">${mobileCards}</div>
    </div>`;
}

function addBankInfo(){
  const name=document.getElementById("pi-bname").value.trim();
  const number=document.getElementById("pi-bnum").value.trim();
  const owner=document.getElementById("pi-bowner").value.trim();
  if(!name||!number||!owner){toast("⚠️ ব্যাংকের নাম, নম্বর ও অ্যাকাউন্টের নাম দিন","#d97706");return;}
  if(!D.paymentInfo) D.paymentInfo={bank:[],mobile:[]};
  D.paymentInfo.bank.push({id:Date.now(),name,number,owner,
    branch:document.getElementById("pi-branch").value.trim(),
    routing:document.getElementById("pi-routing").value.trim()});
  logActivity("payment","নতুন ব্যাংক অ্যাকাউন্ট যোগ হয়েছে: "+name);
  sv();toast("✅ ব্যাংক অ্যাকাউন্ট যোগ হয়েছে");goTab("payment");
}

function addMobileInfo(){
  const type=document.getElementById("pi-mtype").value;
  const number=document.getElementById("pi-mnum").value.trim();
  const owner=document.getElementById("pi-mowner").value.trim();
  if(!number||!owner){toast("⚠️ নম্বর ও নাম দিন","#d97706");return;}
  if(!D.paymentInfo) D.paymentInfo={bank:[],mobile:[]};
  D.paymentInfo.mobile.push({id:Date.now(),type,number,owner,
    actype:document.getElementById("pi-mactype").value});
  logActivity("payment","নতুন মোবাইল ব্যাংকিং যোগ হয়েছে: "+type+" "+number);
  sv();toast("✅ মোবাইল ব্যাংকিং যোগ হয়েছে");goTab("payment");
}

function delBankInfo(id){
  if(!confirm("এই ব্যাংক অ্যাকাউন্ট মুছবেন?"))return;
  D.paymentInfo.bank=D.paymentInfo.bank.filter(b=>b.id!==id);
  sv();toast("🗑 মুছে গেছে","#dc2626");goTab("payment");
}

function delMobileInfo(id){
  if(!confirm("এই মোবাইল ব্যাংকিং তথ্য মুছবেন?"))return;
  D.paymentInfo.mobile=D.paymentInfo.mobile.filter(m=>m.id!==id);
  sv();toast("🗑 মুছে গেছে","#dc2626");goTab("payment");
}

function pgDuesSheet() {
  const members = D.members||[];
  const payments = D.payments||[];
  const specialMonths = D.specialMonths||[];

  // নভেম্বর ২০২১ থেকে বর্তমান পর্যন্ত সব মাস
  const months = [];
  let d = new Date(2021, 10, 1); // Nov 2021
  const now2 = new Date();
  while(d <= now2){
    months.push({
      key: `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`,
      label: `${["জানু","ফেব্রু","মার্চ","এপ্রিল","মে","জুন","জুলাই","আগস্ট","সেপ্টে","অক্টো","নভে","ডিসে"][d.getMonth()]} ${String(d.getFullYear()).slice(2)}`,
      year: d.getFullYear(),
      month: d.getMonth()
    });
    d = new Date(d.getFullYear(), d.getMonth()+1, 1);
  }

  const years = [...new Set(months.map(m=>m.year))];
  const selYear = window._dsYear || years[years.length-1];
  const filtMonths = months.filter(m => m.year == selYear);

  const yearBtns = years.map(y=>`
    <button onclick="window._dsYear=${y};goTab('duessheet')"
      style="padding:6px 14px;border-radius:8px;border:2px solid ${y==selYear?"var(--g2)":"var(--border)"};
      background:${y==selYear?"var(--gl)":"#fff"};color:${y==selYear?"var(--g2)":"var(--muted)"};
      font-weight:${y==selYear?700:400};cursor:pointer;font-family:inherit;font-size:12px">${y}</button>
  `).join("");

  // ── অ্যাডমিন প্যানেল: রেট ম্যানেজমেন্ট + বিশেষ মাস ──
  const rateHistory = (D.rateHistory||[]).slice().sort((a,b)=> b.effectiveFrom.localeCompare(a.effectiveFrom) || (b.createdAt||"").localeCompare(a.createdAt||""));
  const rateHistoryRows = rateHistory.map(r=>`
    <tr>
      <td>${r.mid!=null ? gn(r.mid) : `<b style="color:#7c3aed">সবার জন্য (গ্লোবাল)</b>`}</td>
      <td style="font-weight:700;color:#1a8a00">${fmt(r.rate)}</td>
      <td>${r.effectiveFrom}</td>
      <td style="font-size:11px;color:#94a3b8">${r.createdBy||"-"}</td>
      <td style="font-size:11px;color:#94a3b8">${r.createdAt?ds(r.createdAt):"-"}</td>
      ${isA()?`<td><button class="btn btn-sm btn-r" style="padding:3px 8px" onclick="delRateChange('${r.id}')">🗑</button></td>`:""}
    </tr>`).join("") || `<tr><td colspan="6" style="text-align:center;color:#94a3b8">কোনো হার পরিবর্তনের ইতিহাস নেই — ডিফল্ট হার (প্রতি সদস্যের প্রাথমিক হার) প্রযোজ্য</td></tr>`;

  const adminForm = isA() ? `
    <div class="card" style="margin-bottom:12px">
      ${ch("⚙️","চাঁদার হার ব্যবস্থাপনা (Rate Management)","সবসময় একটা current active rate থাকে; নতুন হার effective date থেকে কার্যকর হয়")}
      <div class="cb">
        <div style="font-weight:700;font-size:13px;margin-bottom:8px">📌 এই মাসের (${curMon}) কার্যকর হার</div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-bottom:16px">
          ${members.map(m=>`
            <div style="background:#f0fdf4;border-radius:9px;padding:10px;text-align:center">
              <div style="font-weight:600;font-size:12px;color:#071a07">${m.name.split(" ")[0]}</div>
              <div style="font-weight:800;color:#1a8a00;font-size:15px">${fmt(getApplicableRate(m.id,curMon))}</div>
            </div>`).join("")}
        </div>

        <div style="border-top:1px solid #f1f5f9;padding-top:12px;margin-bottom:14px">
          <div style="font-weight:700;font-size:13px;margin-bottom:8px">💱 নতুন হার নির্ধারণ করুন</div>
          <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px;align-items:end">
            <div class="field" style="margin:0"><label>প্রযোজ্য হবে</label>
              <select id="rh-scope" style="width:100%;padding:9px;border-radius:9px;border:1.5px solid var(--border);font-size:12px;font-family:inherit">
                <option value="">-- সবার জন্য (গ্লোবাল) --</option>
                ${members.map(m=>`<option value="${m.id}">শুধু ${m.name.split(" ")[0]}</option>`).join("")}
              </select>
            </div>
            <div class="field" style="margin:0"><label>নতুন হার (৳)</label><input type="number" id="rh-rate" placeholder="2000" style="width:100%;padding:9px;border-radius:9px;border:1.5px solid var(--border);font-size:12px;font-family:inherit"></div>
            <div class="field" style="margin:0"><label>কার্যকর তারিখ (মাস থেকে)</label><input type="month" id="rh-eff" value="${curMon}" style="width:100%;padding:9px;border-radius:9px;border:1.5px solid var(--border);font-size:12px;font-family:inherit"></div>
            <button class="btn btn-g btn-sm" onclick="addRateChange()">✅ হার সেট করুন</button>
          </div>
          <div style="font-size:11px;color:#94a3b8;margin-top:6px">নির্বাচিত তারিখ থেকে আগের সব মাসের হিসাব পুরাতন হারেই থাকবে, পরের মাসগুলো নতুন হারে হিসাব হবে।</div>
        </div>

        <div style="border-top:1px solid #f1f5f9;padding-top:12px;margin-bottom:14px">
          <div style="font-weight:700;font-size:13px;margin-bottom:8px">📜 হারের সম্পূর্ণ ইতিহাস (Audit)</div>
          <div style="overflow-x:auto"><table class="tbl">
            <thead><tr><th>সদস্য / স্কোপ</th><th>হার</th><th>কার্যকর তারিখ</th><th>সেট করেছেন</th><th>সময়</th>${isA()?"<th></th>":""}</tr></thead>
            <tbody>${rateHistoryRows}</tbody>
          </table></div>
        </div>

        <div style="border-top:1px solid #f1f5f9;padding-top:12px">
          <div style="font-weight:700;font-size:13px;margin-bottom:8px">➕ বিশেষ মাসের চাঁদা (এক-মাসের ব্যতিক্রম)</div>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:8px;align-items:end">
            <div class="field" style="margin:0"><label>সদস্য</label>
              <select id="sp-mid" style="width:100%;padding:8px;border-radius:7px;border:1.5px solid var(--border);font-size:12px;font-family:inherit">
                <option value="">-- সদস্য --</option>
                ${members.map(m=>`<option value="${m.id}">${m.name.split(" ")[0]}</option>`).join("")}
              </select>
            </div>
            <div class="field" style="margin:0"><label>মাস</label>
              <input type="month" id="sp-month" style="width:100%;padding:8px;border-radius:7px;border:1.5px solid var(--border);font-size:12px;font-family:inherit">
            </div>
            <div class="field" style="margin:0"><label>বিশেষ চাঁদা (৳)</label>
              <input type="number" id="sp-amt" placeholder="0" style="width:100%;padding:8px;border-radius:7px;border:1.5px solid var(--border);font-size:12px;font-family:inherit">
            </div>
            <button class="btn btn-g btn-sm" onclick="addSpecialMonth()">যোগ</button>
          </div>
          <!-- বিশেষ চাঁদার তালিকা -->
          ${(D.specialMonths||[]).length?(function(){
            const rows=(D.specialMonths||[]).slice().sort((a,b)=>b.month.localeCompare(a.month)).map(s=>'<tr><td style="font-weight:600">'+gn(s.mid)+'</td><td>'+s.month+'</td><td style="font-weight:700;color:#1a8a00">'+fmt(s.amount)+'</td><td style="display:flex;gap:4px"><button class="btn btn-sm" style="padding:3px 8px;background:#dbeafe;color:#1d4ed8" onclick="editSpecialMonth('+s.id+')">✏️</button><button class="btn btn-sm btn-r" style="padding:3px 8px" onclick="delSpecialMonth('+s.id+')">🗑</button></td></tr>').join("");
            return '<div style="margin-top:12px"><div style="font-weight:700;font-size:12px;color:#64748b;margin-bottom:6px">📋 সকল বিশেষ চাঁদার তালিকা</div><div style="overflow-x:auto"><table class="tbl"><thead><tr><th>সদস্য</th><th>মাস</th><th>পরিমাণ</th><th></th></tr></thead><tbody>'+rows+'</tbody></table></div></div>';
          })():""}        </div>
      </div>
    </div>` : "";

  // ফর্মুলা summary per member for selected year
  // নতুন নিয়ম: প্রতিটি মাসই তার তখনকার কার্যকর (পরিবর্তনশীল) হার অনুযায়ী গণনা হবে,
  // আর বিশেষ চাঁদা/টাকা যত বারই নির্ধারণ করা হোক, তা শুধু অতিরিক্ত হিসেবে যোগ হবে (প্রতিস্থাপন নয়)
  const memberSummary = members.map(m => {
    const spMonths = specialMonths.filter(s=>s.mid==m.id && s.month.startsWith(selYear));
    const spCount = spMonths.length;
    const spTotal = spMonths.reduce((s,x)=>s+x.amount,0);
    const regularTotal = filtMonths.reduce((s,mon)=>s+getApplicableRate(m.id, mon.key),0);
    const totalExpected = regularTotal + spTotal;
    const totalPaid = payments.filter(p=>p.mid==m.id && p.month.startsWith(selYear)).reduce((s,p)=>s+p.amount,0);
    const totalDue = totalExpected - totalPaid;
    return { m, spCount, spTotal, regularTotal, monthCount: filtMonths.length, totalExpected, totalPaid, totalDue };
  });

  const summaryCards = memberSummary.map(({m, spCount, spTotal, regularTotal, monthCount, totalExpected, totalPaid, totalDue}) => `
    <div style="background:${totalDue>0?"#fff1f2":"#f0fdf4"};border-radius:11px;padding:12px 14px;border:1.5px solid ${totalDue>0?"#fecaca":"#bbf7d0"}">
      <div style="font-weight:700;font-size:13px;margin-bottom:6px;color:#071a07">${m.name}</div>
      <div style="font-size:11px;color:#64748b;margin-bottom:5px;line-height:1.8">
        ফর্মুলা: ${monthCount} মাস × পরিবর্তনশীল হার = ${fmt(regularTotal)}${spCount>0?" + বিশেষ চাঁদা "+fmt(spTotal)+" ("+spCount+" বার)":""} = ${fmt(totalExpected)}
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <span style="font-size:11px;background:#dcfce7;color:#15803d;border-radius:5px;padding:2px 7px;font-weight:700">পরিশোধ ${fmt(totalPaid)}</span>
        <span style="font-size:11px;background:${totalDue>0?"#fee2e2":"#dcfce7"};color:${totalDue>0?"#dc2626":"#15803d"};border-radius:5px;padding:2px 7px;font-weight:700">${totalDue>0?"বকেয়া "+fmt(totalDue):"✅ পরিশোধিত"}</span>
      </div>
    </div>`).join("");

  // Build dues table for selected year
  const tableHeader = `<tr style="background:#006400">
    <th style="position:sticky;left:0;background:#006400 !important;z-index:10;min-width:150px;color:#fff !important;font-size:13px;padding:10px 12px;border-right:2px solid #86efac">সদস্য / মাস</th>
    ${filtMonths.map(m=>`<th style="min-width:110px;text-align:center;background:#006400 !important;color:#fff !important;font-size:12px;font-weight:700;padding:10px 8px;white-space:nowrap;border-right:1px solid rgba(255,255,255,.15)">${m.label}</th>`).join("")}
    <th style="background:#006400 !important;color:#86efac !important;min-width:100px;text-align:center;padding:10px 8px;font-size:12px">মোট দেওয়া</th>
    <th style="background:#006400 !important;color:#fca5a5 !important;min-width:100px;text-align:center;padding:10px 8px;font-size:12px">এ বছর বকেয়া</th>
    <th style="background:#7f1d1d !important;color:#fca5a5 !important;min-width:170px;text-align:center;padding:10px 8px;font-size:12px;white-space:nowrap">সর্বমোট বকেয়া (শুরু থেকে এখন)</th>
  </tr>`;

  const tableRows = members.map(m => {
    const memberPayments = payments.filter(p=>p.mid==m.id);
    const spMonths = specialMonths.filter(s=>s.mid==m.id);

    let yearPaid = 0, yearExpected = 0;

    // শুরু থেকে বর্তমান পর্যন্ত সর্বমোট বকেয়া হিসাব (প্রতিটি মাসের জন্য তখনকার কার্যকর হার)
    let allExp = 0, allPaid = 0;
    months.forEach(mon => {
      const sp = spMonths.find(s=>s.month===mon.key);
      allExp += getApplicableRate(m.id, mon.key) + (sp ? sp.amount : 0);
      const p = memberPayments.find(p=>p.month===mon.key);
      if(p) allPaid += p.amount;
    });
    const totalAllDue = allExp - allPaid;

    const cells = filtMonths.map(mon => {
      const spM = spMonths.find(s=>s.mid==m.id && s.month===mon.key);
      const cellRate = getApplicableRate(m.id, mon.key) + (spM ? spM.amount : 0);
      yearExpected += cellRate;
      const paid = memberPayments.find(p=>p.month===mon.key);
      if(paid) yearPaid += paid.amount;
      const isPaid = !!paid;

      if(isA()) {
        return `<td style="text-align:center;background:${isPaid?"#f0fdf4":"#fff1f2"};padding:4px">
          ${isPaid
            ? `<div style="font-size:11px;color:#16a34a;font-weight:700">${fmt(paid.amount)}</div>
               <button onclick="editDue(${m.id},'${mon.key}',${paid.id},${paid.amount})" style="font-size:9px;background:none;border:none;color:#94a3b8;cursor:pointer">✏️</button>`
            : `<button onclick="addDue(${m.id},'${mon.key}',${cellRate})" style="font-size:10px;background:#fee2e2;border:none;border-radius:5px;padding:3px 6px;cursor:pointer;color:#dc2626;font-family:inherit">+ যোগ</button>`
          }
        </td>`;
      } else {

          ${isPaid ? `<span style="font-size:11px;color:#16a34a;font-weight:700">✓</span>` : `<span style="font-size:11px;color:#dc2626">✗</span>`}
        </td>`;
      }
    }).join("");

    const yearDue = yearExpected - yearPaid;

    return `<tr data-name="${m.name}">
      <td style="position:sticky;left:0;background:#fff;color:#071a07;z-index:5;font-weight:700;font-size:13px;padding:8px 12px;border-right:2px solid #e2e8f0">${m.name}</td>

      <td style="font-weight:800;color:${totalAllDue>0?"#dc2626":"#1a8a00"};text-align:center;background:${totalAllDue>0?"#fee2e2":"#f0fdf4"};border-left:2px solid #fca5a5">${totalAllDue>0?fmt(totalAllDue):"✅"}</td>
    </tr>`;

  // Total row
  const totals = memberSummary.map(s=>({exp:s.totalExpected, paid:s.totalPaid, due:s.totalDue}));

  const grandPaid = totals.reduce((s,t)=>s+t.paid,0);
  const grandDue = totals.reduce((s,t)=>s+t.due,0);

  // শুরু থেকে বর্তমান পর্যন্ত সর্বমোট বকেয়া
  const grandTotalAllDue = members.reduce((s,m)=>{

    let allExp=0,allPd=0;
    months.forEach(mon=>{
      const sp=spM.find(x=>x.month===mon.key);
      allExp+=getApplicableRate(m.id,mon.key)+(sp?sp.amount:0);
      const p=(payments||[]).find(p=>p.mid==m.id&&p.month===mon.key);
      if(p)allPd+=p.amount;
    });
    return s+(allExp-allPd);
  },0);

  return `

    </div>

    <!-- বছর সিলেক্টর -->
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px">${yearBtns}</div>

    <!-- KPI -->
    <div class="grid3" style="margin-bottom:14px">
      <div class="kpi" style="background:#f0fdf4;text-align:center">
        <div class="ki">💰</div><div class="kv" style="color:#1a8a00;font-size:18px">${fmt(grandExp)}</div>
        <div class="kl">${selYear} মোট প্রত্যাশিত</div>
      </div>
      <div class="kpi" style="background:#f0fdf4;text-align:center">
        <div class="ki">✅</div><div class="kv" style="color:#1a8a00;font-size:18px">${fmt(grandPaid)}</div>
        <div class="kl">${selYear} মোট পরিশোধিত</div>
      </div>
      <div class="kpi" style="background:${grandDue>0?"#fff1f2":"#f0fdf4"};text-align:center">
        <div class="ki">${grandDue>0?"⚠️":"🎉"}</div>
        <div class="kv" style="color:${grandDue>0?"#dc2626":"#1a8a00"};font-size:18px">${grandDue>0?fmt(grandDue):"শূন্য"}</div>
        <div class="kl">${selYear} মোট বকেয়া</div>

    <!-- ফর্মুলা summary -->

    <!-- মাসভিত্তিক টেবিল -->

      ${ch("📋","মাসওয়ারি চাঁদার টেবিল",`${selYear} — ${filtMonths.length} মাস · ${members.length} জন সদস্য`)}

      <div style="overflow-x:auto;padding:0">
        <table class="tbl" style="min-width:${85*filtMonths.length+420}px">

function addRateChange(){
  const scope = document.getElementById("rh-scope").value;
  const rate = Number(document.getElementById("rh-rate").value);
  const eff = document.getElementById("rh-eff").value;
  if(!rate || !eff){ toast("⚠️ হার ও কার্যকর তারিখ দিন","#d97706"); return; }
  const mid = scope ? Number(scope) : null;
  D.rateHistory = [...(D.rateHistory||[]), {
    id: Date.now()+"_"+Math.random().toString(36).slice(2,7),
    mid: mid,
    rate: rate,
    effectiveFrom: eff,
    createdBy: isA() ? "অ্যাডমিন" : "ভিউয়ার",
    createdAt: new Date().toISOString()
  }];
  logActivity("rate", mid!=null ? `${gn(mid)}-এর জন্য নতুন চাঁদার হার ${fmt(rate)} সেট করা হয়েছে (কার্যকর ${eff} থেকে)` : `সবার জন্য নতুন গ্লোবাল চাঁদার হার ${fmt(rate)} সেট করা হয়েছে (কার্যকর ${eff} থেকে)`);
  sv();
  toast("✅ নতুন হার সেট হয়েছে");
  goTab("duessheet");
}

function delRateChange(id){
  if(!confirm("এই হার পরিবর্তনের রেকর্ড মুছবেন? (এটি অডিট ইতিহাসের অংশ, মুছলে হিসাব পরিবর্তন হতে পারে)"))return;
  const r=(D.rateHistory||[]).find(x=>x.id==id);
  D.rateHistory=(D.rateHistory||[]).filter(x=>x.id!=id);
  if(r) logActivity("rate", `হার পরিবর্তনের রেকর্ড মুছে ফেলা হয়েছে: ${r.mid!=null?gn(r.mid):"গ্লোবাল"} — ${fmt(r.rate)} (কার্যকর ${r.effectiveFrom})`);
  sv(); toast("🗑 মুছে গেছে","#dc2626"); goTab("duessheet");
}

function addSpecialMonth() {
  const mid = document.getElementById("sp-mid").value;
  const month = document.getElementById("sp-month").value;
  const amt = Number(document.getElementById("sp-amt").value);
  if(!mid||!month||!amt) { toast("⚠️ সব তথ্য দিন","#d97706"); return; }
  D.specialMonths = [...(D.specialMonths||[])];
  D.specialMonths = D.specialMonths.filter(s=>!(s.mid==mid&&s.month===month));

  sv(); toast("✅ বিশেষ মাস যোগ হয়েছে"); goTab("duessheet");
}

  sv();toast("✅ আপডেট হয়েছে");goTab("duessheet");

  const s=(D.specialMonths||[]).find(x=>x.id===id);

// বকেয়া চাঁদার তালিকা — getApplicableRate ভিত্তিক
// ══════════════════════════════════════════
function getDuesList() {
  const members = D.members||[];
  const payments = D.payments||[];
  const now2 = new Date();

  const months = [];
  let d = new Date(2021,10,1); // Nov 2021
  while(d <= now2){
    months.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`);
    d = new Date(d.getFullYear(),d.getMonth()+1,1);
  }

  return members.map(m => {
    const specialMonths = (D.specialMonths||[]).filter(s=>s.mid==m.id);
    let totalExpected = 0;
    months.forEach(mon => {
      const sp = specialMonths.find(s=>s.mid==m.id&&s.month===mon);
      totalExpected += getApplicableRate(m.id, mon) + (sp ? sp.amount : 0);
    });
    const totalPaid = payments.filter(p=>p.mid==m.id).reduce((s,p)=>s+p.amount,0);
    const totalDue = totalExpected - totalPaid;
    return { ...m, totalExpected, totalPaid, totalDue, months: months.length };
  }).filter(m => m.totalDue > 0).sort((a,b) => b.totalDue - a.totalDue);
}

function renderChadaDues(){
  const list = getDuesList();
  if(!list.length) return `<div style="padding:16px;text-align:center;color:#94a3b8">সবার চাঁদা পরিশোধ আছে ✅</div>`;
  return list.map(m=>`
    <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 16px;border-bottom:1px solid #f5f5f5">
      <div>
        <div style="font-weight:600;font-size:14px">${m.name}</div>
        <div style="font-size:11px;color:#94a3b8">${m.months} মাসের হিসাব · পরিশোধ ${fmt(m.totalPaid)}</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        ${bdg(fmt(m.totalDue),"#dc2626","#fee2e2")}
        ${isA()&&m.phone?`<button onclick="sendDueNotif(${m.id})" style="background:#dcfce7;border:none;border-radius:6px;padding:4px 8px;cursor:pointer;font-size:11px">📱</button>`:""}
      </div>
    </div>`).join("");
}

// WhatsApp / SMS নোটিফিকেশন
// ══════════════════════════════════════════
function buildDueMsg(m){
  const loanDue=(D.loans||[]).filter(l=>l.mid==m.id).reduce((s,l)=>s+l.remaining,0);
  const duesList=getDuesList();
  const memberDues=duesList.find(x=>x.id==m.id);
  const chadaDue=memberDues?memberDues.totalDue:0;
  if(chadaDue===0&&loanDue===0) return null;
  return `আসসালামু আলাইকুম ${m.name} ভাই,\n\n🪁 *স্বপ্নঘুড়ি* সংগঠনে আপনার বকেয়া:\n\n`
    +(chadaDue>0?`💰 মাসিক চাঁদা বকেয়া: *${fmt(chadaDue)}*\n`:"")
    +(loanDue>0?`🤝 ঋণ বকেয়া: *${fmt(loanDue)}*\n`:"")
    +`📊 সর্বমোট: *${fmt(chadaDue+loanDue)}*\n\nঅনুগ্রহ করে দ্রুত পরিশোধ করুন।\n🔗 https://swapnaghuri-2026.github.io/swapnaghuri`;
}

function sendDueNotif(mid){
  const m=(D.members||[]).find(x=>x.id==mid);
  if(!m){toast("সদস্য পাওয়া যায়নি","#d97706");return;}
  if(!m.phone){toast("⚠️ ফোন নম্বর নেই! সদস্য সেকশনে যোগ করুন","#d97706");return;}
  const msg=buildDueMsg(m);
  if(!msg){toast("✅ এই সদস্যের কোনো বকেয়া নেই","#1a8a00");return;}
  window.open(`https://wa.me/88${m.phone}?text=${encodeURIComponent(msg)}`,"_blank");
}

function sendSMSNotif(mid){
  const m=(D.members||[]).find(x=>x.id==mid);
  if(!m){toast("সদস্য পাওয়া যায়নি","#d97706");return;}
  if(!m.phone){toast("⚠️ ফোন নম্বর নেই","#d97706");return;}

// আয়-ব্যয় / চাঁদা CSV ডাউনলোড
// ══════════════════════════════════════════
function downloadReport(type, year){
  const members = D.members||[];
  const payments = D.payments||[];
  const income = D.income||[];
  const expenses = D.expenses||[];
  const specialMonths = D.specialMonths||[];
  let csv = "";
  const bom = "\uFEFF";

  if(type==="dues"){
    // নভেম্বর ২০২১ থেকে সব মাস
    const allMonths = [];
    let d = new Date(2021,10,1);
    const now2 = new Date();
    while(d<=now2){
      const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
      if(!year||key.startsWith(year)) allMonths.push({key, label:key});
      d = new Date(d.getFullYear(),d.getMonth()+1,1);
    }
    csv += `স্বপ্নঘুড়ি — চাঁদার রিপোর্ট ${year||"সব বছর"}\n\n`;
    csv += "সদস্য," + allMonths.map(m=>m.label).join(",") + ",মোট প্রত্যাশিত,মোট পরিশোধ,মোট বকেয়া\n";
    members.forEach(m=>{
      let totalExp=0, totalPaid=0;
      const row = allMonths.map(mon=>{
        const sp = specialMonths.find(s=>s.mid==m.id&&s.month===mon.key);
        const cellRate = getApplicableRate(m.id, mon.key) + (sp?sp.amount:0);
        totalExp += cellRate;
        const paid = payments.find(p=>p.month===mon.key&&p.mid==m.id);
        if(paid) totalPaid += paid.amount;
        return paid?paid.amount:"0";
      });
      csv += `${m.name},${row.join(",")},${totalExp},${totalPaid},${totalExp-totalPaid}\n`;
    });

  } else if(type==="income-expense"){
    csv += `স্বপ্নঘুড়ি — আয়-ব্যয় রিপোর্ট ${year||"সব বছর"}\n\n`;
    csv += "তারিখ,বিবরণ,ক্যাটাগরি,আয়,ব্যয়\n";

    const allIncome = [
      ...income.filter(i=>!year||i.date.startsWith(year)),
      ...payments.filter(p=>!year||p.month.startsWith(year)).map(p=>({
        title: gn(p.mid)+" — চাঁদা",
        amount: p.amount,
        date: p.month+"-01",
        category: "সদস্য চাঁদা"
      }))
    ];
    allIncome.forEach(i=>{csv+=`${i.date},"${i.title}","${i.category||""}",${i.amount},\n`;});

    const allExp = expenses.filter(e=>!year||e.date.startsWith(year));
    allExp.forEach(e=>{csv+=`${e.date},"${e.title}","${e.category||""}","",${e.amount}\n`;});

    const totInc = allIncome.reduce((s,i)=>s+i.amount,0);
    const totExp = allExp.reduce((s,e)=>s+e.amount,0);
    csv += `\n`;
    csv += `মোট আয়,,,${totInc},\n`;
    csv += `মোট ব্যয়,,,,${totExp}\n`;
    csv += `নিট উদ্বৃত্ত,,,${totInc-totExp},\n`;
  }

  const blob = new Blob([bom+csv], {type:"text/csv;charset=utf-8;"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = `swapnghuri_${type}_${year||"all"}.csv`;
  a.click(); URL.revokeObjectURL(url);
  toast("✅ CSV ডাউনলোড শুরু হয়েছে");
}

function pgChadaDues(){
  const list = getDuesList();
  const loans = D.loans||[];

  const allDues = (D.members||[]).map(m=>{
    const cDue = (list.find(x=>x.id==m.id)||{}).totalDue||0;
    const lDue = loans.filter(l=>l.mid==m.id).reduce((s,l)=>s+l.remaining,0);
    return {...m, cDue, lDue, total:cDue+lDue};
  }).filter(m=>m.total>0).sort((a,b)=>b.total-a.total);

  if(!allDues.length) return `<div style="padding:24px;text-align:center;color:#94a3b8">🎉 কোনো বকেয়া নেই!</div>`;

  return allDues.map(m=>`
    <div style="display:flex;justify-content:space-between;align-items:center;padding:11px 16px;border-bottom:1px solid #f5f5f5">
      <div style="display:flex;align-items:center;gap:10px">
        ${av(m.name,36,"linear-gradient(135deg,#006400,#1a8a00)",m.id)}
            ${m.cDue>0&&m.lDue>0?" · ":""}
            ${m.lDue>0?`ঋণ: ${fmt(m.lDue)}`:""}
          </div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:6px">
        ${bdg(fmt(m.total),"#dc2626","#fee2e2",12)}
        ${isA()&&m.phone?`<button onclick="sendDueNotif(${m.id})" title="WhatsApp" style="background:#dcfce7;border:none;border-radius:6px;padding:4px 8px;cursor:pointer;font-size:12px">📱</button>`:""}

  const allMonths=[];
  let d=new Date(2021,10,1);
  const now2=new Date();
  while(d<=now2){
    allMonths.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`);
    d=new Date(d.getFullYear(),d.getMonth()+1,1);
  }

  let totalExp=0;
  allMonths.forEach(mon=>{
    const sp=specialMonths.find(s=>s.mid==m.id&&s.month===mon);
    totalExp+=getApplicableRate(m.id,mon)+(sp?sp.amount:0);
  });
  const totalPaid=payments.reduce((s,p)=>s+p.amount,0);
  const totalDue=totalExp-totalPaid;

  }
  let totalExp=0;
  allMonths.forEach(mon=>{const sp=specialMonths.find(s=>s.mid==mid&&s.month===mon);totalExp+=getApplicableRate(mid,mon)+(sp?sp.amount:0);});
  const totalPaid=payments.reduce((s,p)=>s+p.amount,0);
  const loanDue=loans.reduce((s,l)=>s+l.remaining,0);
  const bnM={"01":"জানু","02":"ফেব্রু","03":"মার্চ","04":"এপ্রিল","05":"মে","06":"জুন","07":"জুলাই","08":"আগস্ট","09":"সেপ্টে","10":"অক্টো","11":"নভে","12":"ডিসে"};
  const fmtM=mon=>{const[y,mo]=mon.split("-");return `${bnM[mo]||mo} ${y}`;};
  const html=`<!DOCTYPE html><html><head><meta charset="UTF-8">
  <style>${pdfStyle}
  .kpi{display:inline-block;background:#f0fdf4;border:1px solid #86efac;border-radius:8px;padding:10px 16px;margin:6px;text-align:center}
  .kv{font-size:18px;font-weight:800;color:#006400}.kl{font-size:11px;color:#64748b}
  </style></head><body>
  ${pdfWM()}${pdfBtn()}
  <h1>🪁 স্বপ্নঘুড়ি — সদস্য স্টেটমেন্ট</h1>
  <div class="meta"><b>নাম:</b> ${m.name} | <b>পদ:</b> ${m.role||"সদস্য"} | <b>তারিখ:</b> ${new Date().toLocaleDateString("bn-BD")}</div>
  <div style="margin-bottom:16px">
    <div class="kpi"><div class="kv">${fmtBn(totalPaid)}</div><div class="kl">মোট চাঁদা</div></div>
    <div class="kpi"><div class="kv" style="color:#dc2626">${fmtBn(totalExp-totalPaid)}</div><div class="kl">চাঁদা বকেয়া</div></div>
    <div class="kpi"><div class="kv" style="color:#d97706">${fmtBn(loanDue)}</div><div class="kl">ঋণ বকেয়া</div></div>
  </div>
  <h2>চাঁদার ইতিহাস</h2>
  <table><thead><tr><th>মাস</th><th>নিয়মিত</th><th>বিশেষ</th><th>মোট নির্ধারিত</th><th>পরিশোধ</th><th>অবস্থা</th></tr></thead><tbody>
  ${allMonths.map(mon=>{
    const sp=specialMonths.find(s=>s.mid==mid&&s.month===mon);
    const reg=getApplicableRate(mid,mon);
    const spAmt=sp?sp.amount:0;
    const cr=reg+spAmt;
    const paidList=payments.filter(p=>p.month===mon);
    const paidAmt=paidList.reduce((s,p)=>s+p.amount,0);
    const isPaid=paidAmt>=cr;
    const isPartial=paidAmt>0&&paidAmt<cr;
    return `<tr><td>${fmtM(mon)}</td><td>${fmtBn(reg)}</td><td style="color:#7c3aed">${spAmt?fmtBn(spAmt):"—"}</td><td style="font-weight:600">${fmtBn(cr)}</td><td style="color:${isPaid?"#16a34a":isPartial?"#d97706":"#dc2626"};font-weight:600">${paidAmt?fmtBn(paidAmt):"—"}</td><td>${isPaid?"✅":isPartial?"আংশিক":"❌"}</td></tr>`;
  }).join("")}
  <tr style="background:#f0fdf4;font-weight:800"><td>সর্বমোট</td><td colspan="2"></td><td>${fmtBn(totalExp)}</td><td style="color:#16a34a">${fmtBn(totalPaid)}</td><td style="color:#dc2626">${totalExp-totalPaid>0?"বকেয়া "+fmtBn(totalExp-totalPaid):"✅ পরিশোধিত"}</td></tr>
  </tbody></table>
  ${loans.length?`<h2>ঋণের ইতিহাস</h2>
  <table><thead><tr><th>তারিখ</th><th>মূল ঋণ</th><th>বকেয়া</th><th>পরিশোধ</th><th>উদ্দেশ্য</th></tr></thead><tbody>
  ${loans.map(l=>`<tr><td>${l.date}</td><td>${fmtBn(l.principal)}</td><td style="color:#dc2626;font-weight:600">${fmtBn(l.remaining)}</td><td>${fmtBn(l.principal-l.remaining)}</td><td style="text-align:left">${l.note||"—"}</td></tr>`).join("")}
  <tr style="background:#f0fdf4;font-weight:800"><td>সর্বমোট</td><td>${fmtBn(loans.reduce((s,l)=>s+l.principal,0))}</td><td style="color:#dc2626">${fmtBn(loanDue)}</td><td>${fmtBn(loans.reduce((s,l)=>s+(l.principal-l.remaining),0))}</td><td></td></tr>
  </tbody></table>`:""}
  </body></html>`;
  const w=window.open("","_blank");w.document.write(html);w.document.close();setTimeout(()=>w.print(),600);
  toast("📄 PDF প্রিন্ট ডায়ালগ খুলছে");

function memberStatXL(mid){
  const m=(D.members||[]).find(x=>x.id==mid);if(!m)return;
  const payments=(D.payments||[]).filter(p=>p.mid==mid);
  const loans=(D.loans||[]).filter(l=>l.mid==mid);
  const specialMonths=(D.specialMonths||[]).filter(s=>s.mid==mid);
  const allMonths=[];
  let d=new Date(2021,10,1);
  while(d<=new Date()){allMonths.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`);d=new Date(d.getFullYear(),d.getMonth()+1,1);}
  const bom="\uFEFF";
  let csv=`স্বপ্নঘুড়ি — ${m.name} — সদস্য স্টেটমেন্ট\n\n`;
  csv+="চাঁদার ইতিহাস\nমাস,নির্ধারিত,পরিশোধ,অবস্থা\n";
  allMonths.forEach(mon=>{
    const sp=specialMonths.find(s=>s.month===mon);
    const cr=getApplicableRate(mid,mon)+(sp?sp.amount:0);
    const paid=payments.find(p=>p.month===mon);
    csv+=`${mon},${cr},${paid?paid.amount:0},${paid?"পরিশোধ":"বকেয়া"}\n`;
  });
  const totExp=allMonths.reduce((s,mon)=>{const sp=specialMonths.find(x=>x.month===mon);return s+getApplicableRate(mid,mon)+(sp?sp.amount:0);},0);
  const totPaid=payments.reduce((s,p)=>s+p.amount,0);
  csv+=`\nসর্বমোট,${totExp},${totPaid},${totExp-totPaid>0?"বকেয়া "+(totExp-totPaid):"পরিশোধিত"}\n`;
  if(loans.length){
    csv+="\nঋণের ইতিহাস\nতারিখ,মূল ঋণ,বকেয়া,পরিশোধ,উদ্দেশ্য\n";
    loans.forEach(l=>{csv+=`${l.date},${l.principal},${l.remaining},${l.principal-l.remaining},"${l.note||""}"\n`;});
  }
  const blob=new Blob([bom+csv],{type:"text/csv;charset=utf-8;"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;a.download=`${m.name}_statement.csv`;a.click();URL.revokeObjectURL(url);
  toast("✅ Excel ডাউনলোড শুরু হয়েছে");
}

function addVote(){
  const title=document.getElementById("vt-title").value;
  const desc=document.getElementById("vt-desc").value;
  const endDate=document.getElementById("vt-end").value;
  if(!title){toast("⚠️ বিষয় লিখুন","#d97706");return;}
  D.votes=[...(D.votes||[]),{id:Date.now(),title,desc,endDate,votes:{},createdAt:new Date().toISOString().split("T")[0]}];
  logActivity("vote",`নতুন ভোট তৈরি হয়েছে: ${title}`);
  sv();toast("✅ ভোট তৈরি হয়েছে");goTab("voting");
}

function castVote(vid,val){
  const uid=window._uid||"admin";
  var memId=((D.members||[]).find(function(m){return m.id==uid;})||{}).id||uid;
  D.votes=(D.votes||[]).map(function(v){return v.id==vid?{...v,votes:{...(v.votes||{}),[memId]:val}}:v;});
  sv();toast("✅ ভোট দেওয়া হয়েছে");goTab("voting");
}

function delVote(id){
  if(!confirm("এই ভোট মুছবেন?"))return;
  const v=(D.votes||[]).find(x=>x.id===id);
  D.votes=(D.votes||[]).filter(v=>v.id!==id);
  if(v) logActivity("vote",`ভোট মুছে ফেলা হয়েছে: ${v.title}`);
  sv();toast("🗑 মুছে গেছে","#dc2626");goTab("voting");
}

          <button class="btn btn-outline" onclick="document.getElementById('minutes-modal').style.display='none'">বাতিল</button>
        </div>
      </div>

}

function addMeeting(){
  const title=document.getElementById("mt-title").value;
  const date=document.getElementById("mt-date").value;
  if(!title){toast("⚠️ বিষয় লিখুন","#d97706");return;}
  D.meetings=[...(D.meetings||[]),{id:Date.now(),title,date,place:document.getElementById("mt-place").value,type:document.getElementById("mt-type").value,agenda:document.getElementById("mt-agenda").value,attendance:{},minutes:""}];
  logActivity("meeting",`নতুন মিটিং যোগ হয়েছে: ${title}`);
  sv();toast("✅ মিটিং যোগ হয়েছে");goTab("meeting");
}

function toggleAttend(mid,memId){
  D.meetings=(D.meetings||[]).map(m=>m.id==mid?{...m,attendance:{...(m.attendance||{}),[memId]:!(m.attendance||{})[memId]}}:m);
  sv();goTab("meeting");
}

function addMinutes(mid){
  const mt=(D.meetings||[]).find(m=>m.id==mid);
  document.getElementById("min-mid").value=mid;
  document.getElementById("min-text").value=mt&&mt.minutes?mt.minutes:''||"";
  document.getElementById("minutes-modal").style.display="flex";
}

function saveMinutes(){
  const mid=Number(document.getElementById("min-mid").value);
  const txt=document.getElementById("min-text").value;
  D.meetings=(D.meetings||[]).map(m=>m.id==mid?{...m,minutes:txt}:m);
  sv();toast("✅ কার্যবিবরণী সেভ হয়েছে");
  document.getElementById("minutes-modal").style.display="none";
  goTab("meeting");
}

function delMeeting(id){
  if(!confirm("এই মিটিং মুছবেন?"))return;
  const mt=(D.meetings||[]).find(x=>x.id===id);
  D.meetings=(D.meetings||[]).filter(m=>m.id!==id);
  if(mt) logActivity("meeting",`মিটিং মুছে ফেলা হয়েছে: ${mt.title}`);
  sv();toast("🗑 মুছে গেছে","#dc2626");goTab("meeting");
}

function meetingPDF(mid){
  const mt=(D.meetings||[]).find(m=>m.id==mid);if(!mt)return;
  const members=D.members||[];
  const attendance=mt.attendance||{};
  const html=`<!DOCTYPE html><html><head><meta charset="UTF-8">
  <style>body{font-family:Arial,sans-serif;padding:30px;color:#111;font-size:13px}
  h1{color:#006400;border-bottom:3px solid #006400;padding-bottom:8px}
  table{width:100%;border-collapse:collapse}th{background:#006400;color:#fff;padding:8px}td{padding:7px;border-bottom:1px solid #e2e8f0}
  .agenda{background:#f8fafc;border-radius:8px;padding:12px;white-space:pre-line;margin:10px 0}</style></head><body>
  <h1>🪁 স্বপ্নঘুড়ি — মিটিং রিপোর্ট</h1>
  <p><b>বিষয়:</b> ${mt.title}<br><b>তারিখ:</b> ${mt.date||"—"}<br><b>স্থান:</b> ${mt.place||"—"}<br><b>ধরন:</b> ${mt.type||"সভা"}</p>
  ${mt.agenda?`<div class="agenda"><b>এজেন্ডা:</b><br>${mt.agenda}</div>`:""}
  <h2>উপস্থিতি</h2>
  <table><thead><tr><th>সদস্য</th><th>উপস্থিত</th></tr></thead><tbody>
  ${members.map(m=>`<tr><td>${m.name}</td><td>${attendance[m.id]?"✅ উপস্থিত":"❌ অনুপস্থিত"}</td></tr>`).join("")}
  </tbody></table>
  ${mt.minutes?`<h2>কার্যবিবরণী</h2><div class="agenda">${mt.minutes}</div>`:""}

  const w=window.open("","_blank");w.document.write(html);w.document.close();setTimeout(()=>w.print(),600);
}

function pgHealth(){
  const members=D.members||[];
  const payments=D.payments||[];
  const loans=D.loans||[];

  const {score,scoreColor,scoreLabel,collectionRate,loanRecovery,goalProgress}=calcHealthScore();

  const indicators=[
    {label:"চাঁদা আদায়ের হার",value:collectionRate+"%",score:collectionRate,color:"#1a8a00"},
    {label:"ঋণ উদ্ধারের হার",value:loanRecovery+"%",score:loanRecovery,color:"#2563eb"},
    {label:"লক্ষ্য পূরণ",value:goalProgress+"%",score:Math.min(goalProgress,100),color:"#d97706"},
    {label:"মোট সদস্য",value:members.length+" জন",score:100,color:"#7c3aed"},
  ];

  const allMonths2=[];let d2=new Date(2021,10,1);const now3=new Date();
  while(d2<=now3){allMonths2.push(`${d2.getFullYear()}-${String(d2.getMonth()+1).padStart(2,"0")}`);d2=new Date(d2.getFullYear(),d2.getMonth()+1,1);}

  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">
      <div><div class="section-title">💊 সমিতির স্বাস্থ্য</div>
      <div class="section-sub">Society Health Score</div></div>
      <button class="btn btn-sm" style="background:#dc2626;color:#fff" onclick="pdfDownload('health')">📄 PDF রিপোর্ট</button>
    </div>

    <!-- বড় স্কোর কার্ড — গোলাকার রিং চার্ট -->
    <div class="card" style="margin-bottom:14px;text-align:center;padding:26px 20px;background:linear-gradient(135deg,#f0fdf4,#dcfce7)">
      <div style="position:relative;width:160px;height:160px;margin:0 auto">
        <svg width="160" height="160" viewBox="0 0 160 160" style="transform:rotate(-90deg)">
          <circle cx="80" cy="80" r="68" fill="none" stroke="#e2e8f0" stroke-width="14"></circle>
          <circle cx="80" cy="80" r="68" fill="none" stroke="${scoreColor}" stroke-width="14" stroke-linecap="round"
            stroke-dasharray="${2*Math.PI*68}" stroke-dashoffset="${2*Math.PI*68*(1-score/100)}"
            style="transition:stroke-dashoffset .6s ease"></circle>
        </svg>
        <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center">
          <div style="font-size:40px;font-weight:900;color:${scoreColor}">${score}</div>
          <div style="font-size:11px;color:#64748b">/ ১০০</div>
        </div>
      </div>
      <div style="font-size:18px;font-weight:700;margin:10px 0 2px;color:#071a07">${scoreLabel}</div>
      <div style="font-size:13px;color:#64748b">স্বপ্নঘুড়ি সমিতির সামগ্রিক স্বাস্থ্য স্কোর</div>
    </div>

    <!-- সূচকসমূহ — ৪টি কার্ড ২×২ গ্রিডে -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
      ${indicators.map(ind=>`
        <div class="card" style="padding:16px;text-align:center">
          <div style="font-weight:800;font-size:22px;color:${ind.color}">${ind.value}</div>
          <div style="font-size:12px;color:#64748b;margin:4px 0">${ind.label}</div>
          <div style="background:#e2e8f0;border-radius:99px;height:7px;overflow:hidden">
            <div style="background:${ind.color};height:100%;width:${ind.score}%;border-radius:99px"></div>
          </div>
        </div>`).join("")}
    </div>

    <!-- বিস্তারিত টেবিল -->
    <div class="card">
      ${ch("📊","সদস্যভিত্তিক স্বাস্থ্য সূচক")}
      <div style="overflow-x:auto">
        <table class="tbl">
          <thead><tr style="background:#006400">
            <th style="color:#fff;white-space:nowrap">সদস্য</th>
            <th style="color:#fff;text-align:right;white-space:nowrap">চাঁদা দিয়েছেন</th>
            <th style="color:#fff;text-align:right;white-space:nowrap">চাঁদা বকেয়া</th>
            <th style="color:#fff;text-align:right;white-space:nowrap">ঋণ বকেয়া</th>
            <th style="color:#fff;text-align:center;white-space:nowrap">স্কোর</th>
          </thead></tr>
          <tbody>
            ${members.map(m=>{
              const mPaid=payments.filter(p=>p.mid==m.id).reduce((s,p)=>s+p.amount,0);
              const spM=(D.specialMonths||[]).filter(x=>x.mid==m.id);
              const mExp=allMonths2.reduce((s,mon)=>{const sp=spM.find(x=>x.month===mon);return s+getApplicableRate(m.id,mon)+(sp?sp.amount:0);},0);
              const mDue=mExp-mPaid;
              const mLoan=loans.filter(l=>l.mid==m.id).reduce((s,l)=>s+l.remaining,0);
              const mScore=Math.max(0,Math.round(100-(mDue/Math.max(1,mExp)*50)-(mLoan>0?20:0)));
              const sc=mScore>=80?"#16a34a":mScore>=60?"#d97706":"#dc2626";
              return `<tr>
                <td style="font-weight:600;white-space:nowrap">${m.name}</td>
                <td style="text-align:right;color:#16a34a;white-space:nowrap">${fmt(mPaid)}</td>
                <td style="text-align:right;color:${mDue>0?"#dc2626":"#16a34a"};white-space:nowrap">${mDue>0?fmt(mDue):"✅"}</td>
                <td style="text-align:right;color:${mLoan>0?"#dc2626":"#16a34a"};white-space:nowrap">${mLoan>0?fmt(mLoan):"✅"}</td>
                <td style="text-align:center;white-space:nowrap">
                  <span style="background:${sc};color:#fff;border-radius:6px;padding:3px 10px;font-weight:800;font-size:12px">${mScore}</span>
                </td>
              </tr>`;
            }).join("")}
          </tbody>
        </table>
      </div>
    </div>`;
}

function saveTemplate(){
  const title=document.getElementById("tmpl-title").value.trim();
  const cat=document.getElementById("tmpl-cat").value.trim()||"সাধারণ";
  const body=document.getElementById("tmpl-body").value.trim();
  const editId=document.getElementById("tmpl-edit-id").value;
  if(!title||!body){toast("⚠️ শিরোনাম ও বার্তা লিখুন","#d97706");return;}
  if(!D.msgTemplates)D.msgTemplates=[];
  if(editId){
    const idx=D.msgTemplates.findIndex(t=>t.id===editId);
    if(idx>=0)D.msgTemplates[idx]={id:editId,title,category:cat,body};
    toast("✅ টেম্পলেট আপডেট হয়েছে");
  }else{
    const id="tmpl_"+Date.now();
    D.msgTemplates.push({id,title,category:cat,body});
    toast("✅ টেম্পলেট সংরক্ষিত হয়েছে");
  }
  sv();
  document.getElementById("tmpl-title").value="";
  document.getElementById("tmpl-cat").value="";
  document.getElementById("tmpl-body").value="";
  document.getElementById("tmpl-edit-id").value="";
  document.getElementById("tmpl-form-title").textContent="➕ নতুন টেম্পলেট তৈরি করুন";
  goTab("msgtemplate");
}

    {id:"default2",title:"মাসিক চাঁদা পরিশোধের অনুরোধ",category:"চাঁদা",body:`আসসালামু আলাইকুম,\n\nপ্রিয় সদস্য,\n\nএই মাসের চাঁদা এখনো পরিশোধ হয়নি। অনুগ্রহ করে দ্রুত পরিশোধ করুন।\n\nবিস্তারিত দেখুন:\n${siteUrl}\n\nধন্যবাদ।\nস্বপ্নঘুড়ি সংগঠন`},
    {id:"default3",title:"মিটিং এর নোটিশ",category:"মিটিং",body:`আসসালামু আলাইকুম,\n\nসকল সদস্যকে জানানো যাচ্ছে যে আগামী মিটিং অনুষ্ঠিত হবে। সবাইকে যথাসময়ে উপস্থিত থাকার অনুরোধ করা হচ্ছে।\n\nবিস্তারিত জানতে:\n${siteUrl}\n\nধন্যবাদ।\nস্বপ্নঘুড়ি সংগঠন`},
  ];
  const all=[...defaults,...(D.msgTemplates||[])];
  const t=all.find(x=>x.id===id);
  if(!t)return;
  const today=new Date().toLocaleDateString("bn-BD");

  navigator.clipboard.writeText(text).then(()=>toast("📋 কপি হয়েছে! WhatsApp-এ পেস্ট করুন")).catch(()=>{
    const ta=document.createElement("textarea");ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);toast("📋 কপি হয়েছে!");

function editTemplate(id){
  const t=(D.msgTemplates||[]).find(x=>x.id===id);
  if(!t)return;
  document.getElementById("tmpl-title").value=t.title||"";
  document.getElementById("tmpl-cat").value=t.category||"";

function deleteTemplate(id){
  if(!confirm("এই টেম্পলেট মুছে ফেলবেন?"))return;
  D.msgTemplates=(D.msgTemplates||[]).filter(t=>t.id!==id);
  sv();toast("🗑️ মুছে ফেলা হয়েছে","#dc2626");goTab("msgtemplate");
}

function insertVar(text){
  const ta=document.getElementById("tmpl-body");
  if(!ta)return;
  const s=ta.selectionStart,e=ta.selectionEnd;
  ta.value=ta.value.substring(0,s)+text+ta.value.substring(e);
  ta.selectionStart=ta.selectionEnd=s+text.length;
  ta.focus();
}

function openGSearch(){
  document.getElementById("gsearch-modal").classList.add("show");
  setTimeout(()=>{const f=document.getElementById("gsearch-field");if(f){f.focus();f.value="";}runGSearch("");},80);
}
function closeGSearch(e){
  if(e&&e.target!==document.getElementById("gsearch-modal"))return;
  closeGSearchBtn();
}
function closeGSearchBtn(){
  document.getElementById("gsearch-modal").classList.remove("show");
}
document.addEventListener("keydown",function(e){
  if(e.key==="Escape")closeGSearchBtn();
  if((e.ctrlKey||e.metaKey)&&e.key==="k"){e.preventDefault();openGSearch();}
});
function runGSearch(q){
  const body=document.getElementById("gsearch-body");
  if(!D||!q||!q.trim()){body.innerHTML=`<div class="gsearch-empty">উপরে টাইপ করুন — নাম, মোবাইল, সদস্য আইডি, এনআইডি, ঋণ, সঞ্চয় সব খোঁজা যাবে</div>`;return;}
  const ql=q.trim().toLowerCase();
  const results=[];

  // সদস্য
  (D.members||[]).forEach(m=>{
    const hit=[m.name,m.phone,String(m.id||""),m.nid||"",m.role||""].some(f=>(f||"").toLowerCase().includes(ql));
    if(hit) results.push({cat:"👥 সদস্য",icon:"👤",title:m.name,sub:(m.role||"সদস্য")+(m.phone?" · "+m.phone:"")+(m.nid?" · NID: "+m.nid:""),action:()=>{closeGSearchBtn();goTab("members");}});
  });

  // সঞ্চয় / চাঁদা
  (D.payments||[]).forEach(p=>{
    const mName=gn(p.mid);
    const hit=[mName,String(p.amount||""),p.month||"",p.note||""].some(f=>(f||"").toLowerCase().includes(ql));
    if(hit) results.push({cat:"💰 সঞ্চয়",icon:"💰",title:mName+" — ৳"+Number(p.amount||0).toLocaleString("bn-BD"),sub:"মাস: "+(p.month||"—")+(p.note?" · "+p.note:""),action:()=>{closeGSearchBtn();goTab("savings");}});
  });

  // ঋণ
  (D.loans||[]).forEach(l=>{
    const mName=gn(l.mid);
    const hit=[mName,String(l.principal||""),String(l.remaining||""),l.note||""].some(f=>(f||"").toLowerCase().includes(ql));
    if(hit) results.push({cat:"🤝 ঋণ",icon:"🤝",title:mName+" — মূল: ৳"+Number(l.principal||0).toLocaleString("bn-BD"),sub:"বকেয়া: ৳"+Number(l.remaining||0).toLocaleString("bn-BD")+(l.note?" · "+l.note:""),action:()=>{closeGSearchBtn();goTab("loans");}});
  });

  // আয়-ব্যয়
  (D.income||[]).forEach(i=>{
    if(!([i.desc||"",String(i.amount||""),i.date||""].some(f=>(f||"").toLowerCase().includes(ql))))return;
    results.push({cat:"📥 আয়",icon:"📥",title:(i.desc||"আয়")+" — ৳"+Number(i.amount||0).toLocaleString("bn-BD"),sub:i.date||"",action:()=>{closeGSearchBtn();goTab("expenses");}});
  });
  (D.expenses||[]).forEach(e=>{
    if(!([e.desc||"",String(e.amount||""),e.date||"",e.cat||""].some(f=>(f||"").toLowerCase().includes(ql))))return;
    results.push({cat:"📤 ব্যয়",icon:"📤",title:(e.desc||"ব্যয়")+" — ৳"+Number(e.amount||0).toLocaleString("bn-BD"),sub:(e.cat||"")+(e.date?" · "+e.date:""),action:()=>{closeGSearchBtn();goTab("expenses");}});
  });

  // বিনিয়োগ
  (D.investments||[]).forEach(i=>{
    if(!([i.title||"",String(i.amount||""),i.type||""].some(f=>(f||"").toLowerCase().includes(ql))))return;
    results.push({cat:"📈 বিনিয়োগ",icon:"📈",title:(i.title||"বিনিয়োগ")+" — ৳"+Number(i.amount||0).toLocaleString("bn-BD"),sub:i.type||"",action:()=>{closeGSearchBtn();goTab("invest");}});
  });

  // নোটিশ
  (D.notices||[]).forEach(n=>{
    if(!([n.title||"",n.body||""].some(f=>(f||"").toLowerCase().includes(ql))))return;
    results.push({cat:"📢 নোটিশ",icon:"📢",title:n.title||"নোটিশ",sub:(n.body||"").slice(0,60),action:()=>{closeGSearchBtn();goTab("notice");}});
  });

  // সম্পদ
  (D.assets||[]).forEach(a=>{
    if(!([a.name||"",String(a.value||""),a.category||""].some(f=>(f||"").toLowerCase().includes(ql))))return;
    results.push({cat:"🏛️ সম্পদ",icon:"🏛️",title:(a.name||"সম্পদ")+" — ৳"+Number(a.value||0).toLocaleString("bn-BD"),sub:a.category||"",action:()=>{closeGSearchBtn();goTab("assets");}});
  });

  // মিটিং
  (D.meetings||[]).forEach(m=>{
    if(!([m.title||"",m.place||"",m.date||""].some(f=>(f||"").toLowerCase().includes(ql))))return;
    results.push({cat:"📅 মিটিং",icon:"📅",title:m.title||"মিটিং",sub:(m.date||"")+(m.place?" · "+m.place:""),action:()=>{closeGSearchBtn();goTab("meeting");}});
  });

  if(!results.length){body.innerHTML=`<div class="gsearch-empty">❌ "${q}" — কোনো ফলাফল পাওয়া যায়নি</div>`;return;}

  // গ্রুপ করা
  const groups={};
  results.slice(0,60).forEach(r=>{if(!groups[r.cat])groups[r.cat]=[];groups[r.cat].push(r);});
  let html="";
  Object.entries(groups).forEach(([cat,items])=>{
    html+=`<div class="gsearch-cat">${cat} (${items.length})</div>`;
    items.slice(0,8).forEach((r,idx)=>{
      const safeId="gsr-"+(cat+idx).replace(/\W/g,"");
      html+=`<div class="gsearch-item" id="${safeId}">
        <span style="font-size:22px">${r.icon}</span>
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:600;color:var(--ink)">${r.title}</div>
          ${r.sub?`<div style="font-size:11px;color:var(--muted);margin-top:2px">${r.sub}</div>`:""}
        </div>
        <span style="color:var(--muted);font-size:12px">→</span>
      </div>`;
    });
  });
  body.innerHTML=html;
  // attach click events after render
  results.slice(0,60).forEach((r,ri)=>{
    Object.entries(groups).forEach(([cat,items])=>{
      items.slice(0,8).forEach((item,idx)=>{
        const el=document.getElementById("gsr-"+(cat+idx).replace(/\W/g,""));
        if(el&&item===r){el.onclick=r.action;}
      });
    });
  });
  // safer: re-attach by index
  let flat=[];Object.values(groups).forEach(arr=>arr.slice(0,8).forEach(r=>flat.push(r)));
  document.querySelectorAll(".gsearch-item").forEach((el,i)=>{if(flat[i])el.onclick=flat[i].action;});
}

function openAIModal(){document.getElementById("ai-modal-bg").classList.add("show");}
function closeAIModal(e){if(e&&e.target!==document.getElementById("ai-modal-bg"))return;closeAIModalBtn();}
function closeAIModalBtn(){document.getElementById("ai-modal-bg").classList.remove("show");document.getElementById("ai-answer").style.display="none";}
function aiQuickAsk(q){document.getElementById("ai-question").value=q;askAI();}
async function askAI(){
  const q=document.getElementById("ai-question").value.trim();
  if(!q){toast("⚠️ প্রশ্ন লিখুন","#d97706");return;}
  const btn=document.getElementById("ai-send-btn");
  const ans=document.getElementById("ai-answer");
  btn.disabled=true;btn.textContent="⏳...";
  ans.style.display="block";
  ans.innerHTML=`বিশ্লেষণ করছি <span class="ai-typing"></span>`;

  // সমিতির ডেটা সংক্ষেপ তৈরি
  const members=D.members||[];
  const payments=D.payments||[];
  const loans=D.loans||[];
  const expenses=D.expenses||[];
  const income=D.income||[];
  const investments=D.investments||[];
  const totalFund=calcFund();
  const totalLoan=loans.reduce((s,l)=>s+l.principal,0);
  const totalDue=loans.reduce((s,l)=>s+l.remaining,0);
  const totalPaid=payments.reduce((s,p)=>s+p.amount,0);
  const totalExp=expenses.reduce((s,e)=>s+e.amount,0);
  const totalInc=income.reduce((s,i)=>s+i.amount,0)+totalPaid;
  const totalInvest=investments.reduce((s,i)=>s+i.amount,0);
  const duesList=(typeof getDuesList==="function")?getDuesList():[];
  const topDue=duesList.filter(m=>m.totalDue>0).sort((a,b)=>b.totalDue-a.totalDue).slice(0,5).map(m=>`${m.name}: ৳${m.totalDue}`).join(", ");
  const hs=calcHealthScore();

  const context=`আপনি স্বপ্নঘুড়ি সমিতির AI আর্থিক বিশ্লেষক। বাংলায় উত্তর দিন।
সমিতির তথ্য:
- মোট সদস্য: ${members.length} জন
- মোট তহবিল ব্যালেন্স: ৳${totalFund.toLocaleString("bn-BD")}
- মোট আয়: ৳${totalInc.toLocaleString("bn-BD")}
- মোট ব্যয়: ৳${totalExp.toLocaleString("bn-BD")}
- মোট চাঁদা আদায়: ৳${totalPaid.toLocaleString("bn-BD")}
- মোট ঋণ বিতরণ: ৳${totalLoan.toLocaleString("bn-BD")}
- মোট বকেয়া ঋণ: ৳${totalDue.toLocaleString("bn-BD")}
- মোট বিনিয়োগ: ৳${totalInvest.toLocaleString("bn-BD")}
- স্বাস্থ্য স্কোর: ${hs.score}/100 (${hs.scoreLabel})
- চাঁদা আদায়ের হার: ${hs.collectionRate}%
- ঋণ উদ্ধারের হার: ${hs.loanRecovery}%
- বকেয়া চাঁদা (শীর্ষ): ${topDue||"কেউ নেই"}
ব্যবহারকারীর প্রশ্ন: ${q}
সংক্ষিপ্ত ও স্পষ্ট পরামর্শ দিন।`;

  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,messages:[{role:"user",content:context}]})
    });
    const data=await res.json();
    const text=(data.content||[]).filter(c=>c.type==="text").map(c=>c.text).join("");
    ans.innerHTML=text||"উত্তর পাওয়া যায়নি।";
  }catch(e){
    ans.innerHTML="❌ AI সংযোগ ব্যর্থ হয়েছে। ইন্টারনেট সংযোগ চেক করুন।";
  }
  btn.disabled=false;btn.textContent="পাঠান";
}

const pdfBtn=()=>`<button class="no-print-btn no-print" onclick="window.print()">🖨️ প্রিন্ট / PDF সেভ</button>`;

const fmtBn=n=>"৳"+bnNum(n);

// pdfDownload তে members, voting, meeting, health যোগ
const _oldPdfDl=pdfDownload;
pdfDownload=function(type){
  if(type==="members"){
    const members=D.members||[];const payments=D.payments||[];const loans=D.loans||[];
    const allMonths4=[];let d4=new Date(2021,10,1);while(d4<=new Date()){allMonths4.push(`${d4.getFullYear()}-${String(d4.getMonth()+1).padStart(2,"0")}`);d4=new Date(d4.getFullYear(),d4.getMonth()+1,1);}
    const duesList=getDuesList();
    const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"><style>${pdfStyle}</style></head><body>
    ${pdfWM()}${pdfBtn()}
    <h1>🪁 স্বপ্নঘুড়ি — সদস্য তালিকা</h1>
    <div class="meta">তারিখ: ${new Date().toLocaleDateString("bn-BD")} | মোট সদস্য: ${bnNum(members.length)} জন</div>
    <table><thead><tr><th>#</th><th>নাম</th><th>পদ</th><th>মোবাইল</th><th>মোট চাঁদা</th><th>চাঁদা বকেয়া</th><th>ঋণ বকেয়া</th></tr></thead><tbody>
    ${members.map((m,i)=>{
      const mp=payments.filter(p=>p.mid==m.id).reduce((s,p)=>s+p.amount,0);
      const mDue=(duesList.find(d=>d.id==m.id)||{}).totalDue||0;
      const ml=loans.filter(l=>l.mid==m.id).reduce((s,l)=>s+l.remaining,0);
      return `<tr><td>${bnNum(i+1)}</td><td style="text-align:left;font-weight:600">${m.name}</td><td>${m.role||"সদস্য"}</td><td>${m.phone||"—"}</td><td>${fmtBn(mp)}</td><td style="color:${mDue>0?"#dc2626":"#16a34a"};font-weight:600">${fmtBn(mDue)}</td><td style="color:${ml>0?"#dc2626":"#16a34a"};font-weight:600">${fmtBn(ml)}</td></tr>`;
    }).join("")}
    </tbody></table></body></html>`;
    const w=window.open("","_blank");w.document.write(html);w.document.close();setTimeout(()=>w.print(),600);
    toast("📄 PDF খুলছে");return;
  }
  if(type==="voting"){
    const votes=D.votes||[];const members=D.members||[];
    const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"><style>${pdfStyle}.card{border:1px solid #e2e8f0;border-radius:8px;padding:14px;margin-bottom:14px}</style></head><body>
    ${pdfWM()}${pdfBtn()}
    <h1>🪁 স্বপ্নঘুড়ি — ভোটিং রিপোর্ট</h1>
    <div class="meta">তারিখ: ${new Date().toLocaleDateString("bn-BD")}</div>
    ${votes.map(v=>{
      const y=Object.values(v.votes||{}).filter(x=>x==="হ্যাঁ").length;
      const n=Object.values(v.votes||{}).filter(x=>x==="না").length;
      return `<div class="card"><h2>${v.title}</h2><p>${v.desc||""}</p>
      <table><thead><tr><th>সদস্য</th><th>ভোট</th></tr></thead><tbody>
      ${members.map(m=>`<tr><td style="text-align:left">${m.name}</td><td style="color:${(v.votes||{})[m.id]==="হ্যাঁ"?"#16a34a":(v.votes||{})[m.id]==="না"?"#dc2626":"#94a3b8"};font-weight:600">${(v.votes||{})[m.id]||"ভোট দেননি"}</td></tr>`).join("")}
      <tr style="background:#f0fdf4;font-weight:800"><td>ফলাফল</td><td>✅ হ্যাঁ: ${bnNum(y)} | ❌ না: ${bnNum(n)}</td></tr></tbody></table></div>`;
    }).join("")}
    </body></html>`;
    const w=window.open("","_blank");w.document.write(html);w.document.close();setTimeout(()=>w.print(),600);
    toast("📄 PDF খুলছে");return;
  }
  if(type==="meeting"){
    const meetings=D.meetings||[];const members=D.members||[];
    const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"><style>${pdfStyle}.card{border:1px solid #e2e8f0;border-radius:8px;padding:14px;margin-bottom:14px}</style></head><body>
    ${pdfWM()}${pdfBtn()}
    <h1>🪁 স্বপ্নঘুড়ি — মিটিং রিপোর্ট</h1>
    <div class="meta">তারিখ: ${new Date().toLocaleDateString("bn-BD")}</div>
    ${meetings.map(mt=>{
      const att=mt.attendance||{};
      const present=members.filter(m=>att[m.id]).map(m=>m.name).join(", ");
      const absent=members.filter(m=>!att[m.id]).map(m=>m.name).join(", ");
      return `<div class="card"><h2>${mt.title}</h2>
      <table><thead><tr><th>বিবরণ</th><th>তথ্য</th></tr></thead><tbody>
      <tr><td>তারিখ</td><td>${mt.date||"—"}</td></tr>
      <tr><td>স্থান</td><td>${mt.place||"—"}</td></tr>
      ${mt.agenda?`<tr><td>এজেন্ডা</td><td style="text-align:left">${mt.agenda}</td></tr>`:""}
      <tr><td>উপস্থিত</td><td style="text-align:left;color:#16a34a">${present||"কেউ নয়"}</td></tr>
      <tr><td>অনুপস্থিত</td><td style="text-align:left;color:#dc2626">${absent||"সবাই উপস্থিত"}</td></tr>
      ${mt.minutes?`<tr><td>কার্যবিবরণী</td><td style="text-align:left">${mt.minutes}</td></tr>`:""}
      </tbody></table></div>`;
    }).join("")}
    </body></html>`;
    const w=window.open("","_blank");w.document.write(html);w.document.close();setTimeout(()=>w.print(),600);
    toast("📄 PDF খুলছে");return;
  }
  if(type==="health"){
    const members=D.members||[];const payments=D.payments||[];const loans=D.loans||[];
    const duesList=getDuesList();
    const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"><style>${pdfStyle}</style></head><body>
    ${pdfWM()}${pdfBtn()}
    <h1>🪁 স্বপ্নঘুড়ি — স্বাস্থ্য রিপোর্ট</h1>
    <div class="meta">তারিখ: ${new Date().toLocaleDateString("bn-BD")}</div>
    <table><thead><tr><th>সদস্য</th><th>মোট চাঁদা</th><th>চাঁদা বকেয়া</th><th>ঋণ বকেয়া</th></tr></thead><tbody>
    ${members.map(m=>{
      const mp=payments.filter(p=>p.mid==m.id).reduce((s,p)=>s+p.amount,0);
      const mDue=(duesList.find(d=>d.id==m.id)||{}).totalDue||0;
      const ml=loans.filter(l=>l.mid==m.id).reduce((s,l)=>s+l.remaining,0);
      return `<tr><td style="text-align:left;font-weight:600">${m.name}</td><td>${fmtBn(mp)}</td><td style="color:${mDue>0?"#dc2626":"#16a34a"};font-weight:600">${fmtBn(mDue)}</td><td style="color:${ml>0?"#dc2626":"#16a34a"};font-weight:600">${fmtBn(ml)}</td></tr>`;
    }).join("")}
    </tbody></table></body></html>`;
    const w=window.open("","_blank");w.document.write(html);w.document.close();setTimeout(()=>w.print(),600);
    toast("📄 PDF খুলছে");return;
  }
  _oldPdfDl(type);
};

window.addEventListener("DOMContentLoaded",function(){
  const savedRole=localStorage.getItem("sg_role");
  if(savedRole){
    try{
      role=savedRole;
      D=LS.get(SK)||JSON.parse(JSON.stringify(SEED));

      document.getElementById("app").style.display="flex";

      trackVisitor();

      localStorage.removeItem("sg_role");
    }
  }
