*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--g1:#006400;--g2:#1a8a00;--g3:#86efac;--gl:#f0fdf4;--rd:#dc2626;--rl:#fff1f2;--gd:#d97706;--yl:#fffbeb;--bl:#1a8a00;--ink:#071a07;--muted:#64748b;--bg:#f1f5f9;--white:#fff;--border:#e2e8f0}
html[data-theme="dark"]{--ink:#e8f5e8;--muted:#94a3b8;--bg:#0c1410;--white:#16201a;--border:#243024;--gl:#142a18;--rl:#2a1418;--yl:#2a2414}
html[data-theme="dark"] body{background:var(--bg);color:var(--ink)}
html[data-theme="dark"] .tbl th{background:#1a241c}
html[data-theme="dark"] .tbl tr:hover td{background:#1a241c}
html[data-theme="dark"] .stat-box,html[data-theme="dark"] .row{background:#1a241c}
html[data-theme="dark"] .field input,html[data-theme="dark"] .field select,html[data-theme="dark"] .field textarea{background:var(--white);color:var(--ink)}
html[data-theme="dark"] .chip{background:var(--white);color:var(--ink)}
html[data-theme="dark"] .topbar{background:var(--white)}
html[data-theme="dark"] .mobile-nav{background:var(--white)}
body{font-family:'Hind Siliguri',sans-serif;background:var(--bg);color:var(--ink)}
button,input,select,textarea{font-family:'Hind Siliguri',sans-serif}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:2px}

.app{display:flex;min-height:100vh}
.sidebar{width:235px;background:linear-gradient(180deg,#071a07 0%,#006400 50%,#006400 100%);position:fixed;top:0;left:0;bottom:0;display:flex;flex-direction:column;z-index:200;overflow-y:auto;transition:transform .3s}
.main{margin-left:235px;flex:1;min-height:100vh;display:flex;flex-direction:column}
.topbar{background:var(--white);border-bottom:1px solid var(--border);padding:13px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 1px 6px rgba(0,0,0,.06)}
.content{padding:22px;flex:1;max-width:1100px;width:100%}

.sb-logo{padding:22px 18px 14px;border-bottom:1px solid rgba(255,255,255,.08)}
.sb-nav{flex:1;padding:10px 8px}
.sb-section{font-size:9px;font-weight:700;color:rgba(255,255,255,.3);letter-spacing:1.5px;padding:10px 12px 4px;text-transform:uppercase}
.sb-btn{width:100%;display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:9px;border:none;cursor:pointer;font-family:inherit;margin-bottom:1px;background:transparent;color:rgba(255,255,255,.5);font-size:13px;font-weight:400;border-left:3px solid transparent;transition:all .15s;text-align:left}
.sb-btn:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.85)}
.sb-btn.active{background:rgba(255,255,255,.13);color:#fff;font-weight:600;border-left-color:#86efac}
.sb-btn .sbi{font-size:16px;width:20px;text-align:center}
.sb-footer{padding:12px 14px;border-top:1px solid rgba(255,255,255,.08)}

.hamburger{display:none;background:none;border:none;font-size:22px;cursor:pointer;color:var(--muted)}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:150}
.overlay.show{display:block}

.card{background:var(--white);border-radius:14px;box-shadow:0 2px 10px rgba(0,0,0,.06);overflow:hidden;margin-bottom:14px}
.ch{display:flex;align-items:center;gap:9px;padding:12px 16px}
.ch .ci{font-size:16px}.ch .ct{color:#fff;font-weight:700;font-size:14px}.ch .cs{color:rgba(255,255,255,.6);font-size:11px;margin-top:1px}
.cb{padding:16px}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;align-items:stretch}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;align-items:stretch}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;align-items:stretch}
.gauto{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px;align-items:stretch}
.grid2>.card,.grid3>.card,.grid4>.card,.gauto>.card,.grid2>.kpi,.grid3>.kpi,.grid4>.kpi{height:100%}

.kpi{background:var(--white);border-radius:13px;padding:16px;box-shadow:0 2px 10px rgba(0,0,0,.06)}
.kpi .ki{font-size:24px;margin-bottom:6px}
.kpi .kv{font-size:20px;font-weight:800;margin-bottom:2px}
.kpi .kl{font-size:11px;color:var(--muted)}
.kpi .ksub{font-size:10px;margin-top:3px;font-weight:600}

.row{display:flex;justify-content:space-between;align-items:center;padding:9px 16px;border-bottom:1px solid #f1f5f9}
.row:last-child{border-bottom:none}
.rl{font-size:13px;color:var(--muted)}.rv{font-size:13px;font-weight:700}
.hi{background:#f0fdf4}.hi .rv{color:var(--g2)}
.rd-row{background:#fff5f5}.rd-row .rv{color:var(--rd)}

.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}

.field{margin-bottom:11px}
.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px;font-weight:600}
.field input,.field select,.field textarea{width:100%;padding:10px 13px;border-radius:9px;border:1.5px solid var(--border);font-size:14px;font-family:inherit;outline:none;background:var(--white);transition:border-color .2s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--g2)}
.field textarea{resize:vertical;min-height:75px}

.btn{border:none;border-radius:9px;padding:10px 18px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .15s,transform .1s;display:inline-flex;align-items:center;gap:6px}
.btn:active{transform:scale(.97)}.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-g{background:linear-gradient(135deg,var(--g1),var(--g2));color:#fff;box-shadow:0 2px 8px rgba(20,83,45,.25)}
.btn-r{background:linear-gradient(135deg,#991b1b,var(--rd));color:#fff}
.btn-b{background:linear-gradient(135deg,#006400,var(--bl));color:#fff}
.btn-gold{background:linear-gradient(135deg,#92400e,var(--gd));color:#fff}
.btn-outline{background:transparent;border:2px solid var(--border);color:var(--muted)}
.btn-sm{padding:6px 13px;font-size:12px;border-radius:8px}
.btn-full{width:100%;justify-content:center}

.prog{background:#e2e8f0;border-radius:10px;overflow:hidden}
.prog-bar{height:100%;border-radius:10px;transition:width .6s ease}

.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;flex-shrink:0}

.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{padding:5px 13px;border-radius:20px;border:1.5px solid var(--border);background:var(--white);font-size:12px;cursor:pointer;font-family:inherit;transition:all .15s}
.chip.on{background:#dcfce7;border-color:var(--g2);color:var(--g2);font-weight:700}

.tab-bar{display:flex;gap:6px;margin-bottom:14px;background:var(--white);border-radius:11px;padding:4px;box-shadow:0 1px 6px rgba(0,0,0,.05)}
.tab-btn{flex:1;padding:8px;border-radius:8px;border:none;cursor:pointer;font-family:inherit;font-size:12px;font-weight:500;color:var(--muted);background:transparent;transition:all .2s}
.tab-btn.on{background:linear-gradient(135deg,var(--g1),var(--g2));color:#fff;font-weight:700}

.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{background:#f8fafc;padding:9px 12px;text-align:left;font-size:11px;font-weight:700;color:var(--muted);border-bottom:2px solid var(--border)}
.tbl thead tr[style] th{background:transparent !important;color:inherit !important}
.tbl td{padding:9px 12px;border-bottom:1px solid #f1f5f9;vertical-align:middle}
.tbl tr:hover td{background:#fafafa}
.tbl tr:last-child td{border-bottom:none}

.section-title{font-size:18px;font-weight:800;color:var(--ink);margin-bottom:4px}
.section-sub{font-size:12px;color:var(--muted);margin-bottom:16px}

#toast{position:fixed;top:78px;left:50%;transform:translateX(-50%);padding:10px 24px;border-radius:30px;color:#fff;font-size:13px;font-weight:700;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.2);white-space:nowrap;display:none}

@keyframes fadeUp{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes sli{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.pa{animation:sli .3s ease}

.login-wrap{min-height:100vh;background:linear-gradient(135deg,#050d14,#006400,#006400);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;font-family:'Hind Siliguri',sans-serif}
.login-box{background:rgba(255,255,255,.07);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:28px;width:100%;max-width:360px}

.hero{background:linear-gradient(135deg,#050d14,#006400,#006400);border-radius:16px;padding:24px 20px;color:#fff;margin-bottom:16px;position:relative;overflow:hidden}
.hero::after{content:'🪁';position:absolute;right:-10px;top:-10px;font-size:100px;opacity:.05;transform:rotate(-20deg)}

.notice-card{border-radius:13px;padding:14px 16px;margin-bottom:11px;border:2px solid;display:flex;gap:12px;align-items:flex-start}

.mobile-nav{position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--border);z-index:180;padding:4px 0 7px;box-shadow:0 -3px 14px rgba(0,0,0,.07);display:none}
.mn{flex:1;background:none;border:none;padding:6px 2px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;font-family:inherit}
.mn .mi{font-size:19px}.mn .ml{font-size:9px;color:#94a3b8}
.mn.on .ml{color:var(--g2);font-weight:700}
.mn .md{width:14px;height:3px;background:var(--g2);border-radius:2px;display:none}
.mn.on .md{display:block}

.viewer-bar{background:var(--yl);border-bottom:2px solid var(--gd);padding:7px 22px;font-size:12px;color:var(--gd);font-weight:600}

.stat-box{text-align:center;background:#f8fafc;border-radius:9px;padding:9px 6px}
.stat-box .sv{font-size:12px;font-weight:700}.stat-box .sl{font-size:10px;color:#94a3b8;margin-top:2px}

.fab{display:none;position:fixed;bottom:80px;right:20px;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--g1),var(--g2));color:#fff;font-size:26px;border:none;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.3);z-index:300;align-items:center;justify-content:center;transition:transform .2s}
.fab.show{display:flex}
.fab.open{transform:rotate(45deg)}
@media(min-width:769px){.fab{bottom:24px}}
.fab-menu{position:fixed;bottom:144px;right:20px;display:none;flex-direction:column;gap:8px;z-index:300}
.fab-menu.show{display:flex}
.fab-menu button{display:flex;align-items:center;gap:8px;background:var(--white);color:var(--ink);border:1px solid var(--border);border-radius:30px;padding:9px 16px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;box-shadow:0 2px 10px rgba(0,0,0,.12);white-space:nowrap}
@media(min-width:769px){.fab-menu{bottom:88px}}

.bell-wrap{position:relative;cursor:pointer}
.bell-dot{position:absolute;top:-3px;right:-3px;background:var(--rd);color:#fff;font-size:9px;font-weight:800;border-radius:10px;min-width:16px;height:16px;display:flex;align-items:center;justify-content:center;padding:0 3px}
.notif-pop{position:absolute;top:36px;right:0;background:var(--white);border:1px solid var(--border);border-radius:13px;box-shadow:0 8px 28px rgba(0,0,0,.18);width:300px;max-height:380px;overflow-y:auto;z-index:500;display:none}
.notif-pop.show{display:block}
.notif-item{padding:11px 14px;border-bottom:1px solid #f1f5f9;font-size:12px;cursor:pointer}
.notif-item:hover{background:#fafafa}
.notif-item.unread{background:#f0fdf4}

@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}
  .main{margin-left:0}.hamburger{display:block}
  .content{padding:12px;padding-bottom:75px}
  .grid4{grid-template-columns:1fr 1fr}.grid3{grid-template-columns:1fr 1fr}
  .mobile-nav{display:flex!important}
}
@media(min-width:769px){.mobile-nav{display:none!important}}
</style>

function restoreData(event){
  const file=event.target.files[0];
  if(!file)return;
  if(!confirm("সতর্কতা! এটা করলে বর্তমান সব ডেটা মুছে যাবে। নিশ্চিত?"))return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const data=JSON.parse(e.target.result);
      if(!data.members){toast("❌ ভুল ফাইল! সঠিক backup ফাইল দিন","#dc2626");return;}
      D=data;
      sv();

    }catch(err){toast("❌ ফাইল পড়তে সমস্যা হয়েছে","#dc2626");}
  };
  reader.readAsText(file);
}

function calcFund(){
  const inc=(D.income||[]).reduce((s,i)=>s+i.amount,0)+(D.payments||[]).reduce((s,p)=>s+p.amount,0);
  const exp=(D.expenses||[]).reduce((s,e)=>s+e.amount,0);
  return inc-exp;
}
function calcHealthScore(){
  const members=D.members||[], payments=D.payments||[], loans=D.loans||[], goals=D.goals||[];
  const totalExp2=(()=>{
    const allMonths=[];let d=new Date(2021,10,1);const now2=new Date();
    while(d<=now2){allMonths.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`);d=new Date(d.getFullYear(),d.getMonth()+1,1);}
    return members.reduce((s,m)=>s+allMonths.length*(m.monthlyRate||2000),0);
  })();
  const totalPaid2=payments.reduce((s,p)=>s+p.amount,0);
  const collectionRate=totalExp2?Math.round(totalPaid2/totalExp2*100):0;
  const loanDueTotal=loans.reduce((s,l)=>s+l.remaining,0);
  const loanTotal=loans.reduce((s,l)=>s+l.principal,0);
  const loanRecovery=loanTotal?Math.round((loanTotal-loanDueTotal)/loanTotal*100):100;
  const fund=calcFund();
  const mainGoal=goals[0];
  const goalProgress=mainGoal?Math.round(fund/mainGoal.target*100):0;
  const score=Math.round((collectionRate*0.4)+(loanRecovery*0.3)+(Math.min(goalProgress,100)*0.3));
  const scoreColor=score>=80?"#16a34a":score>=60?"#d97706":"#dc2626";
  const scoreLabel=score>=80?"🟢 চমৎকার":score>=60?"🟡 মোটামুটি":"🔴 উদ্বেগজনক";
  return {score,scoreColor,scoreLabel,collectionRate,loanRecovery,goalProgress};
}

function applyTheme(mode){
  let real=mode;
  if(mode==="system"){
    real=(window.matchMedia&&window.matchMedia("(prefers-color-scheme: dark)").matches)?"dark":"light";
  }
  document.documentElement.setAttribute("data-theme",real);
  ["th-light","th-dark","th-system"].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.style.background = id===("th-"+mode) ? "rgba(255,255,255,.35)" : "rgba(255,255,255,.1)";
  });
}
function setTheme(mode){
  localStorage.setItem("sg_theme",mode);
  applyTheme(mode);
}

  // ── বিস্তৃত পাই চার্ট: নগদ/ব্যাংক, বিনিয়োগ, বকেয়া চাঁদা, বকেয়া ঋণ, স্থাবর সম্পদ, অন্যান্য সম্পদ ──
  const fixedAsset=assets.filter(a=>a.category==="স্থাবর সম্পদ").reduce((s,a)=>s+a.value,0);
  const otherAsset=Math.max(0,totalAsset-fixedAsset);
  const pieSlices=[
    {label:"নগদ/ব্যাংক ব্যালেন্স",value:Math.max(0,fund),color:"#1a8a00"},
    {label:"বিনিয়োগ",value:totalInvest,color:"#0d9488"},
    {label:"বকেয়া চাঁদা",value:totalDueChada,color:"#d97706"},
    {label:"বকেয়া ঋণ",value:totalDueLoan,color:"#dc2626"},
    {label:"স্থাবর সম্পদ",value:fixedAsset,color:"#7c3aed"},
    {label:"অন্যান্য সম্পদ",value:otherAsset,color:"#2563eb"},
  ];
  const pieGrand=Math.max(1,pieSlices.reduce((s,x)=>s+x.value,0));
  let cum=0;
  const gradParts=pieSlices.map(s=>{
    const from=cum, pct=(s.value/pieGrand)*100; cum+=pct;
    return `${s.color} ${from}% ${cum}%`;
  }).join(", ");
  const pieChart=`
    <div style="display:flex;align-items:center;gap:20px;flex-wrap:wrap;justify-content:center;padding:8px 0">
      <div style="width:150px;height:150px;border-radius:50%;background:conic-gradient(${gradParts});position:relative;flex-shrink:0">

          <div style="font-size:10px;color:#94a3b8">সর্বমোট</div>
          <div style="font-size:12px;font-weight:800;color:#071a07">${fmt(pieGrand)}</div>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:6px">
        ${pieSlices.map(s=>`<div style="display:flex;align-items:center;gap:7px"><span style="width:10px;height:10px;border-radius:3px;background:${s.color};display:inline-block;flex-shrink:0"></span><span style="font-size:11.5px;color:#475569">${s.label} — <b style="color:${s.color}">${Math.round(s.value/pieGrand*100)}%</b> (${fmt(s.value)})</span></div>`).join("")}
      </div>
    </div>`;

  // ── মাসভিত্তিক বার চার্ট (গত ৬ মাস: চাঁদা আদায়, আয়, ব্যয়, লাভ) ──
  const monthKeys=[];
  for(let i=5;i>=0;i--){const d=new Date(now.getFullYear(),now.getMonth()-i,1);monthKeys.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`);}
  const monthData=monthKeys.map(mk=>{
    const [y,mm]=mk.split("-");
    const duesCollected=payments.filter(p=>p.month===mk).reduce((s,p)=>s+p.amount,0);
    const inc=(D.income||[]).filter(i=>(i.date||"").slice(0,7)===mk).reduce((s,i)=>s+i.amount,0)+duesCollected;
    const exp=(D.expenses||[]).filter(e=>(e.date||"").slice(0,7)===mk).reduce((s,e)=>s+e.amount,0);
    return {mk,label:BNM[Number(mm)-1],due:duesCollected,inc,exp,profit:inc-exp};
  });
  const barMax=Math.max(1,...monthData.flatMap(m=>[m.due,m.inc,m.exp,Math.abs(m.profit)]));
  const barColors={due:"#1a8a00",inc:"#0d9488",exp:"#dc2626",profit:"#7c3aed"};
  const barChart=`
    <div style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;font-size:11px;color:#475569">
      ${Object.entries({due:"চাঁদা আদায়",inc:"আয়",exp:"ব্যয়",profit:"লাভ"}).map(([k,l])=>`<span style="display:flex;align-items:center;gap:4px"><span style="width:9px;height:9px;border-radius:2px;background:${barColors[k]};display:inline-block"></span>${l}</span>`).join("")}
    </div>
    <div style="display:flex;align-items:flex-end;gap:10px;height:130px;overflow-x:auto;padding-bottom:2px">
      ${monthData.map(m=>`
        <div style="display:flex;flex-direction:column;align-items:center;gap:3px;flex-shrink:0">

            ${["due","inc","exp"].map(k=>`<div title="${fmt(m[k])}" style="width:9px;border-radius:3px 3px 0 0;background:${barColors[k]};height:${Math.max(2,Math.round((m[k]/barMax)*100))}px"></div>`).join("")}
            <div title="${fmt(m.profit)}" style="width:9px;border-radius:3px 3px 0 0;background:${m.profit>=0?barColors.profit:"#9ca3af"};height:${Math.max(2,Math.round((Math.abs(m.profit)/barMax)*100))}px"></div>
          </div>
          <div style="font-size:10px;color:#64748b">${m.label}</div>
        </div>`).join("")}
    </div>`;

  // ── Recent Activities ──
  const activities=[];
  payments.forEach(p=>activities.push({t:p.id,icon:"💰",text:`${gn(p.mid)} ${fmt(p.amount)} টাকা চাঁদা জমা দিয়েছেন`}));
  loans.forEach(l=>activities.push({t:l.id,icon:"🤝",text:`${gn(l.mid)} ${fmt(l.principal)} টাকা ঋণ নিয়েছেন`}));
  (D.investments||[]).forEach(i=>activities.push({t:i.id,icon:"📈",text:`${i.title} — ${fmt(i.amount)} টাকা বিনিয়োগ করা হয়েছে`}));
  (D.notices||[]).forEach(n=>activities.push({t:n.id,icon:"📢",text:`নতুন নোটিশ প্রকাশিত হয়েছে: ${n.title}`}));
  (D.meetings||[]).forEach(mt=>activities.push({t:mt.id,icon:"📅",text:`${ds(mt.date)} — মিটিং: ${mt.title}`}));
  const recentHtml=activities.sort((a,b)=>b.t-a.t).slice(0,15).map(a=>
    `<div style="display:flex;gap:10px;align-items:flex-start;padding:9px 16px;border-bottom:1px solid #f1f5f9"><span style="font-size:16px">${a.icon}</span><span style="font-size:12.5px;line-height:1.5">${a.text}</span></div>`
  ).join("")||`<div style="padding:16px;text-align:center;color:#94a3b8">কোনো কার্যক্রম নেই</div>`;

  // ── Mini Health Score ──
  const hs=calcHealthScore();

  return `
    <div class="hero">
      <div style="font-size:11px;opacity:.5;margin-bottom:3px">${BNM[now.getMonth()]} ${now.getFullYear()}</div>
      <div style="font-size:22px;font-weight:800;line-height:1.3;margin-bottom:3px">স্বাগতম, স্বপ্নঘুড়ি 🪁</div>
      <div style="font-size:12px;opacity:.6;margin-bottom:6px">আজকের তারিখ: ${ds(now.toISOString().slice(0,10))}</div>
      <div style="font-size:12px;opacity:.7;margin-bottom:16px">📢 নতুন নোটিশ: ${(D.notices||[]).length} টি &nbsp;•&nbsp; ⚠️ বকেয়া সদস্য: ${duesList.filter(m=>m.totalDue>0).length} জন</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center">
        ${[["মোট সম্পদ",fmt(totalAsset)],["তহবিল",fmt(fund)],["বকেয়া ঋণ",fmt(totalDue)],["বকেয়া চাঁদা",fmt(totalDueChada)]].map(([l,v])=>`<div style="background:rgba(255,255,255,.1);border-radius:9px;padding:9px 13px;border:1px solid rgba(255,255,255,.1)"><div style="color:rgba(255,255,255,.55);font-size:10px">${l}</div><div style="color:#fff;font-weight:800;font-size:15px">${v}</div></div>`).join("")}
        <div style="background:#fff;border-radius:9px;padding:9px 13px;border:1px solid rgba(255,255,255,.1);cursor:pointer" onclick="goTab('health')">
          <div style="color:#64748b;font-size:10px">স্বাস্থ্য স্কোর</div>
          <div style="color:${hs.scoreColor};font-weight:800;font-size:15px">${hs.score}/১০০ ${hs.scoreLabel}</div>
        </div>
      </div>
    </div>
    ${hs.score<60?`<div style="background:#fff7ed;border:2px solid #fb923c;border-radius:13px;padding:13px 16px;margin-bottom:14px;display:flex;gap:11px;align-items:center"><span style="font-size:20px;flex-shrink:0">⚠️</span><div style="font-size:12.5px;color:#9a3412;font-weight:600">সংগঠনের স্বাস্থ্য স্কোর কম (${hs.score}/১০০) — বকেয়া চাঁদা/ঋণ আদায়ে গুরুত্ব দিন</div></div>`:""}
    ${pinned?`<div style="background:#fffbeb;border:2px solid #fbbf24;border-radius:13px;padding:13px 16px;margin-bottom:14px;display:flex;gap:11px;align-items:flex-start"><span style="font-size:20px;flex-shrink:0">📌</span><div><div style="font-weight:700;font-size:14px;color:#92400e;margin-bottom:3px">${pinned.title}</div><div style="font-size:12px;color:#a16207;line-height:1.6">${pinned.body}</div></div></div>`:""}
    <div class="grid4" style="margin-bottom:14px">
      ${kpis.map(([i,v,l,c,bg])=>`<div class="kpi" style="background:${bg}"><div class="ki">${i}</div><div class="kv" style="color:${c}">${v}</div><div class="kl">${l}</div></div>`).join("")}
    </div>

    <div class="grid2" style="margin-bottom:14px">
      <div class="card">${ch("🏦","সম্পদ ও বকেয়ার বিস্তারিত ভাগ","সর্বমোট হিসাব")}<div class="cb">${pieChart}</div></div>
      <div class="card">${ch("📊","মাসভিত্তিক ট্রেন্ড (৬ মাস)","চাঁদা · আয় · ব্যয় · লাভ","teal")}<div class="cb">${barChart}</div></div>
    </div>

    <div class="card" style="margin-bottom:14px">${ch("🕐","সাম্প্রতিক কার্যক্রম","Recent Activities","p")}${recentHtml}</div>

    <div class="card" style="margin-bottom:14px">${ch("📅",`${BNM[now.getMonth()]} ${now.getFullYear()} — চাঁদার অবস্থা`,`${paidIds.size} জন দিয়েছেন`)}<div style="padding:12px 16px;display:flex;flex-wrap:wrap;gap:7px">${memberStatus}</div></div>
    <div class="grid2">
      <div class="card">${ch("🔴","বকেয়া ঋণ তালিকা","সদস্যভিত্তিক বকেয়া ঋণ","r")}${loanRows}</div>
      <div class="card">${ch("🟠","বকেয়া চাঁদা তালিকা","সদস্যভিত্তিক বকেয়া চাঁদা","gold")}${chadaDueRows}</div>
    </div>
    <div class="card" style="margin-top:14px">${ch("📊","আর্থিক সংক্ষেপ")}
      ${rw("মোট আয়",fmt(totalInc),"hi")}
      ${rw("মোট ব্যয়",fmt(totalExp))}
      ${rw("তহবিল ব্যালেন্স (ব্যাংক স্থিতি)",fmt(fund),"hi")}
      ${rw("মোট সম্পদ",fmt(totalAsset))}
      ${rw("মোট বিনিয়োগ",fmt(totalInvest))}
      ${rw("মোট লাভ/ক্ষতি",fmt(fund),fund>=0?"hi":"rd-row")}
      ${rw("প্রতি সদস্যের হিস্যা",fmt(fund/Math.max(1,members.length)),"hi")}
    </div>`;
}

function pgSavings(){
  const members=D.members||[], payments=D.payments||[];
  const filt=window._sfilt||curMon;
  const filtered=payments.filter(p=>p.month===filt);
  const total=filtered.reduce((s,p)=>s+p.amount,0);
  const paidIds=new Set(filtered.map(p=>p.mid));
  const allTotal=payments.reduce((s,p)=>s+p.amount,0);

  const form=isA()?`<div class="card">${ch("💰","চাঁদা যোগ করুন")}<div class="cb">
    <div class="field"><label>সদস্য</label><select id="pMem"><option value="">-- সদস্য --</option>${members.map(m=>`<option value="${m.id}">${m.name}</option>`).join("")}</select></div>
    <div class="grid2">
      <div class="field"><label>পরিমাণ (৳)</label><input type="number" id="pAmt" value="5000"></div>
      <div class="field"><label>মাস</label><input type="month" id="pMon" value="${curMon}"></div>
    </div>
    <div class="field"><label>নোট</label><input id="pNote" placeholder="ঐচ্ছিক"></div>
    <button class="btn btn-g" onclick="addPayment()">✅ সেভ করুন</button>
  </div></div>`:"";

  const mRows=members.map(m=>{
    const p=filtered.find(x=>x.mid==m.id);
    const allPaid=payments.filter(x=>x.mid==m.id).reduce((s,x)=>s+x.amount,0);
    return `<tr><td><b>${m.name}</b></td><td>${p?bdg(fmt(p.amount)+" ✓","#1a8a00","#dcfce7"):bdg("বাকি ✗","#dc2626","#fee2e2")}</td>
      <td style="color:#1a8a00;font-weight:700">${fmt(allPaid)}</td>
      <td>${isA()&&p?`<button class="btn btn-sm btn-r" style="padding:3px 8px" onclick="delPay(${p.id})">🗑</button>`:""}</td></tr>`;}).join("");

  const hist=payments.slice().reverse().slice(0,10).map(p=>`<tr><td>${gn(p.mid)}</td><td>${p.month}</td><td style="color:#1a8a00;font-weight:700">${fmt(p.amount)}</td><td style="color:#94a3b8;font-size:12px">${p.note||"-"}</td></tr>`).join("");

  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">
      <div><div class="section-title">💰 সঞ্চয় / চাঁদা</div></div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <button class="btn btn-sm" style="background:#1a8a00;color:#fff" onclick="xlDownload('savings')">📊 Excel</button>
        <button class="btn btn-sm" style="background:#dc2626;color:#fff" onclick="pdfDownload('savings')">📄 PDF</button>
      </div>
    </div>
    <div class="grid3" style="margin-bottom:14px">
      ${[["💰","মোট সঞ্চয়",fmt(allTotal),"#1a8a00","#f0fdf4"],["📅","এই মাসে",fmt(total),"#006400","#f0fdf4"],["👥","নিয়মিত",`${paidIds.size}/${members.length} জন`,"#1a8a00","#f0fdf4"]].map(([i,l,v,c,bg])=>`<div class="kpi" style="background:${bg};text-align:center"><div class="ki">${i}</div><div class="kv" style="color:${c};font-size:18px">${v}</div><div class="kl">${l}</div></div>`).join("")}
    </div>
    ${form}
    <div class="card">
      ${ch("📋","মাসিক চাঁদার রিপোর্ট")}
      <div style="padding:12px 16px 0"><div class="field"><input type="month" id="sfilt" value="${filt}" onchange="window._sfilt=this.value;goTab('savings')"></div></div>
      ${rw("সংগৃহীত",fmt(total),"hi")}${rw("দিয়েছেন",`${paidIds.size} জন`)}${rw("বাকি",`${members.length-paidIds.size} জন`,"rd-row")}
      <div style="overflow-x:auto;padding:0 16px 14px"><table class="tbl"><thead><tr><th>সদস্য</th><th>এই মাস</th><th>মোট চাঁদা</th><th></th></tr></thead><tbody>${mRows}</tbody></table></div>
    </div>
    <div class="card">${ch("🕒","সাম্প্রতিক চাঁদা")}
      <div style="overflow-x:auto;padding:0 16px 14px"><table class="tbl"><thead><tr><th>সদস্য</th><th>মাস</th><th>পরিমাণ</th><th>নোট</th></tr></thead><tbody>${hist||`<tr><td colspan="4" style="text-align:center;color:#94a3b8">কোনো রেকর্ড নেই</td></tr>`}</tbody></table></div>
    </div>`;
}
function addPayment(){
  const mid=document.getElementById("pMem").value,amt=Number(document.getElementById("pAmt").value);
  if(!mid||!amt)return;
  D.payments=[...(D.payments||[]),{id:Date.now(),mid:Number(mid),amount:amt,month:document.getElementById("pMon").value,note:document.getElementById("pNote").value}];
  sv();toast("✅ চাঁদা সেভ হয়েছে");goTab("savings");
}
function delPay(id){D.payments=(D.payments||[]).filter(p=>p.id!==id);sv();toast("🗑","#dc2626");goTab("savings");}

function pgLoans(){
  const loans=D.loans||[], members=D.members||[];
  const total=loans.reduce((s,l)=>s+l.principal,0),rem=loans.reduce((s,l)=>s+l.remaining,0);
  const totalInt=loans.reduce((s,l)=>s+(l.principal-l.remaining)*l.rate/100,0);

  const form=isA()?`<div class="card">${ch("📝","নতুন ঋণ যোগ করুন")}<div class="cb">
    <div class="field"><label>সদস্য</label><select id="lMem"><option value="">-- সদস্য --</option>${members.map(m=>`<option value="${m.id}">${m.name}</option>`).join("")}</select></div>
    <div class="grid3">
      <div class="field"><label>মূল ঋণ (৳)</label><input type="number" id="lAmt" placeholder="0"></div>
      <div class="field"><label>সুদের হার %</label><input type="number" id="lRate" value="10"></div>
      <div class="field"><label>মাসিক কিস্তি</label><input type="number" id="lInst" placeholder="0"></div>
    </div>
    <div class="grid2">
      <div class="field"><label>তারিখ</label><input type="date" id="lDate" value="${new Date().toISOString().slice(0,10)}"></div>
      <div class="field"><label>উদ্দেশ্য</label><input id="lNote" placeholder="ব্যবসা/ব্যক্তিগত"></div>
    </div>
    <button class="btn btn-g" onclick="addLoan()">✅ সেভ করুন</button>
  </div></div>`:"";

  const cards=loans.map(l=>{
    const pct=Math.min(100,Math.round(((l.principal-l.remaining)/l.principal)*100));
    const status=l.remaining===0?"পরিশোধিত":l.remaining<l.principal?"আংশিক":"বাকি";
    const sc=l.remaining===0?"#1a8a00":l.remaining<l.principal?"#d97706":"#dc2626";
    const intAmt=Math.round((l.principal-l.remaining)*l.rate/100);
    return `<div class="card"><div style="padding:16px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:11px">
        <div style="display:flex;align-items:center;gap:10px">${av(gn(l.mid),40)}<div><div style="font-weight:700;font-size:15px">${gn(l.mid)}</div><div style="font-size:11px;color:#94a3b8">${l.date} · সুদ ${l.rate}%${l.note?" · "+l.note:""}</div></div></div>
        ${bdg(status,sc,sc+"18")}
      </div>
      <div class="grid3" style="margin-bottom:11px">
        ${[["মূল ঋণ",fmt(l.principal),"#64748b"],["বকেয়া",fmt(l.remaining),"#dc2626"],["সুদ আয়",fmt(intAmt),"#1a8a00"]].map(([lb,v,c])=>`<div class="stat-box"><div class="sv" style="color:${c}">${v}</div><div class="sl">${lb}</div></div>`).join("")}
      </div>
      <div class="grid2" style="margin-bottom:11px">
        ${[["পরিশোধিত",fmt(l.principal-l.remaining),"#006400"],["মাসিক কিস্তি",fmt(l.installment||0),"#1a8a00"]].map(([lb,v,c])=>`<div class="stat-box"><div class="sv" style="color:${c}">${v}</div><div class="sl">${lb}</div></div>`).join("")}

function addLoan(){
  const mid=document.getElementById("lMem").value,amt=Number(document.getElementById("lAmt").value);
  if(!mid||!amt)return;
  D.loans=[...(D.loans||[]),{id:Date.now(),mid:Number(mid),principal:amt,remaining:amt,rate:Number(document.getElementById("lRate").value),installment:Number(document.getElementById("lInst").value||0),date:document.getElementById("lDate").value,note:document.getElementById("lNote").value}];
  sv();toast("✅ ঋণ যোগ হয়েছে");goTab("loans");
}
function delLoan(id){if(!confirm("এই ঋণ মুছবেন?"))return;D.loans=(D.loans||[]).filter(l=>l.id!==id);sv();toast("🗑 ঋণ মুছে গেছে","#dc2626");goTab("loans");}
function repay(id){
  const amt=Number(document.getElementById("rp"+id).value);if(!amt)return;
  D.loans=(D.loans||[]).map(l=>l.id===id?{...l,remaining:Math.max(0,l.remaining-amt)}:l);
  sv();toast("✅ কিস্তি পরিশোধ হয়েছে");goTab("loans");
}
function editLoan(id){
  const l=(D.loans||[]).find(x=>x.id===id);if(!l)return;
  document.getElementById("el-id").value=l.id;
  document.getElementById("el-mid").value=l.mid;
  document.getElementById("el-principal").value=l.principal;
  document.getElementById("el-remaining").value=l.remaining;
  document.getElementById("el-rate").value=l.rate;
  document.getElementById("el-inst").value=l.installment||0;
  document.getElementById("el-date").value=l.date;
  document.getElementById("el-note").value=l.note||"";
  document.getElementById("loan-edit-modal").style.display="flex";
}
function saveLoanEdit(){
  const id=Number(document.getElementById("el-id").value);
  const principal=Number(document.getElementById("el-principal").value);
  const remaining=Number(document.getElementById("el-remaining").value);
  if(!principal||remaining<0){toast("⚠️ সঠিক তথ্য দিন","#d97706");return;}
  D.loans=(D.loans||[]).map(l=>l.id===id?{
    ...l,
    mid:Number(document.getElementById("el-mid").value),
    principal,remaining,
    rate:Number(document.getElementById("el-rate").value),
    installment:Number(document.getElementById("el-inst").value||0),
    date:document.getElementById("el-date").value,
    note:document.getElementById("el-note").value
  }:l);
  sv();toast("✅ ঋণ আপডেট হয়েছে");closeLoanEdit();goTab("loans");
}
function closeLoanEdit(){
  document.getElementById("loan-edit-modal").style.display="none";
}

              <span style="font-weight:800;font-size:16px;color:#1a8a00">${fmt(totalInvest+fund)}</span>

  const notices=D.notices||[];

<div style="border:1.5px solid var(--border);border-radius:9px;overflow:hidden">

    <button type="button" onclick="fmtText('ol')" style="background:#fff;border:1px solid #ddd;border-radius:5px;padding:3px 8px;cursor:pointer;font-size:12px">১. তালিকা</button>

  <textarea id="ntB" placeholder="বিস্তারিত লিখুন...&#10;&#10;**굵은** লেখার জন্য ** দিয়ে ঘিরুন&#10;• বুলেটের জন্য • দিয়ে শুরু করুন" style="width:100%;min-height:120px;padding:10px 13px;border:none;font-size:14px;font-family:inherit;outline:none;resize:vertical"></textarea>

function pgNews(){
  const news=D.news||[];
  const cC={সাধারণ:"#1a8a00",বিনিয়োগ:"#1a8a00",ঘোষণা:"#d97706",অর্জন:"#006400",সভা:"#7c3aed"};
  const cats=["সাধারণ","বিনিয়োগ","ঘোষণা","অর্জন","সভা"];
  const form=isA()?`<div class="card">${ch("✍️","নতুন খবর","","b")}<div class="cb">
    <div class="field"><label>শিরোনাম</label><input id="nwT" placeholder="খবরের শিরোনাম"></div>
    <div class="field"><label>বিস্তারিত</label><textarea id="nwB" placeholder="বিস্তারিত লিখুন..."></textarea></div>
    <div class="grid2">
      <div class="field"><label>ক্যাটাগরি</label><select id="nwC">${cats.map(c=>`<option>${c}</option>`).join("")}</select></div>
      <div class="field"><label>তারিখ</label><input type="date" id="nwD" value="${new Date().toISOString().slice(0,10)}"></div>
    </div>
    <button class="btn btn-b" onclick="addNews()">📤 প্রকাশ করুন</button>
  </div></div>`:"";
  const list=news.slice().reverse().map(n=>`<div class="card"><div style="padding:16px"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:9px"><span class="badge" style="color:${cC[n.category]||"#1a8a00"};background:${cC[n.category]||"#1a8a00"}18">${n.category}</span><div style="display:flex;align-items:center;gap:8px"><span style="font-size:11px;color:#94a3b8">${ds(n.date)}</span>${isA()?`<button class="btn btn-sm btn-r" style="padding:3px 8px" onclick="delNews(${n.id})">🗑</button>`:""}</div></div><div style="font-weight:700;font-size:16px;margin-bottom:7px;line-height:1.4">${n.title}</div><div style="font-size:13px;color:var(--muted);line-height:1.75">${n.body}</div></div></div>`).join("")||`<div style="text-align:center;padding:40px;color:#94a3b8">📰 কোনো খবর নেই</div>`;
  return form+list;
}
function addNews(){const t=document.getElementById("nwT").value,b=document.getElementById("nwB").value;if(!t||!b)return;D.news=[...(D.news||[]),{id:Date.now(),title:t,body:b,category:document.getElementById("nwC").value,date:document.getElementById("nwD").value}];sv();toast("✅ প্রকাশিত হয়েছে");goTab("news");}
function delNews(id){D.news=(D.news||[]).filter(n=>n.id!==id);sv();toast("🗑","#dc2626");goTab("news");}

function pgGoals(){
  const goals=D.goals||[];
  const icons=["🎯","💰","🏠","🌾","🐄","🏪","📈","🤝","⭐","🏦"];
  const form=isA()?`<div class="card">${ch("🎯","নতুন লক্ষ্য","","p")}<div class="cb">
    <div class="field"><label>লক্ষ্যের বিবরণ</label><input id="gT" placeholder="যেমন: জমি ক্রয়"></div>
    <div class="grid3">
      <div class="field"><label>লক্ষ্যমাত্রা (৳)</label><input type="number" id="gTg" placeholder="0"></div>
      <div class="field"><label>বর্তমান (৳)</label><input type="number" id="gCu" placeholder="0"></div>
      <div class="field"><label>সময়সীমা</label><input type="date" id="gDl"></div>
    </div>
    <div style="margin-bottom:12px"><div style="font-size:12px;color:var(--muted);margin-bottom:5px;font-weight:600">আইকন</div>
      <div style="display:flex;gap:5px;flex-wrap:wrap">${icons.map(ic=>`<button onclick="setGIcon('${ic}',this)" style="font-size:18px;background:transparent;border:2px solid var(--border);border-radius:7px;padding:3px 7px;cursor:pointer" class="gi-btn">${ic}</button>`).join("")}
      <input type="hidden" id="gIc" value="🎯"></div>
    </div>
    <button class="btn btn-g" style="background:${GR.p}" onclick="addGoal()">✅ সেভ করুন</button>
  </div></div>`:"";
  const cards=goals.length?`<div class="gauto">${goals.map(g=>{const pct=Math.min(100,Math.round((g.current/g.target)*100));const done=pct>=100;const c=done?"#006400":pct>60?"#1a8a00":pct>30?"#d97706":"#dc2626";return `<div class="card" style="padding:16px"><div style="display:flex;justify-content:space-between;margin-bottom:11px"><div style="display:flex;align-items:center;gap:9px"><span style="font-size:28px">${g.icon}</span><div><div style="font-weight:700;font-size:14px;line-height:1.3">${g.title}</div>${g.deadline?`<div style="font-size:10px;color:#94a3b8;margin-top:2px">সময়সীমা: ${ds(g.deadline)}</div>`:""}</div></div>${done?"<span style='font-size:20px'>🏆</span>":""}</div><div style="display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:5px"><span>${fmt(g.current)}</span><span>${fmt(g.target)}</span></div>${pb(pct,c,10)}<div style="text-align:center;font-size:14px;font-weight:700;color:${c};margin-top:5px;margin-bottom:${isA()&&!done?"10px":"0"}">${pct}%</div>${isA()&&!done?`<div style="display:flex;gap:6px"><input type="number" id="gp${g.id}" value="${g.current}" style="flex:1;padding:7px 10px;border-radius:8px;border:1.5px solid var(--border);font-size:12px;font-family:inherit;outline:none"><button class="btn btn-g btn-sm" onclick="updGoal(${g.id})">✓</button></div>`:""}${isA()?`<button onclick="delGoal(${g.id})" style="width:100%;background:none;border:none;color:#94a3b8;font-size:11px;cursor:pointer;margin-top:8px;font-family:inherit">🗑 মুছুন</button>`:""}</div>`;}).join("")}</div>`:`<div style="text-align:center;padding:40px;color:#94a3b8">🎯 কোনো লক্ষ্য নেই</div>`;
  return form+cards;
}
function setGIcon(ic,btn){document.getElementById("gIc").value=ic;document.querySelectorAll(".gi-btn").forEach(b=>{b.style.background="transparent";b.style.borderColor="var(--border)"});btn.style.background="#f0fdf4";btn.style.borderColor="#1a8a00";}
function addGoal(){const t=document.getElementById("gT").value,tg=Number(document.getElementById("gTg").value);if(!t||!tg)return;D.goals=[...(D.goals||[]),{id:Date.now(),title:t,target:tg,current:Number(document.getElementById("gCu").value||0),deadline:document.getElementById("gDl").value,icon:document.getElementById("gIc").value}];sv();toast("✅ লক্ষ্য যোগ হয়েছে");goTab("goals");}
function updGoal(id){const v=document.getElementById("gp"+id).value;D.goals=(D.goals||[]).map(g=>g.id===id?{...g,current:Number(v)}:g);sv();toast("✅ আপডেট হয়েছে");goTab("goals");}
function delGoal(id){D.goals=(D.goals||[]).filter(g=>g.id!==id);sv();toast("🗑","#dc2626");goTab("goals");}

function pgMembers(){
  const members=D.members||[], payments=D.payments||[], loans=D.loans||[];
  const roles=["সভাপতি","সম্পাদক","কোষাধ্যক্ষ","সদস্য","উপদেষ্টা"];
  const rG={সভাপতি:GR.gold,সম্পাদক:GR.b,কোষাধ্যক্ষ:GR.g,সদস্য:GR.g,উপদেষ্টা:GR.p};
  const form=isA()?`<div class="card" style="margin-bottom:12px">${ch("👤","নতুন সদস্য যোগ করুন")}<div class="cb">
    <div class="grid2">
      <div class="field"><label>পূর্ণ নাম</label><input id="mNm" placeholder="সদস্যের নাম"></div>
      <div class="field"><label>মোবাইল</label><input type="tel" id="mPh" placeholder="01XXXXXXXXX"></div>
    </div>
    <div class="grid2">
      <div class="field"><label>পদবি</label><select id="mRl">${roles.map(r=>`<option>${r}</option>`).join("")}</select></div>
      <div class="field"><label>যোগদানের মাস</label><input type="month" id="mJn" value="${new Date().toISOString().slice(0,7)}"></div>
    </div>
    <div class="field"><label>মাসিক চাঁদার হার (৳)</label><input type="number" id="mRt" value="2000" placeholder="2000"></div>
    <button class="btn btn-g" onclick="addMember()">✅ যোগ করুন</button>
  </div></div>`:"";

  const totalFundAll=calcFund();
  const allMeetings=D.meetings||[];
  const duesListAll=getDuesList();
  const cards=members.map(m=>{
    const tp=payments.filter(p=>p.mid==m.id).reduce((s,p)=>s+p.amount,0);
    const tl=loans.filter(l=>l.mid==m.id).reduce((s,l)=>s+l.remaining,0);
    const dueRec=duesListAll.find(x=>x.id==m.id);
    const dueChada=dueRec?Math.max(0,dueRec.totalDue||0):0;
    const attCount=allMeetings.filter(mt=>(mt.attendance||{})[m.id]).length;
    const attPct=allMeetings.length?Math.round(attCount/allMeetings.length*100):0;
    const fundShare=totalFundAll/Math.max(1,members.length);
    const g=rG[m.role]||GR.g;
    return `<div data-name="${m.name}" style="background:#fff;border-radius:14px;box-shadow:0 2px 10px rgba(0,0,0,.06);overflow:hidden">
      <div style="height:5px;background:${g}"></div>
      <div style="padding:14px">
        <div style="display:flex;align-items:center;gap:11px;margin-bottom:11px">
          ${av(m.name,44,g)}
          <div style="flex:1">
            <div style="font-weight:700;font-size:15px">${m.name}</div>
            <span style="font-size:10px;background:#dcfce7;color:#1a8a00;border-radius:5px;padding:2px 7px;font-weight:700">${m.role||"সদস্য"}</span>
          </div>
          ${isA()?`<div style="display:flex;gap:5px">
            <button onclick="editMember(${m.id})" style="background:#eff6ff;border:none;border-radius:7px;padding:5px 8px;cursor:pointer;font-size:12px">✏️</button>
            <button onclick="sendDueNotif(${m.id})" style="background:#fffbeb;border:none;border-radius:7px;padding:5px 8px;cursor:pointer;font-size:12px" title="WhatsApp">📱</button>
            <button onclick="delMember(${m.id})" style="background:#fff1f2;border:none;border-radius:7px;padding:5px 8px;cursor:pointer;font-size:12px;color:#dc2626">🗑</button>
          </div>`:""}
        </div>
        <div class="grid2" style="margin-bottom:8px">
          <div style="background:#f0fdf4;border-radius:8px;padding:8px;text-align:center">
            <div style="font-weight:800;color:#1a8a00">${fmt(tp)}</div>
            <div style="font-size:11px;color:#64748b">মোট চাঁদা</div>
          </div>
          <div style="background:#fff1f2;border-radius:8px;padding:8px;text-align:center">
            <div style="font-weight:800;color:#dc2626">${fmt(tl)}</div>
            <div style="font-size:11px;color:#64748b">বকেয়া ঋণ</div>
          </div>
        </div>
        <div class="grid2">
          <div style="background:#fffbeb;border-radius:8px;padding:8px;text-align:center">
            <div style="font-weight:800;color:#d97706">${fmt(dueChada)}</div>
            <div style="font-size:11px;color:#64748b">বকেয়া চাঁদা</div>
          </div>
          <div style="background:#eff6ff;border-radius:8px;padding:8px;text-align:center">
            <div style="font-weight:800;color:#2563eb">${attPct}%</div>
            <div style="font-size:11px;color:#64748b">উপস্থিতি (${attCount}/${allMeetings.length})</div>
          </div>
        </div>
        ${m.phone?`<div style="font-size:12px;color:#64748b;margin-top:9px">📞 ${m.phone}</div>`:""}
        ${m.join?`<div style="font-size:11px;color:#94a3b8;margin-top:3px">যোগদান: ${m.join}</div>`:""}
        <div style="font-size:11px;color:#94a3b8;margin-top:3px">💼 তহবিলে অংশ: ${fmt(fundShare)}</div>
        ${isA()?`<div style="margin-top:10px;display:flex;gap:6px">
          <button onclick="memberStatPDF(${m.id})" style="font-size:11px;background:#fee2e2;border:none;border-radius:6px;padding:5px 10px;cursor:pointer;color:#dc2626">📄 PDF</button>
          <button onclick="memberStatXL(${m.id})" style="font-size:11px;background:#dcfce7;border:none;border-radius:6px;padding:5px 10px;cursor:pointer;color:#16a34a">📊 Excel</button>
          <button onclick="goTab('memberstat');window._statMid=${m.id}" style="font-size:11px;background:#eff6ff;border:none;border-radius:6px;padding:5px 10px;cursor:pointer;color:#2563eb">📋 লেনদেন ইতিহাস</button>
        </div>`:""}
      </div>
    </div>`;
  }).join("");

  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">
      <div><div class="section-title">👥 সদস্যবৃন্দ</div>
      <div class="section-sub">${members.length} জন সদস্য</div></div>
      <button class="btn btn-sm" style="background:#dc2626;color:#fff" onclick="pdfDownload('members')">📄 সদস্য তালিকা PDF</button>
    </div>
    ${form}
    <div class="field" style="margin-bottom:10px"><input type="text" placeholder="🔎 সদস্য খুঁজুন..." oninput="filterCardsByName(this.value,'members-grid')"></div>
    <div class="gauto" id="members-grid">${cards}</div>

    <!-- সদস্য সম্পাদনা Modal -->
    <div id="member-edit-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:9000;align-items:center;justify-content:center">
      <div style="background:#fff;border-radius:16px;padding:22px;width:92%;max-width:400px;max-height:90vh;overflow-y:auto">
        <div style="font-weight:800;font-size:17px;margin-bottom:16px">✏️ সদস্য সম্পাদনা</div>
        <input type="hidden" id="em-id">
        <div class="field"><label>পূর্ণ নাম</label><input type="text" id="em-name"></div>
        <div class="field"><label>মোবাইল</label><input type="tel" id="em-phone" placeholder="01XXXXXXXXX"></div>
        <div class="field"><label>পদবি</label>
          <select id="em-role" style="width:100%;padding:9px;border-radius:9px;border:1.5px solid var(--border);font-size:13px;font-family:inherit">
            ${roles.map(r=>`<option>${r}</option>`).join("")}
          </select>
        </div>
        <div class="field"><label>যোগদানের মাস</label><input type="month" id="em-join"></div>
        <div class="field"><label>মাসিক চাঁদার হার (৳)</label><input type="number" id="em-rate" placeholder="2000"></div>
        <div class="field"><label>নোমিনি</label><input type="text" id="em-nominee" placeholder="নোমিনির নাম"></div>
        <div class="field"><label>ঠিকানা</label><input type="text" id="em-address" placeholder="গ্রাম/শহর"></div>
        <div style="display:flex;gap:8px;margin-top:4px">
          <button class="btn btn-g" onclick="saveMemberEdit()" style="flex:1">✅ সেভ করুন</button>
          <button class="btn btn-outline" onclick="document.getElementById('member-edit-modal').style.display='none'">বাতিল</button>
        </div>
      </div>
    </div>`;
}

function addMember(){
  const n=document.getElementById("mNm").value.trim();
  if(!n){toast("⚠️ নাম লিখুন","#d97706");return;}
  D.members=[...(D.members||[]),{
    id:Date.now(),name:n,
    phone:document.getElementById("mPh").value,
    role:document.getElementById("mRl").value,
    join:document.getElementById("mJn").value,
    monthlyRate:Number(document.getElementById("mRt").value||2000)
  }];
  sv();toast("✅ সদস্য যোগ হয়েছে");goTab("members");
}

function editMember(id){
  const m=(D.members||[]).find(x=>x.id==id);if(!m)return;
  document.getElementById("em-id").value=m.id;
  document.getElementById("em-name").value=m.name;
  document.getElementById("em-phone").value=m.phone||"";
  document.getElementById("em-role").value=m.role||"সদস্য";
  document.getElementById("em-join").value=m.join||m.joinDate||"";
  document.getElementById("em-rate").value=m.monthlyRate||2000;
  document.getElementById("em-nominee").value=m.nominee||"";
  document.getElementById("em-address").value=m.address||"";
  document.getElementById("member-edit-modal").style.display="flex";
}

function saveMemberEdit(){
  const id=Number(document.getElementById("em-id").value);
  const name=document.getElementById("em-name").value.trim();
  if(!name){toast("⚠️ নাম লিখুন","#d97706");return;}
  D.members=(D.members||[]).map(m=>m.id==id?{
    ...m,name,
    phone:document.getElementById("em-phone").value,
    role:document.getElementById("em-role").value,
    join:document.getElementById("em-join").value,
    monthlyRate:Number(document.getElementById("em-rate").value||2000),
    nominee:document.getElementById("em-nominee").value,
    address:document.getElementById("em-address").value
  }:m);
  sv();toast("✅ সদস্য আপডেট হয়েছে");
  document.getElementById("member-edit-modal").style.display="none";
  goTab("members");
}

function delMember(id){if(!confirm("এই সদস্য মুছবেন?"))return;D.members=(D.members||[]).filter(m=>m.id!==id);sv();toast("🗑","#dc2626");goTab("members");}

function pgOpinion(){
  const ops=D.opinions||[], members=D.members||[];
  const form=`<div class="card">${ch("✍️","মতামত দিন","","p")}<div class="cb">
    <div class="field"><label>আপনি কে?</label><select id="opM"><option value="">-- সদস্য --</option>${members.map(m=>`<option value="${m.id}">${m.name}</option>`).join("")}</select></div>
    <div class="field"><label>মতামত / পরামর্শ</label><textarea id="opT" placeholder="আপনার মতামত লিখুন..."></textarea></div>
    <button class="btn" style="background:${GR.p};color:#fff" onclick="addOp()">📤 পাঠান</button>
  </div></div>`;
  const list=ops.slice().reverse().map(o=>`<div class="card"><div style="padding:16px"><div style="display:flex;align-items:center;gap:9px;margin-bottom:9px">${av(gn(o.mid),36,GR.p)}<div style="flex:1"><div style="font-weight:700;font-size:14px">${gn(o.mid)}</div><div style="font-size:11px;color:#94a3b8">${ds(o.date)}</div></div>${isA()?`<button class="btn btn-sm btn-r" style="padding:3px 8px" onclick="delOp(${o.id})">🗑</button>`:""}</div><div style="font-size:13px;line-height:1.75;margin-bottom:9px">${o.text}</div><button onclick="likeOp(${o.id})" style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:20px;padding:5px 13px;font-size:12px;color:#1a8a00;cursor:pointer;font-family:inherit;font-weight:600">👍 ${o.likes||0}</button></div></div>`).join("")||`<div style="text-align:center;padding:40px;color:#94a3b8">💬 কোনো মতামত নেই</div>`;
  return form+list;
}
function addOp(){const m=document.getElementById("opM").value,t=document.getElementById("opT").value.trim();if(!m||!t)return;D.opinions=[...(D.opinions||[]),{id:Date.now(),mid:Number(m),text:t,date:new Date().toISOString().slice(0,10),likes:0}];sv();toast("✅ মতামত যোগ হয়েছে");goTab("opinion");}
function likeOp(id){D.opinions=(D.opinions||[]).map(o=>o.id===id?{...o,likes:(o.likes||0)+1}:o);sv();goTab("opinion");}
function delOp(id){D.opinions=(D.opinions||[]).filter(o=>o.id!==id);sv();toast("🗑","#dc2626");goTab("opinion");}

function pgGallery(){
  const gal=D.gallery||[];
  const form=isA()?`<div class="card">${ch("📸","ছবি যোগ করুন","","p")}<div class="cb">
    <label style="display:block;border:2px dashed var(--border);border-radius:11px;padding:22px;text-align:center;cursor:pointer;margin-bottom:11px;background:#f8fafc" onmouseover="this.style.borderColor='#1a8a00'" onmouseout="this.style.borderColor='var(--border)'">
      <div id="ipv"><div style="font-size:30px;margin-bottom:7px">📸</div><div style="font-size:13px;color:var(--muted)">ছবি বেছে নিন (≤৫০০KB)</div></div>
      <input type="file" accept="image/*" onchange="prevImg(this)" style="display:none">
    </label>
    <div class="field"><label>ক্যাপশন</label><input id="gcap" placeholder="ছবির বিবরণ"></div>

function fmtText(type) {
  const ta = document.getElementById("ntB");
  if(!ta) return;
  const start = ta.selectionStart, end = ta.selectionEnd;
  const sel = ta.value.substring(start, end);
  let ins = "";
  if(type==="bold") ins = `**${sel||"굵은 লেখা"}**`;
  else if(type==="italic") ins = `_${sel||"বাঁকা লেখা"}_`;
  else if(type==="ul") ins = `\n• ${sel||"আইটেম"}`;
  else if(type==="ol") ins = `\n১. ${sel||"আইটেম"}`;
  else if(type==="hr") ins = `\n────────────────\n`;
  ta.value = ta.value.substring(0,start) + ins + ta.value.substring(end);
  ta.focus();
}

function renderNoticeBody(text) {
  if(!text) return "";
  let t = text
    .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
    .replace(/_(.+?)_/g, "<em>$1</em>")
    .replace(/^• (.+)/gm, "<li style='margin-left:16px;margin-bottom:4px'>$1</li>")
    .replace(/^\d+\. (.+)/gm, "<li style='margin-left:16px;margin-bottom:4px'>$1</li>")
    .replace(/────+/g, "<hr style='border:none;border-top:1px solid #e2e8f0;margin:8px 0'>")
    .replace(/\n/g, "<br>");
  return t;
}

function xlDownload(type){
  const bom="\uFEFF";
  let csv="", fn="";
  const members=D.members||[], payments=D.payments||[], loans=D.loans||[];
  const income=D.income||[], expenses=D.expenses||[], investments=D.investments||[], assets=D.assets||[];

  if(type==="savings"){
    fn="চাঁদা_রিপোর্ট";
    csv="সদস্য,মাস,পরিমাণ,নোট\n";
    payments.forEach(p=>{ csv+=`${(members.find(m=>m.id==p.mid)||{}).name||""},${p.month},${p.amount},"${p.note||""}"\n`; });
    csv+=`\nমোট,,${payments.reduce((s,p)=>s+p.amount,0)},\n`;

  } else if(type==="loans"){
    fn="ঋণ_রিপোর্ট";
    csv="সদস্য,তারিখ,মূল ঋণ,বকেয়া,পরিশোধিত,সুদের হার,মাসিক কিস্তি,উদ্দেশ্য,অবস্থা\n";
    loans.forEach(l=>{
      const name=(members.find(m=>m.id==l.mid)||{}).name||"";
      const status=l.remaining===0?"পরিশোধিত":l.remaining<l.principal?"আংশিক":"বাকি";
      csv+=`${name},${l.date},${l.principal},${l.remaining},${l.principal-l.remaining},${l.rate}%,${l.installment||0},"${l.note||""}",${status}\n`;
    });
    csv+=`\nমোট,,${loans.reduce((s,l)=>s+l.principal,0)},${loans.reduce((s,l)=>s+l.remaining,0)},${loans.reduce((s,l)=>s+(l.principal-l.remaining),0)},,,\n`;

  } else if(type==="invest"){
    fn="বিনিয়োগ_রিপোর্ট";
    csv="বিনিয়োগ,ধরন,পরিমাণ,প্রত্যাশিত আয়,তারিখ,অবস্থা,বিবরণ\n";
    investments.forEach(i=>{ csv+=`"${i.title}","${i.type}",${i.amount},${Math.round(i.amount*i.returnRate/100)},${i.date},"${i.status||"সক্রিয়"}","${i.note||""}"\n`; });
    csv+=`\nমোট,,,${investments.reduce((s,i)=>s+i.amount,0)},,,\n`;

  } else if(type==="assets"){
    fn="সম্পদ_রিপোর্ট";
    csv="সম্পদের নাম,ক্যাটাগরি,মূল্য,তারিখ,বিবরণ\n";
    assets.forEach(a=>{ csv+=`"${a.name}","${a.category}",${a.value},${a.date},"${a.note||""}"\n`; });
    csv+=`\nমোট,,${assets.reduce((s,a)=>s+a.value,0)},,\n`;

  } else if(type==="expenses"){
    fn="আয়_ব্যয়_রিপোর্ট";
    csv="তারিখ,বিবরণ,ক্যাটাগরি,আয়,ব্যয়\n";
    [...income].forEach(i=>{ csv+=`${i.date},"${i.title}","${i.category||""}",${i.amount},\n`; });
    payments.forEach(p=>{ csv+=`${p.month}-01,"${(members.find(m=>m.id==p.mid)||{}).name||""} — চাঁদা","সদস্য চাঁদা",${p.amount},\n`; });
    expenses.forEach(e=>{ csv+=`${e.date},"${e.title}","${e.category||""}","",${e.amount}\n`; });
    const totI=income.reduce((s,i)=>s+i.amount,0)+payments.reduce((s,p)=>s+p.amount,0);
    const totE=expenses.reduce((s,e)=>s+e.amount,0);
    csv+=`\nমোট আয়,,,${totI},\nমোট ব্যয়,,,,${totE}\nনিট উদ্বৃত্ত,,,${totI-totE},\n`;

  } else if(type==="balance"){
    fn="ব্যালেন্স_শিট";
    const totI=income.reduce((s,i)=>s+i.amount,0)+payments.reduce((s,p)=>s+p.amount,0);
    const totE=expenses.reduce((s,e)=>s+e.amount,0);
    csv="বিবরণ,পরিমাণ\n";
    csv+="=== সম্পদ ===,\n";
    assets.forEach(a=>{ csv+=`"${a.name} (${a.category})",${a.value}\n`; });
    csv+=`বিতরণকৃত ঋণ,${loans.reduce((s,l)=>s+l.remaining,0)}\n`;
    investments.forEach(i=>{ csv+=`"${i.title} (বিনিয়োগ)",${i.amount}\n`; });
    csv+="\n=== দায় ও মূলধন ===,\n";
    csv+=`মোট আয়,${totI}\nমোট ব্যয়,-${totE}\nনিট তহবিল,${totI-totE}\n`;
  }

  const blob=new Blob([bom+csv],{type:"text/csv;charset=utf-8;"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url; a.download=fn+".csv"; a.click();
  URL.revokeObjectURL(url);
  toast("✅ Excel/CSV ডাউনলোড শুরু হয়েছে");
}

function pgDuesSheet() {
  const members = D.members||[];
  const payments = D.payments||[];

  // নভেম্বর ২০২১ থেকে বর্তমান পর্যন্ত সব মাস
  const months = [];
  let d = new Date(2021, 10, 1); // Nov 2021
  const now2 = new Date();
  while(d <= now2){
    months.push({
      key: `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`,
      label: `${["জানু","ফেব্রু","মার্চ","এপ্রিল","মে","জুন","জুলাই","আগস্ট","সেপ্টে","অক্টো","নভে","ডিসে"][d.getMonth()]} ${String(d.getFullYear()).slice(2)}`,
      year: d.getFullYear(),
      month: d.getMonth()
    });
    d = new Date(d.getFullYear(), d.getMonth()+1, 1);
  }

  const years = [...new Set(months.map(m=>m.year))];
  const selYear = window._dsYear || years[years.length-1];
  const filtMonths = months.filter(m => m.year == selYear);

  const yearBtns = years.map(y=>`
    <button onclick="window._dsYear=${y};goTab('duessheet')"
      style="padding:6px 14px;border-radius:8px;border:2px solid ${y==selYear?"var(--g2)":"var(--border)"};
      background:${y==selYear?"var(--gl)":"#fff"};color:${y==selYear?"var(--g2)":"var(--muted)"};
      font-weight:${y==selYear?700:400};cursor:pointer;font-family:inherit;font-size:12px">${y}</button>
  `).join("");

  // Admin settings card
  const adminForm = isA() ? `
    <div class="card" style="margin-bottom:12px">
      ${ch("⚙️","চাঁদার হার ও বিশেষ মাস সেটিং")}
      <div class="cb">
        <div style="font-weight:700;font-size:13px;margin-bottom:8px">মাসিক চাঁদার হার (৳)</div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;margin-bottom:16px">
          ${members.map(m=>`
            <div style="background:#f8fafc;border-radius:9px;padding:10px">
              <div style="font-weight:600;font-size:12px;margin-bottom:5px">${m.name.split(" ")[0]}</div>
              <div style="display:flex;gap:5px">
                <input type="number" id="rt${m.id}" value="${m.monthlyRate||2000}"
                  style="flex:1;padding:6px 8px;border-radius:7px;border:1.5px solid var(--border);font-size:12px;font-family:inherit;outline:none">
                <button class="btn btn-g btn-sm" onclick="updRate(${m.id})">✓</button>
              </div>
            </div>`).join("")}
        </div>
        <div style="border-top:1px solid #f1f5f9;padding-top:12px">
          <div style="font-weight:700;font-size:13px;margin-bottom:8px">➕ বিশেষ মাসের চাঁদা</div>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:8px;align-items:end">
            <div class="field" style="margin:0"><label>সদস্য</label>
              <select id="sp-mid" style="width:100%;padding:8px;border-radius:7px;border:1.5px solid var(--border);font-size:12px;font-family:inherit">
                <option value="">-- সদস্য --</option>
                ${members.map(m=>`<option value="${m.id}">${m.name.split(" ")[0]}</option>`).join("")}
              </select>
            </div>
            <div class="field" style="margin:0"><label>মাস</label>
              <input type="month" id="sp-month" style="width:100%;padding:8px;border-radius:7px;border:1.5px solid var(--border);font-size:12px;font-family:inherit">
            </div>
            <div class="field" style="margin:0"><label>বিশেষ চাঁদা (৳)</label>
              <input type="number" id="sp-amt" placeholder="0" style="width:100%;padding:8px;border-radius:7px;border:1.5px solid var(--border);font-size:12px;font-family:inherit">
            </div>
            <button class="btn btn-g btn-sm" onclick="addSpecialMonth()">যোগ</button>
          </div>
        </div>
      </div>
    </div>` : "";

  // ফর্মুলা summary per member for selected year
  const memberSummary = members.map(m => {
    const rate = m.monthlyRate||2000;
    const spMonths = specialMonths.filter(s=>s.mid==m.id && s.month.startsWith(selYear));
    const spCount = spMonths.length;
    const spTotal = spMonths.reduce((s,x)=>s+x.amount,0);
    const regularCount = filtMonths.length - spCount;
    const totalExpected = (regularCount * rate) + spTotal;
    const totalPaid = payments.filter(p=>p.mid==m.id && p.month.startsWith(selYear)).reduce((s,p)=>s+p.amount,0);
    const totalDue = totalExpected - totalPaid;
    return { m, rate, spCount, spTotal, regularCount, totalExpected, totalPaid, totalDue };
  });

  const summaryCards = memberSummary.map(({m, rate, spCount, spTotal, regularCount, totalExpected, totalPaid, totalDue}) => `
    <div style="background:${totalDue>0?"#fff1f2":"#f0fdf4"};border-radius:11px;padding:12px 14px;border:1.5px solid ${totalDue>0?"#fecaca":"#bbf7d0"}">
      <div style="font-weight:700;font-size:13px;margin-bottom:6px">${m.name}</div>
      <div style="font-size:11px;color:#64748b;margin-bottom:5px;line-height:1.8">
        ফর্মুলা: (${filtMonths.length} - ${spCount}) × ${fmt(rate)}${spCount>0?" + বিশেষ "+fmt(spTotal):""} = ${fmt(totalExpected)}
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <span style="font-size:11px;background:#dcfce7;color:#15803d;border-radius:5px;padding:2px 7px;font-weight:700">পরিশোধ ${fmt(totalPaid)}</span>
        <span style="font-size:11px;background:${totalDue>0?"#fee2e2":"#dcfce7"};color:${totalDue>0?"#dc2626":"#15803d"};border-radius:5px;padding:2px 7px;font-weight:700">${totalDue>0?"বকেয়া "+fmt(totalDue):"✅ পরিশোধিত"}</span>
      </div>
    </div>`).join("");

  // Build dues table for selected year
  const tableHeader = `<tr style="background:#006400">
    <th style="position:sticky;left:0;background:#006400 !important;z-index:10;min-width:150px;color:#fff !important;font-size:13px;padding:10px 12px;border-right:2px solid #86efac">সদস্য / মাস</th>
    ${filtMonths.map(m=>`<th style="min-width:110px;text-align:center;background:#006400 !important;color:#fff !important;font-size:12px;font-weight:700;padding:10px 8px;white-space:nowrap;border-right:1px solid rgba(255,255,255,.15)">${m.label}</th>`).join("")}
    <th style="background:#006400 !important;color:#86efac !important;min-width:100px;text-align:center;padding:10px 8px;font-size:12px">মোট দেওয়া</th>
    <th style="background:#006400 !important;color:#fca5a5 !important;min-width:100px;text-align:center;padding:10px 8px;font-size:12px">এ বছর বকেয়া</th>
    <th style="background:#7f1d1d !important;color:#fca5a5 !important;min-width:170px;text-align:center;padding:10px 8px;font-size:12px;white-space:nowrap">সর্বমোট বকেয়া (শুরু থেকে এখন)</th>
  </tr>`;

  const tableRows = members.map(m => {
    const rate = m.monthlyRate||2000;
    const memberPayments = payments.filter(p=>p.mid==m.id);
    const spMonths = specialMonths.filter(s=>s.mid==m.id);

    let yearPaid = 0, yearExpected = 0;

    // শুরু থেকে বর্তমান পর্যন্ত সর্বমোট বকেয়া হিসাব
    let allExp = 0, allPaid = 0;
    months.forEach(mon => {
      const sp = spMonths.find(s=>s.month===mon.key);
      allExp += sp ? sp.amount : rate;
      const p = memberPayments.find(p=>p.month===mon.key);
      if(p) allPaid += p.amount;
    });
    const totalAllDue = allExp - allPaid;

    const cells = filtMonths.map(mon => {
      const spM = spMonths.find(s=>s.mid==m.id && s.month===mon.key);
      const cellRate = spM ? spM.amount : rate;
      yearExpected += cellRate;
      const paid = memberPayments.find(p=>p.month===mon.key);
      if(paid) yearPaid += paid.amount;
      const isPaid = !!paid;

      if(isA()) {
        return `<td style="text-align:center;background:${isPaid?"#f0fdf4":"#fff1f2"};padding:4px">
          ${isPaid
            ? `<div style="font-size:11px;color:#16a34a;font-weight:700">${fmt(paid.amount)}</div>
               <button onclick="editDue(${m.id},'${mon.key}',${paid.id},${paid.amount})" style="font-size:9px;background:none;border:none;color:#94a3b8;cursor:pointer">✏️</button>`
            : `<button onclick="addDue(${m.id},'${mon.key}',${cellRate})" style="font-size:10px;background:#fee2e2;border:none;border-radius:5px;padding:3px 6px;cursor:pointer;color:#dc2626;font-family:inherit">+ যোগ</button>`
          }
        </td>`;
      } else {
        return `<td style="text-align:center;background:${isPaid?"#f0fdf4":"#fff1f2"}">
          ${isPaid ? `<span style="font-size:11px;color:#16a34a;font-weight:700">✓</span>` : `<span style="font-size:11px;color:#dc2626">✗</span>`}
        </td>`;
      }
    }).join("");

    const yearDue = yearExpected - yearPaid;

    return `<tr data-name="${m.name}">
      <td style="position:sticky;left:0;background:#fff;z-index:5;font-weight:700;font-size:13px;padding:8px 12px;border-right:2px solid #e2e8f0">${m.name}</td>
      ${cells}
      <td style="font-weight:700;color:#1a8a00;text-align:center;background:#f0fdf4">${fmt(yearPaid)}</td>
      <td style="font-weight:700;color:${yearDue>0?"#dc2626":"#1a8a00"};text-align:center;background:${yearDue>0?"#fff1f2":"#f0fdf4"}">${yearDue>0?fmt(yearDue):"✅"}</td>
      <td style="font-weight:800;color:${totalAllDue>0?"#dc2626":"#1a8a00"};text-align:center;background:${totalAllDue>0?"#fee2e2":"#f0fdf4"};border-left:2px solid #fca5a5">${totalAllDue>0?fmt(totalAllDue):"✅"}</td>
    </tr>`;
  }).join("");

  // Total row
  const totals = members.map(m => {
    const rate = m.monthlyRate||2000;
    const spM = specialMonths.filter(s=>s.mid==m.id);
    const sp = spM.filter(s=>s.month.startsWith(selYear));
    const reg = filtMonths.length - sp.length;
    const exp = (reg*rate) + sp.reduce((s,x)=>s+x.amount,0);
    const paid = payments.filter(p=>p.mid==m.id&&p.month.startsWith(selYear)).reduce((s,p)=>s+p.amount,0);
    return {exp, paid, due: exp-paid};
  });
  const grandExp = totals.reduce((s,t)=>s+t.exp,0);
  const grandPaid = totals.reduce((s,t)=>s+t.paid,0);
  const grandDue = totals.reduce((s,t)=>s+t.due,0);

  // শুরু থেকে বর্তমান পর্যন্ত সর্বমোট বকেয়া
  const grandTotalAllDue = members.reduce((s,m)=>{
    const rate=m.monthlyRate||2000;
    const spM=specialMonths.filter(x=>x.mid==m.id);
    let allExp=0,allPd=0;
    months.forEach(mon=>{
      const sp=spM.find(x=>x.month===mon.key);
      allExp+=sp?sp.amount:rate;
      const p=(payments||[]).find(p=>p.mid==m.id&&p.month===mon.key);
      if(p)allPd+=p.amount;
    });
    return s+(allExp-allPd);
  },0);

  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">
      <div>
        <div class="section-title">📊 চাঁদার শিট</div>
        <div class="section-sub">নভেম্বর ২০২১ থেকে বর্তমান — ${months.length} মাস</div>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <button class="btn btn-sm" style="background:#0d9488;color:#fff" onclick="downloadReport('dues','${new Date().getFullYear()}')">⬇️ CSV (এই বছর)</button>
        <button class="btn btn-sm" style="background:#064e3b;color:#fff" onclick="downloadReport('dues','')">⬇️ CSV (সব)</button>
      </div>
    </div>

    <!-- বছর সিলেক্টর -->
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px">${yearBtns}</div>

    <!-- KPI -->
    <div class="grid3" style="margin-bottom:14px">
      <div class="kpi" style="background:#f0fdf4;text-align:center">
        <div class="ki">💰</div><div class="kv" style="color:#1a8a00;font-size:18px">${fmt(grandExp)}</div>
        <div class="kl">${selYear} মোট প্রত্যাশিত</div>
      </div>
      <div class="kpi" style="background:#f0fdf4;text-align:center">
        <div class="ki">✅</div><div class="kv" style="color:#1a8a00;font-size:18px">${fmt(grandPaid)}</div>
        <div class="kl">${selYear} মোট পরিশোধিত</div>
      </div>
      <div class="kpi" style="background:${grandDue>0?"#fff1f2":"#f0fdf4"};text-align:center">
        <div class="ki">${grandDue>0?"⚠️":"🎉"}</div>
        <div class="kv" style="color:${grandDue>0?"#dc2626":"#1a8a00"};font-size:18px">${grandDue>0?fmt(grandDue):"শূন্য"}</div>
        <div class="kl">${selYear} মোট বকেয়া</div>
      </div>
    </div>

    <!-- ফর্মুলা summary -->
    <div class="card" style="margin-bottom:12px">
      ${ch("📐","ফর্মুলা: (মোট মাস − বিশেষ মাস) × হার + বিশেষ চাঁদা = সর্বমোট")}
      <div class="cb">
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px">
          ${summaryCards}
        </div>
      </div>
    </div>

    ${adminForm}

    <!-- মাসভিত্তিক টেবিল -->
    <div class="card">
      ${ch("📋","মাসওয়ারি চাঁদার টেবিল",`${selYear} — ${filtMonths.length} মাস · ${members.length} জন সদস্য`)}
      <div style="padding:12px 16px 0"><input type="text" placeholder="🔎 সদস্য খুঁজুন..." oninput="filterTableRows(this.value,'dues-tbody')" style="width:100%;padding:9px 13px;border-radius:9px;border:1.5px solid var(--border);font-size:13px;font-family:inherit;outline:none"></div>
      <div style="overflow-x:auto;padding:0">
        <table class="tbl" style="min-width:${85*filtMonths.length+420}px">
          <thead>${tableHeader}</thead>
          <tbody id="dues-tbody">${tableRows}</tbody>
          <tfoot>
            <tr style="background:#f8fafc;font-weight:800">
              <td style="position:sticky;left:0;background:#f8fafc;padding:8px 12px;border-right:2px solid #e2e8f0">সর্বমোট</td>
              ${filtMonths.map(()=>'<td></td>').join("")}
              <td style="text-align:center;color:#1a8a00">${fmt(grandPaid)}</td>
              <td style="text-align:center;color:${grandDue>0?"#dc2626":"#1a8a00"}">${grandDue>0?fmt(grandDue):"✅"}</td>
              <td style="text-align:center;color:${grandTotalAllDue>0?"#dc2626":"#1a8a00"};background:${grandTotalAllDue>0?"#fee2e2":"#f0fdf4"};border-left:2px solid #fca5a5;font-weight:900">${grandTotalAllDue>0?fmt(grandTotalAllDue):"✅"}</td>
            </tr>
          </tfoot>
        </table>
      </div>
    </div>

    <!-- চাঁদা সম্পাদনা Modal -->
    <div id="due-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9000;align-items:center;justify-content:center">
      <div style="background:#fff;border-radius:14px;padding:22px;width:90%;max-width:340px;box-shadow:0 10px 40px rgba(0,0,0,.2)">
        <div style="font-weight:700;font-size:16px;margin-bottom:14px" id="dm-title">চাঁদা যোগ / সম্পাদনা</div>
        <input type="hidden" id="dm-mid">
        <input type="hidden" id="dm-month">
        <input type="hidden" id="dm-pid">
        <div class="field"><label>পরিমাণ (৳)</label><input type="number" id="dm-amt" placeholder="0"></div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn btn-g" onclick="saveDueModal()">✅ সেভ করুন</button>
          <button class="btn btn-outline" onclick="closeDueModal()">বাতিল</button>
          <button class="btn btn-r" onclick="deleteDueModal()" id="dm-del" style="display:none">🗑 মুছুন</button>
        </div>
      </div>
    </div>
  `;
}

// ══════════════════════════════════════════
// চাঁদার শিট helper functions
// ══════════════════════════════════════════
function updRate(mid) {
  const r = Number(document.getElementById("rt"+mid).value);
  D.members = (D.members||[]).map(m => m.id==mid ? {...m, monthlyRate:r} : m);
  sv(); toast("✅ চাঁদার হার আপডেট"); goTab("duessheet");
}

function addSpecialMonth() {
  const mid = document.getElementById("sp-mid").value;
  const month = document.getElementById("sp-month").value;
  const amt = Number(document.getElementById("sp-amt").value);
  if(!mid||!month||!amt) { toast("⚠️ সব তথ্য দিন","#d97706"); return; }
  D.specialMonths = [...(D.specialMonths||[])];
  // Remove existing if any
  D.specialMonths = D.specialMonths.filter(s=>!(s.mid==mid&&s.month===month));
  D.specialMonths.push({id:Date.now(), mid:Number(mid), month, amount:amt});
  sv(); toast("✅ বিশেষ মাস যোগ হয়েছে"); goTab("duessheet");
}

function addDue(mid, month, defaultAmt) {
  document.getElementById("dm-title").textContent = "চাঁদা যোগ করুন";
  document.getElementById("dm-mid").value = mid;
  document.getElementById("dm-month").value = month;
  document.getElementById("dm-pid").value = "";
  document.getElementById("dm-amt").value = defaultAmt;
  document.getElementById("dm-del").style.display = "none";
  document.getElementById("due-modal").style.display = "flex";
}

function editDue(mid, month, pid, amount) {
  document.getElementById("dm-title").textContent = "চাঁদা সম্পাদনা";
  document.getElementById("dm-mid").value = mid;
  document.getElementById("dm-month").value = month;
  document.getElementById("dm-pid").value = pid;
  document.getElementById("dm-amt").value = amount;
  document.getElementById("dm-del").style.display = "inline-flex";
  document.getElementById("due-modal").style.display = "flex";
}

function saveDueModal() {
  const mid = Number(document.getElementById("dm-mid").value);
  const month = document.getElementById("dm-month").value;
  const pid = document.getElementById("dm-pid").value;
  const amt = Number(document.getElementById("dm-amt").value);
  if(!amt) { toast("⚠️ পরিমাণ দিন","#d97706"); return; }
  if(pid) {
    D.payments = (D.payments||[]).map(p => p.id==pid ? {...p, amount:amt} : p);
  } else {
    D.payments = [...(D.payments||[]), {id:Date.now(), mid, month, amount:amt, note:""}];
  }
  sv(); toast("✅ সেভ হয়েছে"); closeDueModal(); goTab("duessheet");
}

function deleteDueModal() {
  const pid = document.getElementById("dm-pid").value;
  if(!pid) return;
  if(!confirm("এই রেকর্ড মুছবেন?")) return;
  D.payments = (D.payments||[]).filter(p=>p.id!=pid);
  sv(); toast("🗑 মুছে গেছে","#dc2626"); closeDueModal(); goTab("duessheet");
}

function closeDueModal() {
  document.getElementById("due-modal").style.display = "none";
}

// ══════════════════════════════════════════
// ১. বকেয়া চাঁদার তালিকা — ঋণের মতো
// ══════════════════════════════════════════
function getDuesList() {
  const members = D.members||[];
  const payments = D.payments||[];
  const now2 = new Date();

  const months = [];
  let d = new Date(2021,10,1); // Nov 2021
  while(d <= now2){
    months.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`);
    d = new Date(d.getFullYear(),d.getMonth()+1,1);
  }

  return members.map(m => {
    const rate = m.monthlyRate||2000;
    const specialMonths = (D.specialMonths||[]).filter(s=>s.mid==m.id);
    let totalExpected = 0;
    months.forEach(mon => {
      const sp = specialMonths.find(s=>s.month===mon);
      totalExpected += sp ? sp.amount : rate;
    });
    const totalPaid = payments.filter(p=>p.mid==m.id).reduce((s,p)=>s+p.amount,0);
    const totalDue = totalExpected - totalPaid;
    return { ...m, totalExpected, totalPaid, totalDue, months: months.length };
  }).filter(m => m.totalDue > 0).sort((a,b) => b.totalDue - a.totalDue);
}

function renderChadaDues(){
  const list = getDuesList();
  if(!list.length) return `<div style="padding:16px;text-align:center;color:#94a3b8">সবার চাঁদা পরিশোধ আছে ✅</div>`;
  return list.map(m=>`
    <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 16px;border-bottom:1px solid #f5f5f5">
      <div>
        <div style="font-weight:600;font-size:14px">${m.name}</div>
        <div style="font-size:11px;color:#94a3b8">${m.months} মাসের হিসাব · পরিশোধ ${fmt(m.totalPaid)}</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        ${bdg(fmt(m.totalDue),"#dc2626","#fee2e2")}
        ${isA()&&m.phone?`<button onclick="sendDueNotif(${m.id})" style="background:#dcfce7;border:none;border-radius:6px;padding:4px 8px;cursor:pointer;font-size:11px">📱</button>`:""}
      </div>
    </div>`).join("");
}

// ══════════════════════════════════════════
// ২. WhatsApp নোটিফিকেশন
// ══════════════════════════════════════════
function sendDueNotif(mid){
  const m = (D.members||[]).find(x=>x.id==mid);
  if(!m) { toast("সদস্য পাওয়া যায়নি","#d97706"); return; }
  if(!m.phone) { toast("⚠️ ফোন নম্বর নেই! সদস্য সেকশনে যোগ করুন","#d97706"); return; }
  const loanDue = (D.loans||[]).filter(l=>l.mid==mid).reduce((s,l)=>s+l.remaining,0);

function sendAllDueNotif(){

  if(!duesList.length) { toast("সবার চাঁদা পরিশোধ আছে ✅","#006400"); return; }
  let sent = 0;
  duesList.forEach((m,i) => {

      setTimeout(() => sendDueNotif(m.id), i*2500);

// ৫. আয়-ব্যয় CSV ডাউনলোড
// ══════════════════════════════════════════
function downloadReport(type, year){
  const members = D.members||[];
  const payments = D.payments||[];
  const income = D.income||[];
  const expenses = D.expenses||[];
  const specialMonths = D.specialMonths||[];
  let csv = "";
  const bom = "\uFEFF";

  if(type==="dues"){
    // নভেম্বর ২০২১ থেকে সব মাস
    const allMonths = [];
    let d = new Date(2021,10,1);
    const now2 = new Date();
    while(d<=now2){
      const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
      if(!year||key.startsWith(year)) allMonths.push({key, label:key});
      d = new Date(d.getFullYear(),d.getMonth()+1,1);
    }
    csv += `স্বপ্নঘুড়ি — চাঁদার রিপোর্ট ${year||"সব বছর"}\n\n`;
    csv += "সদস্য," + allMonths.map(m=>m.label).join(",") + ",মোট প্রত্যাশিত,মোট পরিশোধ,মোট বকেয়া\n";
    members.forEach(m=>{
      const rate = m.monthlyRate||2000;
      let totalExp=0, totalPaid=0;
      const row = allMonths.map(mon=>{
        const sp = specialMonths.find(s=>s.mid==m.id&&s.month===mon.key);
        const cellRate = sp?sp.amount:rate;
        totalExp += cellRate;
        const paid = payments.find(p=>p.month===mon.key&&p.mid==m.id);
        if(paid) totalPaid += paid.amount;
        return paid?paid.amount:"0";
      });
      csv += `${m.name},${row.join(",")},${totalExp},${totalPaid},${totalExp-totalPaid}\n`;
    });

  } else if(type==="income-expense"){
    csv += `স্বপ্নঘুড়ি — আয়-ব্যয় রিপোর্ট ${year||"সব বছর"}\n\n`;
    csv += "তারিখ,বিবরণ,ক্যাটাগরি,আয়,ব্যয়\n";

    const allIncome = [
      ...income.filter(i=>!year||i.date.startsWith(year)),
      ...payments.filter(p=>!year||p.month.startsWith(year)).map(p=>({
        title: gn(p.mid)+" — চাঁদা",
        amount: p.amount,
        date: p.month+"-01",
        category: "সদস্য চাঁদা"
      }))
    ];
    allIncome.forEach(i=>{csv+=`${i.date},"${i.title}","${i.category||""}",${i.amount},\n`;});

    const allExp = expenses.filter(e=>!year||e.date.startsWith(year));
    allExp.forEach(e=>{csv+=`${e.date},"${e.title}","${e.category||""}","",${e.amount}\n`;});

    const totInc = allIncome.reduce((s,i)=>s+i.amount,0);
    const totExp = allExp.reduce((s,e)=>s+e.amount,0);
    csv += `\n`;
    csv += `মোট আয়,,,${totInc},\n`;
    csv += `মোট ব্যয়,,,,${totExp}\n`;
    csv += `নিট উদ্বৃত্ত,,,${totInc-totExp},\n`;
  }

  const blob = new Blob([bom+csv], {type:"text/csv;charset=utf-8;"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = `swapnghuri_${type}_${year||"all"}.csv`;
  a.click(); URL.revokeObjectURL(url);
  toast("✅ CSV ডাউনলোড শুরু হয়েছে");
}

function pgChadaDues(){
  const list = getDuesList();
  const loans = D.loans||[];

  const allDues = (D.members||[]).map(m=>{
    const cDue = (list.find(x=>x.id==m.id)||{}).totalDue||0;
    const lDue = loans.filter(l=>l.mid==m.id).reduce((s,l)=>s+l.remaining,0);
    return {...m, cDue, lDue, total:cDue+lDue};
  }).filter(m=>m.total>0).sort((a,b)=>b.total-a.total);

  if(!allDues.length) return `<div style="padding:24px;text-align:center;color:#94a3b8">🎉 কোনো বকেয়া নেই!</div>`;

  return allDues.map(m=>`
    <div style="display:flex;justify-content:space-between;align-items:center;padding:11px 16px;border-bottom:1px solid #f5f5f5">
      <div style="display:flex;align-items:center;gap:10px">
        ${av(m.name,36)}
        <div>
          <div style="font-weight:600;font-size:13px">${m.name}</div>
          <div style="font-size:11px;color:#94a3b8">
            ${m.cDue>0?`চাঁদা: ${fmt(m.cDue)}`:""}
            ${m.cDue>0&&m.lDue>0?" · ":""}
            ${m.lDue>0?`ঋণ: ${fmt(m.lDue)}`:""}
          </div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:6px">
        ${bdg(fmt(m.total),"#dc2626","#fee2e2",12)}
        ${isA()&&m.phone?`<button onclick="sendDueNotif(${m.id})" title="WhatsApp" style="background:#dcfce7;border:none;border-radius:6px;padding:4px 8px;cursor:pointer;font-size:12px">📱</button>`:""}
      </div>
    </div>`).join("");
}
